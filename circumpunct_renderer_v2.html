<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circumpunct Renderer v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #e0d8c8; font-family: 'Courier New', monospace; overflow: hidden; }
  #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

  #controls {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    background: rgba(10, 8, 6, 0.85); border: 1px solid rgba(200, 180, 140, 0.2);
    border-radius: 8px; padding: 16px; width: 280px;
    backdrop-filter: blur(8px);
  }
  #controls h2 { font-size: 13px; color: #c8b478; margin-bottom: 12px; letter-spacing: 2px; }
  .ctrl-group { margin-bottom: 10px; }
  .ctrl-group label { display: block; font-size: 10px; color: #a09880; margin-bottom: 3px; letter-spacing: 1px; }
  .ctrl-group input[type="range"] { width: 100%; accent-color: #c8b478; }
  .ctrl-group .val { float: right; font-size: 10px; color: #c8b478; }

  #readout {
    position: fixed; bottom: 12px; left: 12px; z-index: 100;
    background: rgba(10, 8, 6, 0.85); border: 1px solid rgba(200, 180, 140, 0.15);
    border-radius: 8px; padding: 12px 16px; font-size: 10px; line-height: 1.6;
    backdrop-filter: blur(8px); min-width: 320px;
  }
  #readout .label { color: #807860; }
  #readout .value { color: #c8b478; }

  #ladder-display {
    position: fixed; left: 12px; top: 50%; transform: translateY(-50%); z-index: 100;
    background: rgba(10, 8, 6, 0.85); border: 1px solid rgba(200, 180, 140, 0.15);
    border-radius: 8px; padding: 12px; backdrop-filter: blur(8px);
  }
  .rung { font-size: 9px; padding: 3px 8px; margin: 2px 0; border-radius: 3px; transition: all 0.3s; }
  .rung.active { background: rgba(200, 180, 140, 0.15); color: #c8b478; }
  .rung.inactive { color: #504830; }
  .rung .dim { display: inline-block; width: 28px; }

  button.audio-btn {
    background: rgba(200, 180, 140, 0.1); border: 1px solid rgba(200, 180, 140, 0.3);
    color: #c8b478; padding: 6px 12px; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 10px; letter-spacing: 1px; margin-top: 8px; width: 100%;
  }
  button.audio-btn:hover { background: rgba(200, 180, 140, 0.2); }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="controls">
  <h2>CIRCUMPUNCT RENDERER</h2>

  <div class="ctrl-group">
    <label>BALANCE PARAMETER (half) <span class="val" id="balance-val">0.500</span></label>
    <input type="range" id="balance" min="0.01" max="0.99" step="0.001" value="0.5">
  </div>

  <div class="ctrl-group">
    <label>DIMENSIONAL DEPTH (d) <span class="val" id="dim-val">1.50</span></label>
    <input type="range" id="dim-depth" min="0" max="3" step="0.01" value="1.5">
  </div>

  <div class="ctrl-group">
    <label>PUMP SPEED <span class="val" id="pump-val">1.00</span></label>
    <input type="range" id="pump-speed" min="0.1" max="4" step="0.01" value="1.0">
  </div>

  <div class="ctrl-group">
    <label>FRACTAL DEPTH <span class="val" id="fractal-val">4</span></label>
    <input type="range" id="fractal-depth" min="1" max="7" step="1" value="4">
  </div>

  <div class="ctrl-group">
    <label>FIELD OPACITY <span class="val" id="field-val">0.60</span></label>
    <input type="range" id="field-opacity" min="0" max="1" step="0.01" value="0.6">
  </div>

  <button class="audio-btn" id="audio-toggle">ACTIVATE RESONANCE</button>
</div>

<div id="ladder-display">
  <div class="rung inactive" id="rung-0"><span class="dim">0D</span> alpha (point)</div>
  <div class="rung inactive" id="rung-05"><span class="dim">0.5D</span> c (convergence)</div>
  <div class="rung inactive" id="rung-1"><span class="dim">1D</span> hbar (line)</div>
  <div class="rung inactive" id="rung-15"><span class="dim">1.5D</span> mass (i-turn)</div>
  <div class="rung inactive" id="rung-2"><span class="dim">2D</span> gauge (field)</div>
  <div class="rung inactive" id="rung-25"><span class="dim">2.5D</span> v/Lambda (emergence)</div>
  <div class="rung inactive" id="rung-3"><span class="dim">3D</span> G (boundary)</div>
</div>

<div id="readout">
  <span class="label">PUMP PHASE:</span> <span class="value" id="ro-phase">convergence</span><br>
  <span class="label">L(d):</span> <span class="value" id="ro-lucas">3.000</span>
  <span class="label" style="margin-left:12px">F(d):</span> <span class="value" id="ro-fib">2.000</span><br>
  <span class="label">A(d):</span> <span class="value" id="ro-accum">6.000</span>
  <span class="label" style="margin-left:12px">D_fractal:</span> <span class="value" id="ro-fractal">1.500</span><br>
  <span class="label">E_convergence:</span> <span class="value" id="ro-conv">0.000</span>
  <span class="label" style="margin-left:12px">E_emergence:</span> <span class="value" id="ro-emer">0.000</span><br>
  <span class="label">OPERATOR:</span> <span class="value" id="ro-op">i^0 = +1</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const THREE = window.THREE;

// ============================================================
// FRAMEWORK CONSTANTS
// ============================================================
const PHI = (1 + Math.sqrt(5)) / 2;        // golden ratio
const PHI_INV = 1 / PHI;                    // 1/phi
const T = 3;                                 // the triad (self-determining)
const R = T * T - 2;                         // 7 rungs
const G = T * (T + 1);                       // 12 generators
const G1 = G + 1;                            // 13 (generators + whole)
const S = Math.pow(T + 1, T);               // 64 states
const P = T + 1;                             // 4 pump phases
const BASE_FREQ = 528;                       // Hz (love frequency)

// Exponent weights for the pump cycle
const E_HALF = G1 / (T * (T + 1));          // 13/12 = first splitting
const E_TWO_HALF = (S - (T*T - 1)) * (T*T - 2) / (T * G1); // 56/39
const MEDIATOR = Math.pow(T, T) / 2;        // 27/2 = 13.5
const E_THREE = 21;                          // full ladder

// ============================================================
// MATHEMATICAL PRIMITIVES
// ============================================================

// Lucas function (continuous): L(x) = phi^x + phi^(-x)
function L(x) {
  return Math.pow(PHI, x) + Math.pow(PHI_INV, x);
}

// Fibonacci function (continuous): F(x) = (phi^x - (-phi)^(-x)) / sqrt(5)
function F(x) {
  return (Math.pow(PHI, x) - Math.pow(-PHI_INV, x)) / Math.sqrt(5);
}

// Accumulated traversal: A(d) = d(2d + 1)
function A(d) {
  return d * (2 * d + 1);
}

// Fractal dimension at given balance: D = 1 + beta
function fractalDim(beta) {
  return 1 + beta;
}

// i-cycle phase: returns {re, im} for i^theta where theta cycles 0..4
function iPhase(theta) {
  const angle = (theta % 4) * Math.PI / 2;
  return { re: Math.cos(angle), im: Math.sin(angle) };
}

// Pump cycle operator weights at phase theta (0..1 normalized)
function pumpWeights(theta) {
  const t4 = theta * 4; // map to 4-stroke
  const convergence = Math.max(0, Math.cos(t4 * Math.PI / 2));
  const iTurn = Math.max(0, Math.sin(t4 * Math.PI / 2));
  const emergence = Math.max(0, -Math.cos(t4 * Math.PI / 2));
  return { convergence, iTurn, emergence };
}

// ============================================================
// RENDERER STATE
// ============================================================
const state = {
  balance: 0.5,
  dimDepth: 1.5,
  pumpSpeed: 1.0,
  fractalDepth: 4,
  fieldOpacity: 0.6,
  pumpPhase: 0,
  audioActive: false,
  time: 0
};

// ============================================================
// THREE.JS SETUP
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050404);
scene.fog = new THREE.FogExp2(0x050404, 0.08);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ============================================================
// CUSTOM SHADERS: The field IS the shader
// ============================================================

// Vertex shader: convergence operator (pulls toward center)
const vertexShader = `
  uniform float uTime;
  uniform float uBalance;
  uniform float uDimDepth;
  uniform float uPumpPhase;
  uniform float uConvergence;
  uniform float uEmergence;

  varying vec3 vPosition;
  varying vec3 vNormal;
  varying float vLucas;
  varying float vFib;
  varying float vDepth;

  // phi constants
  const float PHI = 1.6180339887;
  const float PHI_INV = 0.6180339887;

  // L(x) = phi^x + phi^(-x)
  float lucas(float x) {
    return pow(PHI, x) + pow(PHI_INV, x);
  }

  // F(x) approximation for shader
  float fib(float x) {
    return (pow(PHI, x) - pow(-PHI_INV, x)) / 2.236;
  }

  void main() {
    vPosition = position;
    vNormal = normalize(normalMatrix * normal);

    // L(d) modulates vertex displacement
    float d = uDimDepth;
    vLucas = lucas(d);
    vFib = fib(d);
    vDepth = d;

    // Pump cycle displacement
    // Convergence: vertices pull toward center
    // Emergence: vertices push outward
    float radialDist = length(position.xy);
    float convergePull = uConvergence * 0.3 * (1.0 - radialDist);
    float emergeush = uEmergence * 0.3 * radialDist;

    // i-turn: 90 degree rotation in the field plane
    float iTurnAngle = uPumpPhase * 3.14159 * 0.5;
    float cosI = cos(iTurnAngle);
    float sinI = sin(iTurnAngle);

    vec3 displaced = position;

    // Apply convergence/emergence along radial direction
    vec3 radialDir = normalize(vec3(position.xy, 0.0) + vec3(0.001));
    displaced += radialDir * (emergeush - convergePull);

    // Apply i-turn rotation
    float rotAmount = sin(uPumpPhase * 6.28318) * 0.15 * (1.0 - uBalance);
    displaced.xy = mat2(cos(rotAmount), -sin(rotAmount), sin(rotAmount), cos(rotAmount)) * displaced.xy;

    // Lucas modulation: breathing based on L(d)
    float breathe = 1.0 + 0.05 * sin(uTime * lucas(d) * 0.5);
    displaced *= breathe;

    // Balance parameter shapes the field
    // beta -> 0: scattered (vertices spread)
    // beta = 0.5: balanced
    // beta -> 1: tunnel vision (vertices compress to center)
    float balanceForce = (uBalance - 0.5) * 0.4;
    displaced += radialDir * balanceForce * radialDist;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
  }
`;

// Fragment shader: the field mediates; filtration produces color
const fragmentShader = `
  uniform float uTime;
  uniform float uBalance;
  uniform float uDimDepth;
  uniform float uPumpPhase;
  uniform float uConvergence;
  uniform float uEmergence;
  uniform float uFieldOpacity;
  uniform vec3 uApertureColor;
  uniform vec3 uFieldColor;
  uniform vec3 uBoundaryColor;

  varying vec3 vPosition;
  varying vec3 vNormal;
  varying float vLucas;
  varying float vFib;
  varying float vDepth;

  const float PHI = 1.6180339887;
  const float PI = 3.14159265;

  // Fractal dimension at balance: D = 1 + beta
  float fractalDim(float beta) {
    return 1.0 + beta;
  }

  // A(d) = d(2d+1): accumulated traversal
  float accumTraversal(float d) {
    return d * (2.0 * d + 1.0);
  }

  void main() {
    float D = fractalDim(uBalance);
    float Ad = accumTraversal(uDimDepth);

    // Fresnel: boundary reveals itself at grazing angles
    float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);

    // Color mixing based on dimensional depth
    // 0D = aperture color (gold point)
    // 2D = field color (blue-green surface)
    // 3D = boundary color (warm amber)
    float t_ap = smoothstep(0.0, 1.0, uDimDepth / 1.0);
    float t_field = smoothstep(1.0, 2.0, uDimDepth);
    float t_bound = smoothstep(2.0, 3.0, uDimDepth);

    vec3 color = mix(uApertureColor, uFieldColor, t_ap);
    color = mix(color, uBoundaryColor, t_bound);

    // Pump cycle modulates luminance
    // Convergence: inner glow intensifies
    // Emergence: outer edges brighten
    float radialDist = length(vPosition.xy);
    float innerGlow = uConvergence * exp(-radialDist * 3.0);
    float outerGlow = uEmergence * (1.0 - exp(-radialDist * 2.0));

    color += uApertureColor * innerGlow * 0.5;
    color += uBoundaryColor * outerGlow * 0.3;

    // Fresnel edge (boundary filtering)
    color += uFieldColor * fresnel * 0.4;

    // L(d) pulsation: the Lucas function modulates brightness
    float lucasPulse = 0.8 + 0.2 * sin(uTime * vLucas * 0.3);
    color *= lucasPulse;

    // Phase interference pattern (i-cycle quadrants)
    float phase = atan(vPosition.y, vPosition.x);
    float quadrant = sin(phase * 2.0 + uPumpPhase * PI * 2.0);
    color += vec3(0.05, 0.03, 0.01) * quadrant * uFieldOpacity;

    // Accumulated traversal dims color at high d (more constraints = more filtered)
    float dimming = 1.0 / (1.0 + Ad * 0.02);

    float alpha = uFieldOpacity * (0.6 + 0.4 * fresnel) * dimming;

    gl_FragColor = vec4(color * dimming, alpha);
  }
`;

// ============================================================
// CIRCUMPUNCT GEOMETRY BUILDER
// ============================================================

// Build a circumpunct at a given scale with fractal nesting
function buildCircumpunct(scale, depth, maxDepth) {
  const group = new THREE.Group();

  // The aperture (center point, 0D)
  const apertureMat = new THREE.PointsMaterial({
    color: 0xffd700,
    size: 0.08 * scale,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending
  });
  const apertureGeo = new THREE.BufferGeometry();
  apertureGeo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0], 3));
  const aperture = new THREE.Points(apertureGeo, apertureMat);
  aperture.userData = { type: 'aperture', depth };
  group.add(aperture);

  // The field (2D surface, phi)
  const fieldUniforms = {
    uTime: { value: 0 },
    uBalance: { value: 0.5 },
    uDimDepth: { value: 1.5 },
    uPumpPhase: { value: 0 },
    uConvergence: { value: 0 },
    uEmergence: { value: 0 },
    uFieldOpacity: { value: 0.6 },
    uApertureColor: { value: new THREE.Color(0.95, 0.85, 0.3) },
    uFieldColor: { value: new THREE.Color(0.2, 0.5, 0.6) },
    uBoundaryColor: { value: new THREE.Color(0.7, 0.5, 0.2) }
  };

  const fieldMat = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: fieldUniforms,
    transparent: true,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  // Field geometry: disc (2D surface)
  const fieldRadius = scale * 0.8;
  const fieldGeo = new THREE.CircleGeometry(fieldRadius, 64);
  const field = new THREE.Mesh(fieldGeo, fieldMat);
  field.userData = { type: 'field', depth, uniforms: fieldUniforms };
  group.add(field);

  // The boundary (3D sphere/ring)
  const boundaryGeo = new THREE.TorusGeometry(scale, scale * 0.02, 16, 128);
  const boundaryMat = new THREE.MeshBasicMaterial({
    color: 0xc8a050,
    transparent: true,
    opacity: 0.5,
    blending: THREE.AdditiveBlending
  });
  const boundary = new THREE.Mesh(boundaryGeo, boundaryMat);
  boundary.userData = { type: 'boundary', depth };
  group.add(boundary);

  // Worldline (1D line from center, the commitment)
  const lineGeo = new THREE.BufferGeometry();
  const linePoints = [];
  for (let i = 0; i <= 32; i++) {
    const t = i / 32;
    linePoints.push(0, 0, -scale * 0.5 + t * scale);
  }
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePoints, 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xffd700,
    transparent: true,
    opacity: 0.3,
    blending: THREE.AdditiveBlending
  });
  const worldline = new THREE.Line(lineGeo, lineMat);
  worldline.userData = { type: 'worldline', depth };
  group.add(worldline);

  // Fractal nesting (A2: parts are fractals of wholes)
  if (depth < maxDepth) {
    const childScale = scale * PHI_INV; // scale by 1/phi (self-similar)
    const numChildren = T; // triad: 3 nested circumpuncts

    for (let c = 0; c < numChildren; c++) {
      const angle = (c / numChildren) * Math.PI * 2;
      const r = scale * 0.4;
      const child = buildCircumpunct(childScale, depth + 1, maxDepth);
      child.position.set(
        Math.cos(angle) * r,
        Math.sin(angle) * r,
        0
      );
      child.userData = { childIndex: c };
      group.add(child);
    }
  }

  return group;
}

// ============================================================
// SCENE CONSTRUCTION
// ============================================================

let activeRoot = buildCircumpunct(2.0, 0, state.fractalDepth);
scene.add(activeRoot);

// Ambient particles (the foam: many tiny apertures)
const particleCount = 2000;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  // Distribute in a sphere
  const theta = Math.random() * Math.PI * 2;
  const phi_angle = Math.acos(2 * Math.random() - 1);
  const r = 3 + Math.random() * 12;
  particlePositions[i * 3] = r * Math.sin(phi_angle) * Math.cos(theta);
  particlePositions[i * 3 + 1] = r * Math.sin(phi_angle) * Math.sin(theta);
  particlePositions[i * 3 + 2] = r * Math.cos(phi_angle);
  particleSizes[i] = 0.02 + Math.random() * 0.04;
}
particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x806840,
  size: 0.03,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============================================================
// AUDIO: Resonance synthesis from the dimensional ladder
// ============================================================

let audioCtx = null;
let masterGain = null;
let oscillators = [];

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.15;
  masterGain.connect(audioCtx.destination);

  // Create oscillators for each rung of the dimensional ladder
  // Frequencies: base * phi^(rung_index), creating the phi-harmonic series
  const rungs = [0, 0.5, 1, 1.5, 2, 2.5, 3];

  rungs.forEach((d, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const panner = audioCtx.createStereoPanner();

    // Frequency from the Lucas function: base * L(d)
    const freq = BASE_FREQ * L(d) / L(1.5); // normalize to 528 at d=1.5
    osc.frequency.value = freq;

    // Waveform: sine for integer rungs (structure), triangle for half-integer (process)
    osc.type = (d % 1 === 0) ? 'sine' : 'triangle';

    // Gain: weighted by accumulated traversal (higher rungs quieter)
    gain.gain.value = 0;

    // Pan: convergent rungs left, emergent rungs right
    panner.pan.value = (d / 3) * 2 - 1; // -1 to +1

    osc.connect(gain);
    gain.connect(panner);
    panner.connect(masterGain);
    osc.start();

    oscillators.push({ osc, gain, panner, rung: d, baseFreq: freq });
  });
}

function updateAudio(dt) {
  if (!audioCtx || !state.audioActive) return;

  const weights = pumpWeights(state.pumpPhase);

  oscillators.forEach((o, i) => {
    const d = o.rung;

    // Rung activity: how active is this dimensional level?
    const dist = Math.abs(d - state.dimDepth);
    const activity = Math.exp(-dist * dist * 2); // gaussian around current depth

    // Pump modulation
    const pumpMod = (d < 1.5) ? weights.convergence : weights.emergence;
    const iTurnMod = (Math.abs(d - 1.5) < 0.3) ? weights.iTurn : 0;

    // Target gain
    const targetGain = activity * 0.08 * (0.5 + pumpMod * 0.5 + iTurnMod * 0.3);

    // Smooth transition
    const currentGain = o.gain.gain.value;
    o.gain.gain.value = currentGain + (targetGain - currentGain) * 0.05;

    // Frequency modulation by pump phase (slight vibrato)
    const freqMod = 1 + Math.sin(state.pumpPhase * Math.PI * 2) * 0.003 * pumpMod;
    o.osc.frequency.value = o.baseFreq * freqMod;
  });
}

// ============================================================
// LOD SYSTEM: A(d) determines rendering complexity
// ============================================================

function updateLOD(group, d) {
  group.traverse((child) => {
    if (!child.userData || child.userData.type === undefined) return;

    const type = child.userData.type;
    const depth = child.userData.depth || 0;

    // Visibility based on dimensional depth
    if (type === 'aperture') {
      // Points visible at low d
      child.visible = d >= 0;
      if (child.material) {
        child.material.opacity = Math.max(0, 1 - d * 0.3);
        child.material.size = 0.08 * (1 + (1 - Math.min(d, 1)) * 2);
      }
    }

    if (type === 'worldline') {
      // Lines visible from 0.5D to 1.5D
      child.visible = d >= 0.3;
      if (child.material) {
        const lineActivity = Math.exp(-Math.pow(d - 1, 2) * 2);
        child.material.opacity = lineActivity * 0.5;
      }
    }

    if (type === 'field') {
      // Surfaces visible from 1D+
      child.visible = d >= 0.8;
      if (child.material && child.material.uniforms) {
        const fieldActivity = Math.max(0, Math.min(1, (d - 0.8) / 1.2));
        child.material.uniforms.uFieldOpacity.value = fieldActivity * state.fieldOpacity;
      }
    }

    if (type === 'boundary') {
      // Boundary visible from 2D+
      child.visible = d >= 1.5;
      if (child.material) {
        const boundActivity = Math.max(0, Math.min(1, (d - 1.5) / 1.5));
        child.material.opacity = boundActivity * 0.6;
      }
    }
  });
}

// ============================================================
// UPDATE LOOP: The pump cycle IS the render loop
// ============================================================

function updatePumpCycle(dt) {
  // Advance pump phase
  state.pumpPhase = (state.pumpPhase + dt * state.pumpSpeed * 0.25) % 1;

  const weights = pumpWeights(state.pumpPhase);
  const phase = iPhase(state.pumpPhase * 4);

  // Update all field uniforms in the scene
  activeRoot.traverse((child) => {
    if (child.userData && child.userData.uniforms) {
      const u = child.userData.uniforms;
      u.uTime.value = state.time;
      u.uBalance.value = state.balance;
      u.uDimDepth.value = state.dimDepth;
      u.uPumpPhase.value = state.pumpPhase;
      u.uConvergence.value = weights.convergence;
      u.uEmergence.value = weights.emergence;
    }
  });

  // Rotate the whole structure: the pump cycle turns the aperture
  // i-turn = 90 degrees; the rotation IS the phase operator
  const rotSpeed = 0.1 * state.pumpSpeed;
  activeRoot.rotation.z += dt * rotSpeed * (0.5 + weights.iTurn * 0.5);
  activeRoot.rotation.y += dt * rotSpeed * 0.3 * phase.re;
  activeRoot.rotation.x += dt * rotSpeed * 0.1 * phase.im;

  // Convergence/emergence breathing: scale modulation
  const breathScale = 1 + 0.03 * Math.sin(state.pumpPhase * Math.PI * 2);
  activeRoot.scale.setScalar(breathScale);

  // Particles drift through the pump
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const ix = i * 3;
    const x = positions[ix];
    const y = positions[ix + 1];
    const z = positions[ix + 2];
    const r = Math.sqrt(x * x + y * y + z * z);

    if (r > 0.1) {
      // Convergent phase: particles drift inward
      // Emergent phase: particles drift outward
      const radialForce = (weights.emergence - weights.convergence) * 0.02;
      const nx = x / r, ny = y / r, nz = z / r;
      positions[ix] += nx * radialForce;
      positions[ix + 1] += ny * radialForce;
      positions[ix + 2] += nz * radialForce;

      // i-turn: lateral rotation
      const rotAmt = weights.iTurn * 0.005;
      const cosR = Math.cos(rotAmt), sinR = Math.sin(rotAmt);
      const newX = positions[ix] * cosR - positions[ix + 1] * sinR;
      const newY = positions[ix] * sinR + positions[ix + 1] * cosR;
      positions[ix] = newX;
      positions[ix + 1] = newY;
    }

    // Respawn if too far or too close
    if (r > 18 || r < 0.5) {
      const theta = Math.random() * Math.PI * 2;
      const phi_a = Math.acos(2 * Math.random() - 1);
      const newR = 4 + Math.random() * 8;
      positions[ix] = newR * Math.sin(phi_a) * Math.cos(theta);
      positions[ix + 1] = newR * Math.sin(phi_a) * Math.sin(theta);
      positions[ix + 2] = newR * Math.cos(phi_a);
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;
}

// ============================================================
// READOUT / UI UPDATE
// ============================================================

function updateReadout() {
  const d = state.dimDepth;
  const beta = state.balance;
  const weights = pumpWeights(state.pumpPhase);
  const phase = iPhase(state.pumpPhase * 4);

  // Phase name
  const stroke = state.pumpPhase * 4;
  let phaseName, opStr;
  if (stroke < 1) { phaseName = 'convergence (localization)'; opStr = 'i\u2070 = +1'; }
  else if (stroke < 2) { phaseName = 'convergence (gathering)'; opStr = 'i\u00B9 = +i'; }
  else if (stroke < 3) { phaseName = 'emergence (extension)'; opStr = 'i\u00B2 = -1'; }
  else { phaseName = 'emergence (i-turn)'; opStr = 'i\u00B3 = -i'; }

  document.getElementById('ro-phase').textContent = phaseName;
  document.getElementById('ro-lucas').textContent = L(d).toFixed(3);
  document.getElementById('ro-fib').textContent = F(d).toFixed(3);
  document.getElementById('ro-accum').textContent = A(d).toFixed(3);
  document.getElementById('ro-fractal').textContent = fractalDim(beta).toFixed(3);
  document.getElementById('ro-conv').textContent = weights.convergence.toFixed(3);
  document.getElementById('ro-emer').textContent = weights.emergence.toFixed(3);
  document.getElementById('ro-op').textContent = opStr;

  // Update ladder rung highlights
  const rungIds = ['rung-0', 'rung-05', 'rung-1', 'rung-15', 'rung-2', 'rung-25', 'rung-3'];
  const rungDims = [0, 0.5, 1, 1.5, 2, 2.5, 3];
  rungIds.forEach((id, i) => {
    const el = document.getElementById(id);
    const dist = Math.abs(rungDims[i] - d);
    if (dist < 0.3) {
      el.className = 'rung active';
      el.style.opacity = 1 - dist;
    } else {
      el.className = 'rung inactive';
      el.style.opacity = '';
    }
  });
}

// ============================================================
// CONTROLS
// ============================================================

document.getElementById('balance').addEventListener('input', (e) => {
  state.balance = parseFloat(e.target.value);
  document.getElementById('balance-val').textContent = state.balance.toFixed(3);
});

document.getElementById('dim-depth').addEventListener('input', (e) => {
  state.dimDepth = parseFloat(e.target.value);
  document.getElementById('dim-val').textContent = state.dimDepth.toFixed(2);
});

document.getElementById('pump-speed').addEventListener('input', (e) => {
  state.pumpSpeed = parseFloat(e.target.value);
  document.getElementById('pump-val').textContent = state.pumpSpeed.toFixed(2);
});

document.getElementById('field-opacity').addEventListener('input', (e) => {
  state.fieldOpacity = parseFloat(e.target.value);
  document.getElementById('field-val').textContent = state.fieldOpacity.toFixed(2);
});

document.getElementById('audio-toggle').addEventListener('click', () => {
  if (!state.audioActive) {
    if (!audioCtx) initAudio();
    else audioCtx.resume();
    state.audioActive = true;
    document.getElementById('audio-toggle').textContent = 'SILENCE RESONANCE';
  } else {
    state.audioActive = false;
    oscillators.forEach(o => o.gain.gain.value = 0);
    document.getElementById('audio-toggle').textContent = 'ACTIVATE RESONANCE';
  }
});

// Mouse orbit (simple; the aperture is the camera)
let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
document.addEventListener('mousemove', (e) => {
  targetX = (e.clientX / window.innerWidth - 0.5) * 2;
  targetY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// Scroll to change dimensional depth
document.addEventListener('wheel', (e) => {
  if (e.target.closest('#controls')) return;
  state.dimDepth = Math.max(0, Math.min(3, state.dimDepth + e.deltaY * 0.002));
  document.getElementById('dim-depth').value = state.dimDepth;
  document.getElementById('dim-val').textContent = state.dimDepth.toFixed(2);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// MAIN LOOP: Phi(t+dt) = emerge . i . converge [ Phi(t) ]
// ============================================================

let lastTime = 0;

function animate(timestamp) {
  requestAnimationFrame(animate);

  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  state.time += dt;

  // Camera follows mouse (aperture tracking)
  mouseX += (targetX - mouseX) * 0.05;
  mouseY += (targetY - mouseY) * 0.05;
  camera.position.x = mouseX * 2;
  camera.position.y = -mouseY * 2;
  camera.lookAt(0, 0, 0);

  // The pump cycle
  updatePumpCycle(dt);

  // LOD based on dimensional depth
  updateLOD(activeRoot, state.dimDepth);

  // Audio
  updateAudio(dt);

  // UI
  updateReadout();

  renderer.render(scene, camera);
}

// Handle fractal depth rebuild properly
const origFractalInput = document.getElementById('fractal-depth');
origFractalInput.addEventListener('input', (e) => {
  const newDepth = parseInt(e.target.value);
  document.getElementById('fractal-val').textContent = newDepth;
  if (newDepth !== state.fractalDepth) {
    state.fractalDepth = newDepth;
    scene.remove(activeRoot);
    activeRoot.traverse(c => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    });
    activeRoot = buildCircumpunct(2.0, 0, state.fractalDepth);
    scene.add(activeRoot);
  }
});

requestAnimationFrame(animate);
</script>
