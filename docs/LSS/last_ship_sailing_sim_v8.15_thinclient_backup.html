<!--
  Last Ship Sailing ; thin client (v8.8)
  Created: 2026-04-25
  Last updated: 2026-04-25
  Version: 8.8 SIM
  +  ability key edges (Q/E/F/V) sent to server.
  +  HUD ability slots show cooldown ring + ready glow.
  +  combat HUD: health/shield bars, weapon name, ability slots,
     team scores, round timer, speedometer, crosshair.
  +  hit markers + kill markers driven by server events.

  Pure renderer. Captures input (WASD + mouse + Space/Ctrl), sends to
  server-sim/main.ts at 64 Hz, receives state snapshots, renders the
  authoritative world. No simulation runs locally.

  Architecture matches the v8.0 plan: server holds the substrate and
  runs gameplay; clients add the 3D ○ closure on top of the broadcast
  state. Polish (LSS ship meshes, cockpit overlay, particles, post-FX)
  will be grafted on once the architecture is verified.

  Open the page after starting `bun run server-sim/main.ts` and you'll
  be in the arena immediately. Two browser windows = two players.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Ship Sailing ; sim</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #050810; font-family: 'Courier New', monospace; color: #cce; }
  body { cursor: none; }
  #canvas { display: block; width: 100%; height: 100%; }
  /* v8.5: cockpit frame overlay. The PNG has an alpha cutout in the center
     so the 3D scene shows through; the frame surrounds the viewport like
     the cockpit of the chosen loadout's ship. Hidden during lobby. */
  #cockpit-frame {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    opacity: 0; transition: opacity 0.35s ease-out;
  }
  #cockpit-frame.active { opacity: 1; }

  /* v8.6: combat HUD elements (only visible during warmup/playing) */
  #combat-hud { position: fixed; inset: 0; pointer-events: none; z-index: 6; display: none; }
  #combat-hud.active { display: block; }

  /* Top center: scores + round timer */
  #hud-scores {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; align-items: center;
    font-size: 16px; letter-spacing: 4px; font-weight: bold;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  #hud-scores .score-a { color: #ff6666; }
  #hud-scores .score-b { color: #66cc66; }
  #hud-scores .timer { color: #ffaa00; font-size: 20px; min-width: 70px; text-align: center; }
  #hud-scores .label { font-size: 9px; color: rgba(200,210,240,0.55); letter-spacing: 2px; display: block; }

  /* Bottom left: ship identity */
  #hud-ship {
    position: absolute; bottom: 100px; left: 24px;
    font-size: 12px; letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  #hud-ship .ship-name { font-size: 18px; font-weight: bold; color: #ffaa00; }
  #hud-ship .ship-class { font-size: 10px; color: rgba(200,210,240,0.55); margin-top: 2px; }

  /* Bottom center: health + shield + weapon */
  /* v8.11: circular HUD canvas overlay. Drawn above the 3D scene but below
     the cockpit frame and HUD text. The flat HULL/SHIELD bar-tracks are
     retired in favor of the canvas-drawn rings around the crosshair. */
  #circ-hud-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 4;
    display: none;
  }
  #circ-hud-canvas.active { display: block; }

  /* Compact vitals strip stays below the rings for the weapon name; the
     bar-row entries are hidden by default (rings replace them). */
  #hud-vitals {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    width: 420px; text-align: center;
  }
  .bar-row { display: none; }
  #hud-weapon {
    margin-top: 6px; font-size: 10px; letter-spacing: 2px;
    color: rgba(200,210,240,0.7);
  }
  #hud-weapon .weapon-name { color: #66ccff; font-weight: bold; }

  /* Bottom right: ability slots */
  #hud-abilities {
    position: absolute; bottom: 24px; right: 24px;
    display: flex; gap: 8px;
  }
  .ab-slot {
    width: 56px; height: 56px;
    border: 1px solid rgba(120,140,180,0.35);
    background: rgba(15,20,32,0.7);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 9px; letter-spacing: 2px;
    color: rgba(180,200,240,0.55);
    position: relative;
  }
  .ab-slot .ab-key { color: #ffaa00; font-weight: bold; font-size: 11px; }
  .ab-slot .ab-name { font-size: 7px; margin-top: 2px; text-align: center; line-height: 1.1; padding: 0 2px; }
  .ab-slot.disabled { opacity: 0.45; }
  /* v8.8: ability ready / cooldown / active visuals */
  .ab-slot.ready { border-color: rgba(255,170,0,0.6); }
  .ab-slot.ready .ab-key { color: #ffcc44; text-shadow: 0 0 6px rgba(255,170,0,0.7); }
  .ab-slot.active {
    border-color: #66ddff; background: rgba(20,40,60,0.85);
    box-shadow: inset 0 0 10px rgba(100,200,255,0.3);
  }
  .ab-slot .ab-cd-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,12,20,0.85) var(--cd, 0%), transparent var(--cd, 0%));
    pointer-events: none;
  }
  .ab-slot .ab-cd-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 14px; font-weight: bold; color: #fff;
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
    pointer-events: none;
  }

  /* Bottom: speedometer + position */
  #hud-speed {
    position: absolute; bottom: 100px; right: 24px;
    font-size: 11px; letter-spacing: 2px; text-align: right;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  #hud-speed .speed-val { color: #ffaa00; font-size: 22px; font-weight: bold; }
  #hud-speed .speed-label { font-size: 9px; color: rgba(200,210,240,0.5); letter-spacing: 3px; }

  /* Center crosshair */
  #crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 24px; height: 24px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute;
    background: rgba(255,170,0,0.85);
    box-shadow: 0 0 6px rgba(255,170,0,0.6);
  }
  #crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
  #crosshair::after  { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }

  /* Hit + kill markers (center, animated) */
  .hit-marker, .kill-marker {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; opacity: 0;
  }
  .hit-marker { width: 28px; height: 28px; }
  .hit-marker.active { animation: hitFlash 0.25s ease-out; }
  @keyframes hitFlash {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  }
  .kill-marker { width: 40px; height: 40px; }
  .kill-marker.active { animation: killFlash 0.5s ease-out; }
  @keyframes killFlash {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.6); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
  }
  .marker-svg { width: 100%; height: 100%; }
  .marker-line { stroke: rgba(255,200,80,0.95); stroke-width: 2; }
  .kill-marker .marker-line { stroke: rgba(255,80,80,1); stroke-width: 3; }
  #hud {
    position: fixed; top: 12px; left: 12px;
    font-size: 12px; line-height: 1.5;
    color: rgba(180,200,240,0.85); pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    user-select: none;
  }
  #hud .label { color: rgba(180,200,240,0.5); letter-spacing: 1px; font-size: 10px; }
  #hud .value { color: #ffaa00; font-weight: bold; }
  #hud .small { font-size: 10px; color: rgba(180,200,240,0.55); }
  #status {
    position: fixed; bottom: 12px; left: 12px;
    font-size: 10px; color: rgba(140,160,200,0.5);
  }
  /* v8.12: per-ship health bar overlays. Container is full-screen,
     pointer-events:none; individual bars are absolutely positioned via JS. */
  #ship-bars {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 7;
  }
  .ship-bar {
    position: absolute; transform: translate(-50%, -100%);
    width: 80px; height: 6px;
    background: rgba(8,12,20,0.85);
    border: 1px solid rgba(120,140,180,0.5);
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
  }
  .ship-bar > .bar-hp {
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    transform-origin: left center;
    transition: transform 0.15s ease-out, background-color 0.2s;
  }
  .ship-bar.team-a > .bar-hp { background: #ff6666; }
  .ship-bar.team-b > .bar-hp { background: #66cc66; }
  .ship-bar > .bar-shield {
    position: absolute; left: 0; right: 0;
    bottom: -3px; height: 2px;
    background: rgba(80,180,255,0.85);
    transform-origin: left center;
  }
  .ship-bar > .bar-name {
    position: absolute; left: 50%; top: -16px;
    transform: translateX(-50%);
    font-size: 10px; letter-spacing: 1px;
    color: rgba(220,230,255,0.85);
    text-shadow: 0 0 3px rgba(0,0,0,0.9);
    white-space: nowrap;
  }
  #help {
    position: fixed; top: 12px; right: 12px;
    font-size: 10px; color: rgba(140,160,200,0.55);
    text-align: right; line-height: 1.5;
  }
  #help kbd {
    background: rgba(40,50,80,0.5); border: 1px solid rgba(140,160,200,0.3);
    padding: 1px 5px; border-radius: 2px; font-size: 9px;
    color: #cce;
  }
  #connect-overlay {
    position: fixed; inset: 0;
    background: rgba(8,10,18,0.93); display: flex;
    align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.3s;
  }
  #connect-overlay.hidden { opacity: 0; pointer-events: none; }
  #connect-msg { font-size: 14px; letter-spacing: 4px; color: #ffaa00; }
  #scoreboard {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    min-width: 360px; padding: 18px 24px;
    background: rgba(8,12,22,0.92);
    border: 1px solid rgba(120,140,180,0.35);
    border-radius: 4px;
    color: #cce; font-size: 12px; letter-spacing: 1px;
    z-index: 50; pointer-events: none;
    display: none;
  }
  #scoreboard.visible { display: block; }
  #scoreboard .sb-title {
    color: #ffaa00; font-size: 14px; letter-spacing: 4px;
    text-align: center; margin-bottom: 12px;
  }
  #scoreboard .sb-cols, #scoreboard .sb-row {
    display: grid; grid-template-columns: 1fr 60px 40px 40px;
    gap: 8px; padding: 4px 6px;
  }
  #scoreboard .sb-cols { color: rgba(180,200,240,0.5); font-size: 10px; border-bottom: 1px solid rgba(120,140,180,0.25); margin-bottom: 6px; }
  #scoreboard .sb-row.team-a { color: #ff8888; }
  #scoreboard .sb-row.team-b { color: #88dd88; }
  #scoreboard .sb-row.you { background: rgba(255,170,0,0.1); color: #ffcc66; }
  #scoreboard .sb-k { text-align: right; color: #fff; }
  #scoreboard .sb-d { text-align: right; color: rgba(200,200,220,0.6); }

  /* v8.4: lobby overlay (shown while match.state === 'select') */
  #lobby {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(4,6,12,0.85);
    display: none;
    grid-template-columns: 280px 1fr 280px;
    gap: 16px; padding: 24px;
    pointer-events: auto;
  }
  #lobby.visible { display: grid; }
  #lobby .panel {
    background: rgba(10,14,24,0.85);
    border: 1px solid rgba(120,140,180,0.3);
    border-radius: 4px; padding: 14px;
    overflow-y: auto;
  }
  #lobby .panel-title {
    color: #ffaa00; font-size: 14px; letter-spacing: 4px;
    text-align: center; padding-bottom: 8px;
    border-bottom: 1px solid rgba(120,140,180,0.25);
    margin-bottom: 10px;
  }
  /* Roster panels (left + right) */
  .roster-row {
    padding: 8px 6px; margin: 3px 0;
    border-left: 3px solid transparent;
    font-size: 11px; letter-spacing: 1px;
  }
  .roster-row.you { background: rgba(255,170,0,0.08); border-left-color: #ffaa00; }
  .roster-row.team-a { color: #ff8888; }
  .roster-row.team-b { color: #88dd88; }
  .roster-row.bot { opacity: 0.65; font-style: italic; }
  .roster-row .ready-mark { color: #66cc66; float: right; }
  .roster-row .ready-mark.no { color: rgba(200,200,220,0.4); }
  .roster-row .loadout-name { display: block; font-size: 9px; color: rgba(200,200,220,0.6); margin-top: 2px; }

  /* Center: loadout picker */
  #loadout-picker {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .ld-card {
    border: 1px solid rgba(120,140,180,0.3);
    background: rgba(15,20,32,0.7);
    padding: 10px 12px; cursor: pointer;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .ld-card:hover { border-color: #ffaa00; background: rgba(40,30,15,0.6); }
  .ld-card.selected { border-color: #ffaa00; background: rgba(50,38,18,0.8); box-shadow: inset 0 0 8px rgba(255,170,0,0.2); }
  .ld-name { font-size: 13px; color: #ffaa00; font-weight: bold; letter-spacing: 2px; }
  .ld-class { font-size: 9px; color: rgba(200,200,220,0.5); letter-spacing: 1px; margin-top: 2px; }
  .ld-stats { font-size: 9px; color: rgba(200,200,220,0.55); margin-top: 6px; line-height: 1.4; }
  .ld-stats .stat-name { color: rgba(140,160,200,0.55); }
  .ld-stats .stat-val { color: #cce; }
  .ld-weapon { font-size: 9px; color: #66ccff; margin-top: 4px; }

  /* Lobby footer: switch team + ready buttons */
  #lobby-footer {
    grid-column: 1 / -1;
    display: flex; gap: 12px; justify-content: center;
    padding-top: 12px; border-top: 1px solid rgba(120,140,180,0.25);
    margin-top: 8px;
  }
  #lobby-footer button {
    padding: 12px 28px; font-family: inherit;
    font-size: 12px; letter-spacing: 3px; font-weight: bold;
    background: rgba(20,28,48,0.85);
    border: 1px solid rgba(120,140,180,0.4);
    color: #cce; cursor: pointer;
    transition: all 0.15s;
  }
  #lobby-footer button:hover { border-color: #ffaa00; color: #ffaa00; }
  #lobby-footer button.primary { border-color: #66cc66; color: #66cc66; }
  #lobby-footer button.primary:hover { background: rgba(20,40,20,0.7); }
  #lobby-footer button.ready { border-color: #ffaa00; color: #ffaa00; background: rgba(40,30,15,0.6); }

  /* Round-end overlay */
  #round-end {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(4,6,12,0.9);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  #round-end.visible { display: flex; }
  #round-end .title {
    font-size: 36px; letter-spacing: 8px; color: #ffaa00;
    margin-bottom: 24px;
  }
  #round-end .countdown {
    font-size: 16px; color: #cce; margin-top: 18px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<canvas id="circ-hud-canvas"></canvas>
<div id="ship-bars"></div>
<div id="cockpit-frame"></div>

<div id="combat-hud">
  <div id="hud-scores">
    <div><span class="label">FLEET A</span><span class="score-a" id="score-a">0</span></div>
    <div class="timer" id="round-timer">3:00</div>
    <div><span class="label">FLEET B</span><span class="score-b" id="score-b">0</span></div>
  </div>

  <div id="hud-ship">
    <div class="ship-name" id="ship-name">--</div>
    <div class="ship-class" id="ship-class">--</div>
  </div>

  <div id="hud-vitals">
    <div class="bar-row">
      <span class="bar-label">HULL</span>
      <div class="bar-track health" id="hp-track"><div class="bar-fill" id="hp-fill"></div><div class="bar-text" id="hp-text">0 / 0</div></div>
    </div>
    <div class="bar-row">
      <span class="bar-label">SHIELD</span>
      <div class="bar-track shield" id="sh-track"><div class="bar-fill" id="sh-fill"></div><div class="bar-text" id="sh-text">0 / 0</div></div>
    </div>
    <div id="hud-weapon"><span class="weapon-name" id="weapon-name">--</span></div>
  </div>

  <div id="hud-abilities">
    <div class="ab-slot" id="ab-slot-0"><span class="ab-key">Q</span><span class="ab-name" id="ab-q">--</span><div class="ab-cd-overlay" id="ab-cd-0"></div><div class="ab-cd-text" id="ab-cd-text-0"></div></div>
    <div class="ab-slot" id="ab-slot-1"><span class="ab-key">E</span><span class="ab-name" id="ab-e">--</span><div class="ab-cd-overlay" id="ab-cd-1"></div><div class="ab-cd-text" id="ab-cd-text-1"></div></div>
    <div class="ab-slot" id="ab-slot-2"><span class="ab-key">F</span><span class="ab-name" id="ab-f">--</span><div class="ab-cd-overlay" id="ab-cd-2"></div><div class="ab-cd-text" id="ab-cd-text-2"></div></div>
    <div class="ab-slot" id="ab-slot-3"><span class="ab-key">V</span><span class="ab-name" id="ab-v">CORE</span><div class="ab-cd-overlay" id="ab-cd-3"></div><div class="ab-cd-text" id="ab-cd-text-3"></div></div>

  <div id="hud-speed">
    <div class="speed-val" id="speed-val">0</div>

  <div id="crosshair"></div>
  <div class="hit-marker" id="hit-marker">
    <svg class="marker-svg" viewBox="0 0 28 28">
      <line class="marker-line" x1="4" y1="4" x2="10" y2="10" />
      <line class="marker-line" x1="24" y1="4" x2="18" y2="10" />

      <line class="marker-line" x1="24" y1="24" x2="18" y2="18" />

  <div class="kill-marker" id="kill-marker">
    <svg class="marker-svg" viewBox="0 0 40 40">
      <line class="marker-line" x1="6" y1="6" x2="14" y2="14" />
      <line class="marker-line" x1="34" y1="6" x2="26" y2="14" />
      <line class="marker-line" x1="6" y1="34" x2="14" y2="26" />
      <line class="marker-line" x1="34" y1="34" x2="26" y2="26" />
      <line class="marker-line" x1="20" y1="0" x2="20" y2="6" />
      <line class="marker-line" x1="20" y1="34" x2="20" y2="40" />
      <line class="marker-line" x1="0" y1="20" x2="6" y2="20" />
      <line class="marker-line" x1="34" y1="20" x2="40" y2="20" />
    </svg>
  </div>
</div>
<div id="hud"></div>
<div id="help">
  <kbd>WASD</kbd> move   <kbd>SPACE</kbd>/<kbd>CTRL</kbd> up/down<br>
  <kbd>MOUSE</kbd> aim   <kbd>L-CLICK</kbd> fire   <kbd>TAB</kbd> score<br>
  <kbd>Q</kbd>/<kbd>E</kbd>/<kbd>F</kbd> abilities   <kbd>V</kbd> core
</div>
<div id="status"></div>

  <div class="sb-title">SCOREBOARD</div>
  <div class="sb-cols"><span class="sb-name">NAME</span><span class="sb-team">TEAM</span><span class="sb-k">K</span><span class="sb-d">D</span></div>

  <div class="panel">

  <div class="title">ROUND END</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
'use strict';

// ============================================================================
// Net layer
// ============================================================================

const net = {
  ws: null,
  myPeerId: null,
  myEntityId: null,
  myTeam: null,
  level: null,
  state: null,           // latest server snapshot
  prevState: null,       // previous snapshot for interpolation
  prevStateTime: 0,
  stateArrivedAt: 0,
  bytesIn: 0,
  bytesOut: 0,
  msgsIn: 0,
  msgsOut: 0,
};

function connect() {
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  const url = proto + location.host + '/socket';
  const ws = new WebSocket(url);
  net.ws = ws;

  ws.onopen = () => { setStatus('connected'); };
  ws.onclose = () => { setStatus('disconnected'); showOverlay('DISCONNECTED'); };
  ws.onerror = (e) => { console.error('WS error', e); setStatus('error'); };

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    net.bytesIn += ev.data.length;
    net.msgsIn++;

    if (msg.type === 'hello') {
      net.myPeerId = msg.myPeerId;
      net.myEntityId = msg.myEntityId;
      net.myTeam = msg.team;
      net.level = msg.level;
      buildLevelMeshes(msg.level);
      buildLoadoutPicker();
      // v8.5: kick off async GLB loading. Until they arrive, ships render
      // as fallback boxes; once a load completes, the next mesh-create call
      // for that loadoutKey returns a cloned GLB.
      loadShipModels();
      // Kick the server with our default loadout pick so it has stats to
      // apply right away. Player can change before clicking READY.
      sendAction('set-loadout', { loadoutKey: pickedLoadout });
      hideOverlay();
      return;
    }

    if (msg.type === 'level') {
      // v8.7: server pushed a new map. Rebuild local meshes.
      net.level = msg.level;
      buildLevelMeshes(msg.level);
      return;
    }
    if (msg.type === 'state') {
      net.prevState = net.state;
      net.prevStateTime = net.stateArrivedAt;
      net.state = msg.payload;
      net.stateArrivedAt = performance.now();
      // v8.6: surface hit/kill events to the HUD.
      processSnapshotEvents(msg.payload);
      return;
    }

    if (msg.type === 'peer-leave') {
      // Player removal handled implicitly by the next state snapshot.
      return;
    }
  };
}

function sendInput(payload) {
  if (!net.ws || net.ws.readyState !== WebSocket.OPEN) return;
  const msg = JSON.stringify({ type: 'input', payload });
  net.ws.send(msg);
  net.bytesOut += msg.length;
  net.msgsOut++;
}

function sendAction(type, payload) {
  if (!net.ws || net.ws.readyState !== WebSocket.OPEN) return;
  net.ws.send(JSON.stringify({ type, payload: payload || {} }));
}

// Refresh the lobby roster + button states from the latest snapshot.
function updateLobby() {
  if (!net.state) return;
  const aRoster = document.getElementById('roster-a');
  const bRoster = document.getElementById('roster-b');
  if (!aRoster || !bRoster) return;
  // Build per-team rows. Humans first, sorted by peerId; bots after.
  const a = [], b = [];
  for (const p of net.state.players) {
    const row = {
      name: p.peerId === net.myPeerId ? 'YOU' : ('PEER ' + p.peerId),
      isYou: p.peerId === net.myPeerId,
      isBot: false,
      ready: !!p.ready,
      loadout: p.loadoutKey || '...',
    };
    if (p.team === 3) b.push(row); else a.push(row);
  }
  if (net.state.bots) {
    for (const bb of net.state.bots) {
      const row = {
        name: 'BOT ' + (bb.loadoutKey || ''),
        isYou: false, isBot: true, ready: true,
        loadout: bb.loadoutKey || '',
      };
      if (bb.team === 3) b.push(row); else a.push(row);
    }
  }
  const renderRow = (r, teamCls) => {
    return '<div class="roster-row ' + teamCls
      + (r.isYou ? ' you' : '') + (r.isBot ? ' bot' : '') + '">'
      + r.name + '<span class="ready-mark' + (r.ready ? '' : ' no') + '">' + (r.ready ? '✓' : '·') + '</span>'
      + '<span class="loadout-name">' + r.loadout + '</span>'
      + '</div>';
  };
  aRoster.innerHTML = a.map(r => renderRow(r, 'team-a')).join('');
  bRoster.innerHTML = b.map(r => renderRow(r, 'team-b')).join('');
}

function showLobby(show) {
  const el = document.getElementById('lobby');
  if (el) el.classList.toggle('visible', show);
  if (show) {
    // Lock pointer in lobby is annoying; always release it.
    if (document.pointerLockElement) document.exitPointerLock();
  }
}

function showRoundEnd(show) {
  const el = document.getElementById('round-end');
  if (el) el.classList.toggle('visible', show);
}

function updateRoundEnd() {
  if (!net.state) return;
  const el = document.getElementById('round-end-board');
  if (el) {
    // Reuse the scoreboard rendering by manually building rows.
    const entries = [];
    for (const p of net.state.players) {
      entries.push({ name: p.peerId === net.myPeerId ? 'YOU' : ('P ' + p.peerId), team: p.team, kills: p.kills || 0, deaths: p.deaths || 0, isYou: p.peerId === net.myPeerId });
    }
    if (net.state.bots) for (const bb of net.state.bots) entries.push({ name: 'BOT ' + (bb.loadoutKey || ''), team: bb.team, kills: bb.kills || 0, deaths: bb.deaths || 0, isYou: false });
    entries.sort((a, b) => b.kills - a.kills);
    el.innerHTML = '<div style="display:grid;grid-template-columns:200px 60px 60px 60px;gap:8px;font-size:12px;letter-spacing:1px;">'
      + entries.map(e => {
        const teamCls = e.team === 3 ? 'team-b' : 'team-a';
        const teamLabel = e.team === 3 ? 'B' : 'A';
        const youCls = e.isYou ? 'you' : '';
        return '<div class="' + teamCls + ' ' + youCls + '" style="padding:4px 8px;">' + e.name + '</div>'
          + '<div style="text-align:center;">FLT ' + teamLabel + '</div>'
          + '<div style="text-align:right;color:#fff;">' + e.kills + ' K</div>'
          + '<div style="text-align:right;color:#aaa;">' + e.deaths + ' D</div>';
      }).join('') + '</div>';
  }
  const cd = document.getElementById('round-end-countdown');
  if (cd) {
    const t = Math.max(0, net.state.match.warmupTimer || 0);
    cd.textContent = 'next lobby in ' + t.toFixed(1) + 's';
  }
}


// v8.5: cockpit frame swap. Activates the per-loadout PNG overlay during
// gameplay; hidden in lobby/round-end. The PNG path is frames/<KEY>.png.
function updateCockpitFrame() {
  const el = document.getElementById('cockpit-frame');
  if (!el || !net.state) return;
  const ms = net.state.match.state;
  const inGame = (ms === 'warmup' || ms === 'playing');
  if (!inGame) {
    el.classList.remove('active');
    return;
  }
  const myPlayer = net.state.players.find(p => p.peerId === net.myPeerId);
  const key = myPlayer && myPlayer.loadoutKey ? myPlayer.loadoutKey : null;
  if (!key) { el.classList.remove('active'); return; }
  const url = 'frames/' + key + '.png';
  if (el.dataset.url !== url) {
    el.style.backgroundImage = 'url("' + url + '")';
    el.dataset.url = url;
  }
  el.classList.add('active');
}

// Reset local ready state when a new lobby cycle begins (server bumped
// currentRound + cleared all peers' ready flags).
let _lastSeenRound = 0;
function watchLobbyReset(snap) {
  if (!snap || !snap.match) return;
  if (snap.match.currentRound !== _lastSeenRound) {
    _lastSeenRound = snap.match.currentRound;
    _localReady = false;
    const btn = document.getElementById('btn-ready');
    if (btn) { btn.textContent = 'READY'; btn.classList.remove('ready'); }
  }
}

// v8.7: track all level meshes so we can dispose them on map rotation.
const _levelMeshes = [];

function disposeLevelMeshes() {
  for (const m of _levelMeshes) {
    if (m.parent) m.parent.remove(m);
    m.traverse && m.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(x => x.dispose && x.dispose());
    });
    if (!m.traverse) {
      if (m.geometry) m.geometry.dispose();
      if (m.material) (Array.isArray(m.material) ? m.material : [m.material]).forEach(x => x.dispose && x.dispose());
    }
  }
  _levelMeshes.length = 0;
}

  const b = level.bounds;
  const sx = b.max.x - b.min.x, sy = b.max.y - b.min.y, sz = b.max.z - b.min.z;
  const cxB = (b.max.x + b.min.x) / 2, cyB = (b.max.y + b.min.y) / 2, czB = (b.max.z + b.min.z) / 2;
  {
    const geo = new THREE.BoxGeometry(sx, sy, sz);
    const mat = new THREE.MeshBasicMaterial({ color: 0x223344, wireframe: true, transparent: true, opacity: 0.06 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(cxB, cyB, czB);
    scene.add(mesh);
    _levelMeshes.push(mesh);
  }

  // Convert the wire format into the worker's expected shape.
  const spheres = (level.rooms || []).map(r => ({
    cx: r.center.x, cy: r.center.y, cz: r.center.z, r: r.radius,
  }));
  const cylinders = (level.tunnels || []).map(t => ({
    ax: t.a.x, ay: t.a.y, az: t.a.z,
    bx: t.b.x, by: t.b.y, bz: t.b.z,
    r: t.radius,
  }));
  const bounds = {
    minX: b.min.x, minY: b.min.y, minZ: b.min.z,
    maxX: b.max.x, maxY: b.max.y, maxZ: b.max.z,
  };
  const smoothK = (typeof level.sdfSmoothK === 'number') ? level.sdfSmoothK : 45;

  // Kick off the marching cubes pass. The wall mesh is built once per level
  // load (off the main thread); spawn a placeholder mesh in the meantime so
  // the player isn't staring into the void if they arrive mid-bake.
  const worker = _initMarchingCubesWorker();
  _mcPendingLevel = level;
  _mcPendingResolve = (positions, lvl) => {
    // Late callbacks (e.g. for a stale level after a fast map rotation) can
    // safely be ignored.
    if (lvl !== level) return;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.computeVertexNormals();
    // DoubleSide because the worker swaps winding (a, c, b) the same way LSS
    // does; rather than reason about which side faces the player, we just
    // render both. One mesh, ~1ms cost from doubling fragments.
    const mat = new THREE.MeshLambertMaterial({
      color: 0x1a2030,
      side: THREE.DoubleSide,
      emissive: new THREE.Color(0x445566).multiplyScalar(0.06),
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    _levelMeshes.push(mesh);
  };
  worker.postMessage({ bounds, gridRes: 64, spheres, cylinders, smoothK });

  // AABB obstacles still render as boxes (separate from the SDF surface).
  for (const box of (level.obstacles || [])) {
    const w = box.max.x - box.min.x, h = box.max.y - box.min.y, d = box.max.z - box.min.z;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshLambertMaterial({ color: 0x4d6080, flatShading: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set((box.max.x + box.min.x) / 2, (box.max.y + box.min.y) / 2, (box.max.z + box.min.z) / 2);
    scene.add(mesh);
    _levelMeshes.push(mesh);
    const edgeGeo = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x99bbdd });
    const edges = new THREE.LineSegments(edgeGeo, edgeMat);
    edges.position.copy(mesh.position);
    scene.add(edges);
    _levelMeshes.push(edges);
  }
}

// ============================================================================
// v8.5: Ship GLB loader + cache.
// One model per loadoutKey. Loaded once on hello; clones returned per
// instance (we tint the materials per team to keep red/green identification).
// ============================================================================

const SHIP_MODEL_CACHE = {};   // loadoutKey -> { ready: boolean, scene: THREE.Group | null }

function _initShipCache() {
  for (const key of LOADOUT_KEYS) {
    SHIP_MODEL_CACHE[key] = { ready: false, scene: null };
  }
}
_initShipCache();

function loadShipModels() {
  if (typeof THREE.GLTFLoader !== 'function') {
    console.warn('GLTFLoader not available; falling back to box ships');
    return;
  }
  const loader = new THREE.GLTFLoader();
  for (const key of LOADOUT_KEYS) {
    const url = 'ships/' + key.toLowerCase() + '.glb';
    loader.load(
      url,
      (gltf) => {
        const root = gltf.scene || gltf.scenes[0];
        if (!root) return;
        // Auto-fit: scale the model so its bbox max-dim is ~140 units (matches
        // chassis hullLength roughly), then face -Z (LSS convention).
        const bbox = new THREE.Box3().setFromObject(root);
        const size = bbox.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const targetSize = 200;
        const scale = maxDim > 0 ? targetSize / maxDim : 1;
        root.scale.setScalar(scale);
        // Most GLTF models face +Z; flip 180° on Y so they face -Z (the LSS
        // forward direction matching player.yaw=0).
        root.rotation.y = Math.PI;
        SHIP_MODEL_CACHE[key].scene = root;
        SHIP_MODEL_CACHE[key].ready = true;
      },
      undefined,
      (err) => {
        console.warn('failed to load ' + url + ':', err);
      }
    );
  }
}

// Build a ship mesh for a given loadoutKey + team. If the GLB is loaded,
// clone it and tint via emissive on its materials. Otherwise return a
// fallback box (so tests still work even if assets are missing).
function buildShipMesh(loadoutKey, team) {
  const teamColor = team === 3 ? 0x44bb44 : 0xff4444;
  const cached = SHIP_MODEL_CACHE[loadoutKey];
  if (cached && cached.ready && cached.scene) {
    const clone = cached.scene.clone(true);
    // Re-tint a subtle team color via emissive on every material we walk.
    clone.traverse((obj) => {
      if (obj.material) {
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const m of mats) {
          // Don't share materials between clones; cloning ensures team tints
          // don't bleed across instances.
          const mc = m.clone();
          if (mc.emissive) mc.emissive = new THREE.Color(teamColor).multiplyScalar(0.18);
          mc.emissiveIntensity = 1;
          obj.material = mats.length > 1 ? obj.material.map((_, i) => i === mats.indexOf(m) ? mc : _) : mc;
        }
      }
    });
    return clone;
  }
  // Fallback: the existing box-with-nose
  const group = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(120, 60, 180);
  const bodyMat = new THREE.MeshLambertMaterial({ color: teamColor });
  group.add(new THREE.Mesh(bodyGeo, bodyMat));
  const noseGeo = new THREE.ConeGeometry(40, 100, 6);
  const noseMat = new THREE.MeshLambertMaterial({ color: 0xffaa00 });
  const nose = new THREE.Mesh(noseGeo, noseMat);
  nose.rotation.x = -Math.PI / 2;
  nose.position.z = -130;
  group.add(nose);
  return group;
}

// ============================================================================
// Player meshes (one per peerId)
// ============================================================================

const playerMeshes = new Map();   // peerId -> THREE.Group

function getOrCreatePlayerMesh(peerId, team, loadoutKey) {
  const cached = playerMeshes.get(peerId);
  if (cached && cached.userData._loadoutKey === (loadoutKey || '__')) return cached;
  // Loadout changed (or first time) ; swap the mesh.
  if (cached) disposePlayerMesh(peerId);
  const ship = buildShipMesh(loadoutKey || 'TRACKER', team);
  ship.userData._loadoutKey = loadoutKey || '__';
  // Highlight ring for self
  if (peerId === net.myPeerId) {
    const ringGeo = new THREE.TorusGeometry(140, 3, 6, 24);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ship.add(ring);
  }
  scene.add(ship);
  playerMeshes.set(peerId, ship);
  return ship;
}

function disposePlayerMesh(peerId) {
  const m = playerMeshes.get(peerId);
  if (!m) return;
  scene.remove(m);
  m.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(x => x.dispose && x.dispose());
  });
  playerMeshes.delete(peerId);
}

// v8.1: bot meshes ; keyed by bot.id (numeric, server-assigned).
const botMeshes = new Map();   // id -> THREE.Group

function getOrCreateBotMesh(id, team, loadoutKey) {
  const cached = botMeshes.get(id);
  if (cached && cached.userData._loadoutKey === (loadoutKey || '__')) return cached;
  if (cached) disposeBotMesh(id);
  const ship = buildShipMesh(loadoutKey || 'PYRO', team);
  ship.userData._loadoutKey = loadoutKey || '__';
  // Subtle "bot" tag: a small dim sphere above the ship so you can ID them
  // visually even with the same hull as a human.
  const tagGeo = new THREE.SphereGeometry(8, 6, 4);
  const tagMat = new THREE.MeshBasicMaterial({ color: 0xcc8822, transparent: true, opacity: 0.6 });
  const tag = new THREE.Mesh(tagGeo, tagMat);
  tag.position.y = 90;
  ship.add(tag);
  scene.add(ship);
  botMeshes.set(id, ship);
  return ship;
}

function disposeBotMesh(id) {
  const m = botMeshes.get(id);
  if (!m) return;
  scene.remove(m);
  m.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(x => x.dispose && x.dispose());
  });
  botMeshes.delete(id);
}

// v8.2: projectile meshes ; small bright spheres tinted by team color.
const projMeshes = new Map();   // id -> THREE.Mesh
const _PROJ_GEO = new THREE.SphereGeometry(8, 8, 6);

function getOrCreateProjMesh(id, color) {
  let m = projMeshes.get(id);
  if (m) return m;
  const mat = new THREE.MeshBasicMaterial({ color: color || 0xffaa00 });
  const mesh = new THREE.Mesh(_PROJ_GEO, mat);
  scene.add(mesh);
  projMeshes.set(id, mesh);
  return mesh;
}

function disposeProjMesh(id) {
  const m = projMeshes.get(id);
  if (!m) return;
  scene.remove(m);
  if (m.material) m.material.dispose();
  // _PROJ_GEO is shared; do not dispose.
  projMeshes.delete(id);
}

// ============================================================================
// Input
// ============================================================================

const input = {
  forward: 0, right: 0, up: 0,
  yaw: 0, pitch: 0,
  fire: false,
  pointerLocked: false,
  // v8.8: queued ability press for next outgoing input frame (consumed once).
  pendingAbility: null,
};

// Map keyCode -> ability slot.
const ABILITY_KEYS = { 'KeyQ': 0, 'KeyE': 1, 'KeyF': 2, 'KeyV': 3 };

const keys = {};
document.addEventListener('keydown', (e) => {
  if (e.key === 'F11' || e.key === 'F12') return; // let dev tools through
  if (keys[e.code]) return; // already down ; don't fire ability twice on key-repeat
  keys[e.code] = true;
  if (e.code === 'Tab') e.preventDefault();
  if (e.code === 'Tab') showScoreboard(true);
  // v8.8: ability key edge press
  if (ABILITY_KEYS.hasOwnProperty(e.code)) {
    input.pendingAbility = ABILITY_KEYS[e.code];
  }
});
document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if (e.code === 'Tab') showScoreboard(false);
});

function showScoreboard(show) {
  const sb = document.getElementById('scoreboard');
  if (!sb) return;
  sb.classList.toggle('visible', show);
}

function updateScoreboard() {
  const rows = document.getElementById('scoreboard-rows');
  if (!rows || !net.state) return;
  const entries = [];
  for (const p of net.state.players) {
    entries.push({
      name: p.peerId === net.myPeerId ? 'YOU' : ('P ' + p.peerId),
      team: p.team, kills: p.kills || 0, deaths: p.deaths || 0,
      isYou: p.peerId === net.myPeerId,
    });
  }
  if (net.state.bots) {
    for (const b of net.state.bots) {
      entries.push({
        name: 'BOT ' + (b.loadoutKey || ''),
        team: b.team, kills: b.kills || 0, deaths: b.deaths || 0,
        isYou: false,
      });
    }
  }
  // Sort by kills desc
  entries.sort((a, b) => b.kills - a.kills);
  rows.innerHTML = entries.map(e => {
    const teamCls = e.team === 3 ? 'team-b' : 'team-a';
    const teamLabel = e.team === 3 ? 'B' : 'A';
    const youCls = e.isYou ? 'you' : '';
    return '<div class="sb-row ' + teamCls + ' ' + youCls + '">'
      + '<span class="sb-name">' + e.name + '</span>'
      + '<span class="sb-team">FLT ' + teamLabel + '</span>'
      + '<span class="sb-k">' + e.kills + '</span>'
      + '<span class="sb-d">' + e.deaths + '</span>'
      + '</div>';
  }).join('');
}

// Pointer-lock for mouse-look
const canvas = document.getElementById('canvas');
canvas.addEventListener('click', () => {
  if (!input.pointerLocked) canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  input.pointerLocked = (document.pointerLockElement === canvas);
});
document.addEventListener('mousemove', (e) => {
  if (!input.pointerLocked) return;
  const sens = 0.0025;
  input.yaw -= e.movementX * sens;
  input.pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, input.pitch - e.movementY * sens));
});
document.addEventListener('mousedown', (e) => { if (e.button === 0) input.fire = true; });
document.addEventListener('mouseup',   (e) => { if (e.button === 0) input.fire = false; });

function readKeyboard() {
  const f = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
  const r = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
  const u = (keys['Space'] ? 1 : 0) - (keys['ControlLeft'] || keys['ControlRight'] ? 1 : 0);
  input.forward = f;
  input.right = r;
  input.up = u;
}

// ============================================================================
// Camera follow
// ============================================================================

function updateCamera(myPlayer) {
  if (!myPlayer) return;
  const yaw = myPlayer.yaw, pitch = myPlayer.pitch;
  // First-person-ish: camera at player position, looking out along yaw/pitch.
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const fx = -sy * cp, fy = sp, fz = -cy * cp;
  // Camera at player position with a small forward offset
  camera.position.set(myPlayer.position.x, myPlayer.position.y + 30, myPlayer.position.z);
  camera.lookAt(
    myPlayer.position.x + fx,
    myPlayer.position.y + 30 + fy,
    myPlayer.position.z + fz,
  );
}

// ============================================================================
// Circular HUD (v8.11)
// ============================================================================
//
// Canvas-drawn rings around the crosshair, ported in spirit from the
// last_ship_sailing.html HUD. Two layers for now: a segmented health arc
// across the bottom and a thinner shield arc across the top. Speed and
// ammo arcs are deferred until the server snapshot exposes those fields.

const _circHud = (() => {
  const canvas = document.getElementById('circ-hud-canvas');
  if (!canvas) return { draw: () => {}, setActive: () => {} };
  const ctx = canvas.getContext('2d');
  let cssW = 1, cssH = 1, dpr = 1;

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    cssW = w; cssH = h;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw(player) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cssW, cssH);
    if (!player || !player.alive) return;

    const cx = cssW / 2;
    const cy = cssH / 2;

    const healthPct = (player.maxHealth > 0)
      ? Math.max(0, Math.min(1, player.health / player.maxHealth))
      : 0;
    const shieldPct = (player.maxShield > 0)
      ? Math.max(0, Math.min(1, player.shield / player.maxShield))
      : 0;

    const white = 'rgba(255,255,255,';
    const cyan  = 'rgba(100,200,255,';
    const amber = 'rgba(255,170,0,';
    const red   = 'rgba(255,50,30,';
    const green = 'rgba(100,255,150,';
    const hCol = healthPct < 0.3 ? red + '0.9)'
               : healthPct < 0.6 ? amber + '0.85)'
               : green + '0.75)';

    // ---- Health ring: segmented arc across the bottom ----
    // 5 segments along the lower semicircle so partial hits read as a
    // chunked drain rather than a smooth slide. Arc spans roughly 7 to 5
    // o'clock as in LSS.
    const r1 = 150;
    const segments = 5;
    const segGap = 0.04;
    const aStart = Math.PI * 0.65;
    const aEnd   = Math.PI * 2.35;
    const aSpan  = aEnd - aStart;

    ctx.strokeStyle = white + '0.10)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, r1, aStart, aEnd);
    ctx.stroke();

    for (let i = 0; i < segments; i++) {
      const segS = aStart + (aSpan / segments) * i + segGap / 2;
      const segE = aStart + (aSpan / segments) * (i + 1) - segGap / 2;
      const segStartPct = i / segments;
      if (healthPct > segStartPct) {
        const fillPct = Math.min(1, (healthPct - segStartPct) / (1 / segments));
        const fillEnd = segS + (segE - segS) * fillPct;
        ctx.save();
        ctx.shadowColor = hCol;
        ctx.shadowBlur = 6 + (1 - healthPct) * 10;
        ctx.strokeStyle = hCol;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(cx, cy, r1, segS, fillEnd);
        ctx.stroke();
        ctx.restore();
      }
      // Segment boundary tick
      if (i > 0) {
        const tA = aStart + (aSpan / segments) * i;
        const ix = cx + Math.cos(tA) * (r1 - 14);
        const iy = cy + Math.sin(tA) * (r1 - 14);
        const ox = cx + Math.cos(tA) * (r1 + 14);
        const oy = cy + Math.sin(tA) * (r1 + 14);
        ctx.strokeStyle = white + '0.12)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ix, iy); ctx.lineTo(ox, oy);
        ctx.stroke();
      }
    }
    // Health value below ring
    ctx.fillStyle = white + '0.6)';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(Math.ceil(player.health) + '', cx, cy + r1 + 14);

    // ---- Shield ring: smooth arc across the top ----
    const r2 = 190;
    const sStart = -Math.PI * 0.85;
    const sEnd   = -Math.PI * 0.15;
    const sSpan  = sEnd - sStart;

    ctx.strokeStyle = cyan + '0.10)';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(cx, cy, r2, sStart, sEnd);
    ctx.stroke();

    if (shieldPct > 0) {
      const fillEnd = sStart + sSpan * shieldPct;
      ctx.save();
      ctx.shadowColor = cyan + '0.85)';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = cyan + '0.6)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(cx, cy, r2, sStart, fillEnd);
      ctx.stroke();
      ctx.restore();
    }
    // Tick marks every 10%
    for (let i = 0; i <= 10; i++) {
      const a = sStart + sSpan * (i / 10);
      const inner = i % 5 === 0 ? r2 - 12 : r2 - 6;
      const outer = i % 5 === 0 ? r2 + 12 : r2 + 6;
      ctx.strokeStyle = cyan + (i % 5 === 0 ? '0.18)' : '0.10)');
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
      ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
      ctx.stroke();
    }
    // Shield value above ring
    if (player.maxShield > 0) {
      ctx.fillStyle = cyan + '0.7)';
      ctx.font = 'bold 12px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(Math.ceil(player.shield) + ' / ' + player.maxShield, cx, cy - r2 - 8);
    }
  }

  function setActive(active) {
    canvas.classList.toggle('active', !!active);
  }

  return { draw, setActive };
})();

// ============================================================================
// Per-ship health bars (v8.12)
// ============================================================================
//
// HTML overlay so the bars get crisp text rendering and don't fight with the
// 3D depth buffer. One bar per visible ship (peer or bot), positioned by
// projecting the ship's world-space position into NDC and mapping to pixels.
// Hidden when the ship is behind the camera, off-screen, dead, or the
// player's own (own ship is hidden in 1st-person anyway).

const _shipBars = (() => {
  const container = document.getElementById('ship-bars');
  if (!container) return { update: () => {}, dispose: () => {} };

  // id (peerId for players, 'bot:' + id for bots) -> element
  const bars = new Map();
  const _projVec = new THREE.Vector3();

  function _ensureBar(id, team, name) {
    let el = bars.get(id);
    if (!el) {
      el = document.createElement('div');
      el.className = 'ship-bar';
      el.innerHTML = '<div class="bar-name"></div><div class="bar-hp"></div><div class="bar-shield"></div>';
      container.appendChild(el);
      bars.set(id, el);
    }
    el.classList.toggle('team-a', team === 2);
    el.classList.toggle('team-b', team === 3);
    const nameEl = el.querySelector('.bar-name');
    if (nameEl && nameEl.textContent !== name) nameEl.textContent = name;
    return el;
  }

  function _disposeBar(id) {
    const el = bars.get(id);
    if (el && el.parentNode) el.parentNode.removeChild(el);
    bars.delete(id);
  }

  function update(snap, myPeerId, active) {
    if (!active || !snap) {
      // Tear down all bars when not in gameplay.
      for (const id of [...bars.keys()]) _disposeBar(id);
      return;
    }

    const w = window.innerWidth, h = window.innerHeight;
    const seen = new Set();

    function placeBar(id, entity, name) {
      // Skip dead, own ship.
      if (!entity.alive) return;
      _projVec.set(entity.position.x, entity.position.y, entity.position.z);
      // Hoist the bar a little above the ship hull so it doesn't sit on the model.
      _projVec.y += 80;
      _projVec.project(camera);
      // .z is in NDC; > 1 means behind the near plane in the projected space.
      // (Three.js convention: after .project(), z is in [-1, 1] when in view;
      // but for points behind the camera, z ends up > 1 due to perspective math.)
      if (_projVec.z > 1 || _projVec.z < -1) return;
      const sx = (_projVec.x * 0.5 + 0.5) * w;
      const sy = (-_projVec.y * 0.5 + 0.5) * h;
      // Off-screen guard with a margin so bars don't pop at the edges.
      if (sx < -100 || sx > w + 100 || sy < -50 || sy > h + 50) return;

      const el = _ensureBar(id, entity.team, name);
      el.style.left = sx + 'px';
      el.style.top = sy + 'px';
      const hpPct = (entity.maxHealth > 0)
        ? Math.max(0, Math.min(1, entity.health / entity.maxHealth))
        : 0;
      const shPct = (entity.maxShield > 0)
        ? Math.max(0, Math.min(1, entity.shield / entity.maxShield))
        : 0;
      const hp = el.querySelector('.bar-hp');
      const sh = el.querySelector('.bar-shield');
      if (hp) hp.style.transform = 'scaleX(' + hpPct + ')';

//                  └──► convolver hub ──► [convolverWide, convolverTight] ──► reverbWideGain/reverbTightGain ──► reverbGain ──► sfxBus

//
// The two convolvers run synthetic noise-decay impulse responses; wide is
// 2.4s for open rooms, tight is 0.5s for tunnels. We hold them at fixed
// 0.7/0.3 weights for now (LSS modulates this by environment raycast; that's
// a follow-up).

      // Rapid-fire dissonant pulses: clashing intervals, tight staccato.
      const pulses = 3 + Math.floor(_r() * 3);
      const baseP = _rr(1, 0.20);
      const dissonant = [1.0, 1.059, 1.122, 1.414, 1.498, 1.682, 1.888];
      for (let i = 0; i < pulses; i++) {
        const offset = i * _rr(0.025, 0.3);
        const d1 = dissonant[Math.floor(_r() * dissonant.length)];
        const d2 = dissonant[Math.floor(_r() * dissonant.length)];
        const d3 = dissonant[Math.floor(_r() * dissonant.length)];
        const vol = _rr(0.14, 0.25) * (1 - i * 0.12);
        triChord(
          [_ri(50*baseP*d1,0), _ri(63*baseP*d2,0), _ri(78*baseP*d3,0)],
          _rW(['sawtooth','square','square']),
          vol, _rr(0.04, 0.3),
          [_ri(25*baseP*d1,0), _ri(32*baseP*d2,0), _ri(40*baseP*d3,0)],
          _rr(0.03, 0.3), offset,
          { attack: 0.001, hold: 0.005, decay: _rr(0.035, 0.3) }
        );
        playNoiseBurst(_rr(0.025, 0.3), _rr(0.04, 0.3), now + offset, _ri(300 + _r() * 600, 0.3), _rr(0.7, 0.3));
      }
    }
  }

  // ---- Spatial audio (v8.14) ----
  // Position the AudioContext listener at the camera each frame so HRTF
  // panners produce correct stereo cues. Uses the deprecated setPosition/
  // setOrientation pair for r128 compatibility (the per-axis AudioParam form
  // wasn't fully supported in older Three.js demos).
  function updateListener(camera) {
    if (!initialized || !camera) return;
    const p = camera.position;
    if (ctx.listener.positionX) {
      ctx.listener.positionX.value = p.x;
      ctx.listener.positionY.value = p.y;
      ctx.listener.positionZ.value = p.z;
    } else if (ctx.listener.setPosition) {
      ctx.listener.setPosition(p.x, p.y, p.z);
    }
    // Forward and up vectors from the camera matrix.
    const m = camera.matrixWorld.elements;
    const fx = -m[8], fy = -m[9], fz = -m[10]; // -Z column
    const ux =  m[4], uy =  m[5], uz =  m[6];  // +Y column
    if (ctx.listener.forwardX) {
      ctx.listener.forwardX.value = fx;
      ctx.listener.forwardY.value = fy;
      ctx.listener.forwardZ.value = fz;
      ctx.listener.upX.value = ux;
      ctx.listener.upY.value = uy;
      ctx.listener.upZ.value = uz;
    } else if (ctx.listener.setOrientation) {
      ctx.listener.setOrientation(fx, fy, fz, ux, uy, uz);
    }
  }

  // Play a sound at a world position. Creates a PannerNode wired between
  // the dry sources and the dry bus; sets it as spatialSink so the
  // synchronous playSound dispatch routes through it. Restores the previous
  // sink after the call.
  function playSoundAt(type, pos) {
    if (!initialized || !pos) { playSound(type); return; }
    resume();
    const panner = ctx.createPanner();
    panner.panningModel = 'HRTF';
    panner.distanceModel = 'inverse';
    panner.refDistance = 200;       // sounds full-volume within 200u
    panner.maxDistance = 4000;
    panner.rolloffFactor = 1.2;
    panner.coneInnerAngle = 360;    // omnidirectional
    if (panner.positionX) {
      panner.positionX.value = pos.x;
      panner.positionY.value = pos.y;
      panner.positionZ.value = pos.z;
    } else if (panner.setPosition) {
      panner.setPosition(pos.x, pos.y, pos.z);
    }
    panner.connect(dryGain);
    const prevSink = spatialSink;
    spatialSink = panner;
    try { playSound(type); }
    finally { spatialSink = prevSink; }
  }

  // ---- Side-chain duck (v8.14) ----
  // Loud SFX call duckAmbient(depth in 0..1) to dip the ambient bed; the
  // per-frame ambient update eases the factor back to 1.0 over ~400 ms.
  function duckAmbient(depth) {
    if (depth < duckTarget) duckTarget = depth;
    if (depth < duckFactor) duckFactor = depth;
  }

  // ---- Environment probe (v8.14) ----
  // Six-direction raycast from the listener probes wall distance; short
  // average = tunnel (crossfade reverb to tight slap), long average = open
  // volume (toward wide tail). Runs every 8 frames; smoothed with a 0.25
  // weight so changes ease in.
  const _envProbeDirs = [
    { x:  1, y:  0, z:  0 },
    { x: -1, y:  0, z:  0 },
    { x:  0, y:  1, z:  0 },
    { x:  0, y: -1, z:  0 },
    { x:  0, y:  0, z:  1 },
    { x:  0, y:  0, z: -1 },
  ];
  let _envRay = null;
  function probeEnvironment(camera, levelMeshes) {
    if (!initialized || !camera || !levelMeshes || levelMeshes.length === 0) return;
    if (!_envRay) {
      _envRay = new THREE.Raycaster();
      _envRay.far = 2000;
    }
    envProbeCounter++;
    if ((envProbeCounter & 7) !== 0) return;
    const camPos = camera.position;
    let sum = 0;
    for (const d of _envProbeDirs) {
      _envRay.set(camPos, new THREE.Vector3(d.x, d.y, d.z));
      _envRay.near = 0;
      _envRay.far = 2000;
      const hit = _envRay.intersectObjects(levelMeshes, false);
      sum += (hit && hit.length) ? hit[0].distance : 2000;
    }
    const avg = sum / _envProbeDirs.length;
    // 200u = pinched tunnel, 1200u+ = wide chamber.
    const openness = Math.max(0, Math.min(1, (avg - 200) / 1000));
    envOpenness += (openness - envOpenness) * 0.25;
    if (reverbWideGain && reverbTightGain) {
      reverbWideGain.gain.value  += (envOpenness         - reverbWideGain.gain.value)  * 0.10;
      reverbTightGain.gain.value += ((1 - envOpenness)   - reverbTightGain.gain.value) * 0.10;
    }
  }

  // First user gesture unlocks the AudioContext.
  const _onGesture = () => { init(); resume(); };
  window.addEventListener('mousedown', _onGesture, { once: false });
  window.addEventListener('keydown', _onGesture, { once: false });
  window.addEventListener('touchstart', _onGesture, { once: false });

  return {
    init, resume, playSound, playSoundAt,
    startEngine: startAmbientBed,           // alias for the frame-loop call site
    setEngineSpeed: (s) => setAmbientSpeed(s, true),
    stopEngine: fadeAmbientOut,
    duckAmbient,
    updateListener,
    probeEnvironment,
    get isOn() { return initialized; },
  };
})();

// Map a loadout key to its fire SFX type and fireRate. Mirrors loadouts.ts
// on the server; centralized so audio wiring stays in one place. Snapshot
// doesn't carry weaponFireRate, so we look it up locally to throttle the
// fire SFX (otherwise rapid weapons sound much sparser than they should).
const _LOADOUT_AUDIO = {
  VORTEX:   { sfx: 'fire_hitscan',   fr: 0.25 },
  PYRO:     { sfx: 'fire_projectile', fr: 1.20 },
  PUNCTURE: { sfx: 'fire_railgun',   fr: 1.50 },
  SLAYER:   { sfx: 'fire_spread',    fr: 0.85 },
  TRACKER:  { sfx: 'fire_salvo',     fr: 0.60 },
  BLASTER:  { sfx: 'fire_minigun',   fr: 0.05 },
  SYPHON:   { sfx: 'fire_minigun',   fr: 0.09 },
};
function _fireSoundFor(loadoutKey) {
  return (_LOADOUT_AUDIO[loadoutKey] && _LOADOUT_AUDIO[loadoutKey].sfx) || 'fire_hitscan';
}
function _fireRateFor(loadoutKey) {
  return (_LOADOUT_AUDIO[loadoutKey] && _LOADOUT_AUDIO[loadoutKey].fr) || 0.25;
}

// Local-throttled fire SFX. The server is authoritative on whether a shot
// actually fires (clip empty, fireRate cooldown), but we play sound on the
// local fire press throttled to the weapon's fireRate so the player hears
// continuous firing without server-roundtrip lag. Slight desync vs server
// is inaudible; better than waiting for the projectile event to arrive.
let _lastLocalFireSoundTime = 0;
let _wasFiringLastFrame = false;
function _maybePlayLocalFire(myPlayer) {
  if (!myPlayer || !myPlayer.alive) { _wasFiringLastFrame = false; return; }
  const firing = !!input.fire;
  if (!firing) { _wasFiringLastFrame = false; return; }
  const fr = _fireRateFor(myPlayer.loadoutKey);
  const now = performance.now() / 1000;
  // First-frame fire: play immediately. Subsequent frames: throttle to fireRate.
  if (!_wasFiringLastFrame || (now - _lastLocalFireSoundTime) >= fr) {
    _audio.playSound(_fireSoundFor(myPlayer.loadoutKey));
    _lastLocalFireSoundTime = now;
  }
  _wasFiringLastFrame = true;
}

// Hit/kill/damage/fire SFX from snapshot events. Positions arrive on hit/
// kill (target position) and fire (shooter position); we route everything
// through playSoundAt for spatial cues, with the listener position synced
// to the camera each frame.
function _playEventSounds(snap, myPeerId) {
  if (!snap || !Array.isArray(snap.events) || snap.events.length === 0) return;
  for (const ev of snap.events) {
    if (ev.type === 'fire') {
      // Networked fire SFX. Skip our own fire (we play it locally with no
      // server roundtrip lag). Other peers and bots are positioned in 3D.
      if (ev.shooterPeerId && ev.shooterPeerId === myPeerId) continue;
      const sfx = _fireSoundFor(ev.loadoutKey);
      if (ev.position) _audio.playSoundAt(sfx, ev.position);
      else _audio.playSound(sfx);
    }
    else if (ev.type === 'kill') {
      // Own kill is centered (it's "I did this" feedback); other kills are
      // positioned at the dying ship.
      if (ev.shooterPeerId === myPeerId) {
        _audio.playSound('kill');
      } else if (ev.position) {
        _audio.playSoundAt('kill', ev.position);
      }
    }
    else if (ev.type === 'hit') {
      if (ev.shooterPeerId === myPeerId) {
        // Own shot landed; centered hit-confirm.
        _audio.playSound('hit');
      }
      if (ev.targetPeerId === myPeerId) {
        // We took damage; centered (it's "happening to me"). Server doesn't
        // tag shield vs hull so we approximate from current shield value.
        const me = snap.players && snap.players.find(p => p.peerId === myPeerId);
        if (me && me.shield > 0) _audio.playSound('damage_shield');
        else _audio.playSound('damage_hull');
      }
    }
  }
}

// ============================================================================
// Render loop
// ============================================================================

let inputAccum = 0;
const INPUT_HZ = 64;

let frameId = 0;
let lastFrameMs = performance.now();

function frame() {
  frameId++;
  const now = performance.now();
  const dt = Math.min(0.1, (now - lastFrameMs) / 1000);
  lastFrameMs = now;

  readKeyboard();

  // Send input at INPUT_HZ regardless of render rate
  inputAccum += dt;
  if (inputAccum >= 1 / INPUT_HZ) {
    inputAccum = 0;
    sendInput({
      forward: input.forward,
      right:   input.right,
      up:      input.up,
      yaw:     input.yaw,
      pitch:   input.pitch,
      fire:    input.fire,
      abilityPress: input.pendingAbility,
      tick:    frameId,
    });
    input.pendingAbility = null;
  }

  // Update meshes from latest state snapshot
  if (net.state) {
    const snap = net.state;
    const seenPeers = new Set();
    let myPlayer = null;
    for (const p of snap.players) {
      seenPeers.add(p.peerId);
      if (p.peerId === net.myPeerId) myPlayer = p;
      const mesh = getOrCreatePlayerMesh(p.peerId, p.team, p.loadoutKey);
      mesh.position.set(p.position.x, p.position.y, p.position.z);
      mesh.rotation.set(0, p.yaw, 0);
      mesh.visible = (p.peerId !== net.myPeerId); // hide own ship in 1st-person view
    }
    for (const peerId of playerMeshes.keys()) {
      if (!seenPeers.has(peerId)) disposePlayerMesh(peerId);
    }
    // v8.1: bots
    const seenBots = new Set();
    if (snap.bots) {
      for (const b of snap.bots) {
        seenBots.add(b.id);
        const mesh = getOrCreateBotMesh(b.id, b.team, b.loadoutKey);
        mesh.position.set(b.position.x, b.position.y, b.position.z);
        mesh.rotation.set(0, b.yaw, 0);
        mesh.visible = !!b.alive;
      }
    }
    for (const id of botMeshes.keys()) {
      if (!seenBots.has(id)) disposeBotMesh(id);
    }
    // v8.2: projectiles
    const seenProjs = new Set();
    if (snap.projectiles) {
      for (const p of snap.projectiles) {
        seenProjs.add(p.id);
        const mesh = getOrCreateProjMesh(p.id, p.color);
        mesh.position.set(p.position.x, p.position.y, p.position.z);
      }
    }
    for (const id of projMeshes.keys()) {
      if (!seenProjs.has(id)) disposeProjMesh(id);
    }
    if (myPlayer) updateCamera(myPlayer);
  }

  // HUD + lobby + roundEnd visibility, gated on match state
  updateHud();
  if (keys['Tab']) updateScoreboard();
  if (net.state && net.state.match) {
    watchLobbyReset(net.state);
    const ms = net.state.match.state;
    showLobby(ms === 'select');
    showRoundEnd(ms === 'roundEnd');
    if (ms === 'select') updateLobby();
    if (ms === 'roundEnd') updateRoundEnd();
    updateCockpitFrame();
    // v8.11: circular HUD only during active gameplay (not lobby/roundEnd).
    const inGame = (ms === 'warmup' || ms === 'playing');
    _circHud.setActive(inGame);
    if (inGame) {
      const myPlayer = net.state.players.find(p => p.peerId === net.myPeerId);
      _circHud.draw(myPlayer || null);
    }
    // v8.12: per-ship health bars (only during gameplay).
    _shipBars.update(net.state, net.myPeerId, inGame);
    // v8.13: audio. Engine drone follows local player speed; fire/hit/kill/
    // damage SFX are emitted from local press and snapshot events.
    // v8.14: listener tracks camera, environment probe modulates reverb,
    // spatial audio places remote SFX in 3D.
    _audio.updateListener(camera);
    _audio.probeEnvironment(camera, _levelMeshes);
    if (inGame) {
      const myPlayer = net.state.players.find(p => p.peerId === net.myPeerId);
      if (myPlayer && myPlayer.alive) {
        _audio.startEngine(); // idempotent
        const v = myPlayer.velocity;
        const speed = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
        const maxSpeed = myPlayer.maxSpeed || 600;
        _audio.setEngineSpeed(speed / maxSpeed);
        // v8.15.1: gate fire SFX on the same condition the server uses.
        // LSS does this implicitly: fireWeapon() early-returns during
        // warmup (line 8126), and the audio hook lives inside fireWeapon,
        // so no sound during warmup. We mirror that here so audio doesn't
        // tick out 20 imaginary shots before the match actually starts.
        if (ms === 'playing') _maybePlayLocalFire(myPlayer);
      } else {
        _audio.stopEngine();
      }
      _playEventSounds(net.state, net.myPeerId);
    } else {
      _audio.stopEngine();
    }
  } else {
    _circHud.setActive(false);
    _shipBars.update(null, null, false);
    _audio.stopEngine();
  }

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

function updateHud() {
  const hud = document.getElementById('hud');
  const combatHud = document.getElementById('combat-hud');
  if (!hud || !combatHud) return;
  const myPlayer = net.state && net.state.players.find(p => p.peerId === net.myPeerId);

  // ---- Top-left debug strip (compact) ----
  const lines = [];
  lines.push('<span class="label">PEER</span> <span class="value">' + (net.myPeerId || '...') + '</span>');
  if (net.state) {
    lines.push('<span class="label">STATE</span> <span class="value">' + net.state.match.state.toUpperCase() + '</span>');
    lines.push('<span class="label">TICK</span> <span class="value">' + net.state.tick + '</span>');
  }
  if (myPlayer) {
    lines.push('<span class="label">K/D</span> <span class="value">' + (myPlayer.kills || 0) + ' / ' + (myPlayer.deaths || 0) + '</span>');
    if (!myPlayer.alive) lines.push('<span class="value" style="color:#ff4444">DEAD ; respawning</span>');
  }
  hud.innerHTML = lines.join('<br>');

  // ---- Combat HUD (visible during warmup/playing) ----
  if (!net.state) { combatHud.classList.remove('active'); return; }
  const ms = net.state.match.state;
  const inGame = (ms === 'warmup' || ms === 'playing');
  combatHud.classList.toggle('active', inGame);
  if (!inGame) return;

  // Scores + timer
  const scoreA = document.getElementById('score-a');
  const scoreB = document.getElementById('score-b');
  if (scoreA) scoreA.textContent = String(net.state.match.scoreA || 0);
  if (scoreB) scoreB.textContent = String(net.state.match.scoreB || 0);
  const timerEl = document.getElementById('round-timer');
  if (timerEl) {
    if (ms === 'warmup') {
      timerEl.textContent = 'LAUNCH ' + Math.ceil(net.state.match.warmupTimer);
      timerEl.style.color = '#66cc66';
    } else {
      const rt = Math.max(0, net.state.match.roundTimer);
      const m = Math.floor(rt / 60), s = Math.floor(rt % 60);
      timerEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      timerEl.style.color = rt < 30 ? '#ff6666' : '#ffaa00';
    }
  }

  // Ship identity + weapon + abilities (from local LOADOUT_INFO catalog)
  if (myPlayer) {
    const key = myPlayer.loadoutKey || 'TRACKER';
    const info = LOADOUT_INFO[key] || {};
    const shipNameEl = document.getElementById('ship-name');
    const shipClassEl = document.getElementById('ship-class');
    if (shipNameEl) shipNameEl.textContent = key;
    if (shipClassEl) shipClassEl.textContent = info.className || '';
    const wnEl = document.getElementById('weapon-name');
    if (wnEl) wnEl.textContent = info.weapon || '--';

    // Health + shield bars (chassis-driven max)
    const hp = Math.max(0, myPlayer.health || 0);
    const maxHp = Math.max(1, myPlayer.maxHealth || hp || 10000);
    const hpFill = document.getElementById('hp-fill');
    const hpTrack = document.getElementById('hp-track');
    const hpText = document.getElementById('hp-text');
    if (hpFill) hpFill.style.transform = 'scaleX(' + (hp / maxHp) + ')';
    if (hpText) hpText.textContent = (hp | 0) + ' / ' + (maxHp | 0);
    if (hpTrack) {
      hpTrack.classList.remove('warn', 'crit');
      const pct = hp / maxHp;
      if (pct < 0.2) hpTrack.classList.add('crit');
      else if (pct < 0.45) hpTrack.classList.add('warn');
    }
    const sh = Math.max(0, myPlayer.shield || 0);
    const maxSh = Math.max(1, myPlayer.maxShield || sh || 3500);
    const shFill = document.getElementById('sh-fill');
    const shText = document.getElementById('sh-text');
    if (shFill) shFill.style.transform = 'scaleX(' + (sh / maxSh) + ')';
    if (shText) shText.textContent = (sh | 0) + ' / ' + (maxSh | 0);

    // Ability slot labels + cooldowns (server-driven).
    const abInfo = ABILITY_INFO[key] || { abilities: ['--', '--', '--'], core: 'CORE' };
    const slotNames = [
      abInfo.abilities[0] || '--',
      abInfo.abilities[1] || '--',
      abInfo.abilities[2] || '--',
      abInfo.core || 'CORE',
    ];
    const slotKeys = ['ab-q', 'ab-e', 'ab-f', 'ab-v'];
    // Per-loadout max cooldowns for the overlay fill ratio. Mirrors server
    // ABILITY_COOLDOWNS table; if unknown, fallback to a 10s reference.
    const maxCDs = (LOADOUT_CD_MAX[key] || [10, 10, 10, 60]);
    for (let i = 0; i < 4; i++) {
      const nameEl = document.getElementById(slotKeys[i]);
      if (nameEl) nameEl.textContent = slotNames[i];
      const slotEl = document.getElementById('ab-slot-' + i);
      const cdEl = document.getElementById('ab-cd-' + i);
      const cdTextEl = document.getElementById('ab-cd-text-' + i);
      if (!slotEl) continue;
      const cd = (myPlayer.abilityCooldowns && myPlayer.abilityCooldowns[i]) || 0;
      const active = (myPlayer.abilityActive && myPlayer.abilityActive[i]) || false;
      slotEl.classList.remove('ready', 'active', 'disabled');
      if (active) slotEl.classList.add('active');
      else if (cd <= 0) slotEl.classList.add('ready');
      else slotEl.classList.add('disabled');
      // Cooldown overlay: fill from bottom proportional to cd / max.
      const max = Math.max(0.0001, maxCDs[i]);
      const pct = Math.max(0, Math.min(100, (cd / max) * 100));
      if (cdEl) cdEl.style.setProperty('--cd', pct + '%');
      if (cdTextEl) cdTextEl.textContent = cd > 0.05 ? cd.toFixed(1) : '';
    }

    // Speedometer (server velocity)
    const v = myPlayer.velocity || { x: 0, y: 0, z: 0 };
    const sp = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
    const speedEl = document.getElementById('speed-val');
    if (speedEl) speedEl.textContent = String(sp | 0);
  }
}

// v8.6: ability name catalog ; mirrors the abilities[] in server/loadouts.ts
// for HUD display only. Behaviors arrive in v8.7+.
const ABILITY_INFO = {
  VORTEX:   { abilities: ['Laser Shot', 'Vortex Shield', 'Trip Wire'],       core: 'Laser Core' },
  PYRO:     { abilities: ['Firewall',   'Thermal Shield', 'Inc. Trap'],      core: 'Flame Core' },
  PUNCTURE: { abilities: ['Cluster Mis', 'Afterburner',   'Tether Trap'],    core: 'After Core' },
  SLAYER:   { abilities: ['Arc Wave',   'Sword Block',    'Phase Dash'],     core: 'Sword Core' },
  TRACKER:  { abilities: ['Tracker Rkt', 'Particle Wall', 'Sonar Lock'],     core: 'Salvo Core' },
  BLASTER:  { abilities: ['Power Shot', 'Gun Shield',     'Mode Switch'],    core: 'Smart Core' },
  SYPHON:   { abilities: ['Rocket Salvo','Energy Siphon', 'Rearm'],          core: 'Upgrade Core' },
};

// v8.8: per-loadout max cooldowns (mirror of server ABILITY_COOLDOWNS).
const LOADOUT_CD_MAX = {
  VORTEX:   [10, 1,  12, 60],
  PYRO:     [10, 1,  15, 60],
  PUNCTURE: [ 8, 10, 12, 60],
  SLAYER:   [ 8, 1,   6, 60],
  TRACKER:  [ 6, 14, 12, 60],
  BLASTER:  [ 8, 1,   2, 60],
  SYPHON:   [ 6, 8,  12, 60],
};

// ---- v8.6: hit / kill marker driver ----
// Process events arriving in each snapshot. We only show a marker for the
// LOCAL shooter (events whose shooterPeerId matches my peerId). Server
// drains its event queue every snapshot, so we won't double-fire.
function processSnapshotEvents(snap) {
  if (!snap || !Array.isArray(snap.events) || snap.events.length === 0) return;
  for (const ev of snap.events) {
    if (ev.shooterPeerId !== net.myPeerId) continue;
    if (ev.type === 'kill') flashKillMarker();
    else if (ev.type === 'hit') flashHitMarker();
  }
}

function flashHitMarker() {
  const el = document.getElementById('hit-marker');
  if (!el) return;
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

function flashKillMarker() {
  const el = document.getElementById('kill-marker');
  if (!el) return;
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

function setStatus(s) {
  const el = document.getElementById('status');
  if (el) el.textContent = 'NET: ' + s;
}
function showOverlay(msg) {
  const el = document.getElementById('connect-overlay');
  const m = document.getElementById('connect-msg');
  if (m) m.textContent = msg;
  if (el) el.classList.remove('hidden');
}
function hideOverlay() {
  const el = document.getElementById('connect-overlay');
  if (el) el.classList.add('hidden');
}

// Boot
connect();
requestAnimationFrame(frame);

// Expose for debugging
window.net = net;
window.scene = scene;
window.input = input;
