<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 10 Dimensions of Reality</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060608;
    --text: #F0E8D8;
    --dim: #D0C8B8;
    --faint: #8F8878;
    --infinity: rgba(255,255,255,0.95);
    --soul: #FF4545;        /* 0D   red */
    --convergence: #FF8C28; /* 0.5D orange */
    --line: #FFD840;        /* 1D   yellow */
    --branch: #60DD60;      /* 1.5D green */
    --field: #4890FF;       /* 2D   blue */
    --emerge: #6860E8;      /* 2.5D indigo */
    --boundary: #A060E0;    /* 3D   violet */
    --recurse: #E870B8;     /* 3.5D magenta */
    --whole: #D4B870;       /* whole (rainbow on symbol) */
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .poster {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1180px;
    padding: 0 1.5rem;
  }

  /* === TITLE === */
  .title {
    font-size: clamp(1.3rem, 2.6vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: clamp(1.2vh, 2vh, 2.4vh);
    text-align: center;
    background: linear-gradient(90deg,
      #FF4545 0%,
      #FF8C28 14%,
      #FFD840 28%,
      #60DD60 43%,
      #4890FF 57%,
      #6860E8 72%,
      #A060E0 86%,
      #E870B8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-shadow: 0 0 30px rgba(255,255,255,0.08);
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.1));
  }

  /* === COLUMN HEADER === */
  .col-head {
    display: grid;
    grid-template-columns: clamp(3.4rem, 5.5vw, 4.4rem) clamp(3.5rem, 6vw, 5rem) 1fr 1fr 1fr 1fr auto;
    gap: 0;
    width: 100%;
    padding: 0 clamp(0.6rem, 1.2vw, 1rem);
    margin-bottom: clamp(0.4vh, 0.7vh, 1vh);
  }

  .col-head-cell {
    font-size: clamp(0.82rem, 1.15vh, 1rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #D8CFBE;
    opacity: 0.95;
    padding: 0 clamp(0.3rem, 0.6vw, 0.5rem);
    font-weight: 500;
  }

  .col-head-cell.center { text-align: center; }

  /* === ROWS === */
  .rows {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 2px;
  }

  .row-wrap {
    border-radius: 3px;
    opacity: 0;
    animation: row-in 0.5s ease forwards;
  }

  .row {
    display: grid;
    grid-template-columns: clamp(3.4rem, 5.5vw, 4.4rem) clamp(3.5rem, 6vw, 5rem) 1fr 1fr 1fr 1fr auto;
    align-items: center;
    gap: 0;
    padding: clamp(0.4vh, 0.7vh, 0.95vh) clamp(0.6rem, 1.2vw, 1rem);
    border-radius: 3px;
    transition: filter 0.3s ease;
    user-select: none;
  }

  .row:hover { filter: brightness(1.2); }
  .row:hover .row-symbol { text-shadow: 0 0 16px var(--c); }

  .row-symbol {
    font-size: clamp(2.4rem, 4.6vh, 3.6rem);
    color: var(--c);
    text-align: center;
    line-height: 1;
    transition: text-shadow 0.3s ease;
    cursor: pointer;
  }

  .row-dim {
    font-size: clamp(1.15rem, 1.9vh, 1.4rem);
    font-weight: 600;
    color: color-mix(in srgb, var(--c) 75%, white);
    opacity: 0.95;
    white-space: nowrap;
    letter-spacing: 0.04em;
    padding-left: clamp(0.3rem, 0.6vw, 0.5rem);
    cursor: pointer;
  }

  .row-dim .istroke {
    display: block;
    font-size: 0.7em;
    font-weight: 500;
    font-style: italic;
    color: color-mix(in srgb, var(--c) 70%, white);
    opacity: 0.95;
    letter-spacing: 0.08em;
    margin-top: 0.25em;
    text-shadow: 0 0 10px color-mix(in srgb, var(--c) 45%, transparent);
  }

  .row-cell {
    font-size: clamp(0.86rem, 1.35vh, 1.05rem);
    color: rgba(255,255,255,0.95);
    line-height: 1.3;
    letter-spacing: 0.015em;
    padding: 0 clamp(0.3rem, 0.6vw, 0.5rem);
    cursor: pointer;
    transition: color 0.2s ease, background 0.2s ease;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-cell:hover {
    color: #fff;
    background: color-mix(in srgb, var(--c) 22%, transparent);
  }

  .row-cell .cell-key {
    font-weight: 600;
    color: color-mix(in srgb, var(--c) 45%, white);
    letter-spacing: 0.02em;
    text-shadow: 0 0 8px color-mix(in srgb, var(--c) 30%, transparent);
  }

  .row-cell .cell-sep {
    color: color-mix(in srgb, var(--c) 60%, white);
    opacity: 0.7;
    margin: 0 0.3em;
  }

  .row-cell .cell-teaser {
    font-style: italic;
    color: rgba(255,255,255,0.85);
  }

  /* === CHEVRON === */
  .row-chevron {
    font-size: clamp(0.75rem, 1.1vh, 0.9rem);
    color: var(--faint);
    transition: transform 0.3s ease, color 0.3s ease;
    padding-left: clamp(0.3rem, 0.6vw, 0.5rem);
    display: inline-block;
    cursor: pointer;
  }

  .row-wrap.open .row-chevron {
    transform: rotate(90deg);
    color: var(--c);
  }

  /* === DRAWER === */
  .drawer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
    padding: 0 clamp(0.6rem, 1.2vw, 1rem);
  }

  .row-wrap.open .drawer {
    max-height: 6rem;
    padding: clamp(0.3vh, 0.5vh, 0.7vh) clamp(0.6rem, 1.2vw, 1rem) clamp(0.5vh, 0.8vh, 1vh);
  }

  .drawer-inner {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 clamp(0.4rem, 0.8vw, 0.6rem);
    align-items: baseline;
    padding-left: clamp(6.9rem, 11.5vw, 9.4rem);
  }

  .drawer-id {
    font-size: clamp(0.85rem, 1.35vh, 1.05rem);
    font-weight: 600;
    color: var(--c);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .drawer-text {
    font-size: clamp(0.88rem, 1.4vh, 1.08rem);
    color: rgba(255,255,255,0.92);
    line-height: 1.5;
  }

  .drawer-from {
    font-size: clamp(0.76rem, 1.18vh, 0.92rem);
    color: #C8C0B0;
    font-style: italic;
    grid-column: 2;
    margin-top: 0.1em;
  }

  /* === COLOR BACKGROUNDS === */
  .row-wrap[data-d="infinity"]    .row { background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%); }
  .row-wrap[data-d="soul"]        .row { background: linear-gradient(90deg, rgba(255,69,69,0.12)   0%, rgba(255,69,69,0.03)   100%); }
  .row-wrap[data-d="convergence"] .row { background: linear-gradient(90deg, rgba(255,140,40,0.12)  0%, rgba(255,140,40,0.03)  100%); }
  .row-wrap[data-d="line"]        .row { background: linear-gradient(90deg, rgba(255,216,64,0.12)  0%, rgba(255,216,64,0.03)  100%); }
  .row-wrap[data-d="branch"]      .row { background: linear-gradient(90deg, rgba(96,221,96,0.12)   0%, rgba(96,221,96,0.03)   100%); }
  .row-wrap[data-d="field"]       .row { background: linear-gradient(90deg, rgba(72,144,255,0.12)  0%, rgba(72,144,255,0.03)  100%); }
  .row-wrap[data-d="emerge"]      .row { background: linear-gradient(90deg, rgba(104,96,232,0.14)  0%, rgba(104,96,232,0.03)  100%); }
  .row-wrap[data-d="boundary"]    .row { background: linear-gradient(90deg, rgba(160,96,224,0.12)  0%, rgba(160,96,224,0.03)  100%); }
  .row-wrap[data-d="recurse"]     .row { background: linear-gradient(90deg, rgba(232,112,184,0.12) 0%, rgba(232,112,184,0.03) 100%); }
  .row-wrap[data-d="whole"]       .row {
    background:
      linear-gradient(90deg,
        rgba(255,69,69,0.08)   0%,
        rgba(255,140,40,0.08) 14%,
        rgba(255,216,64,0.08) 28%,
        rgba(96,221,96,0.08)  43%,
        rgba(72,144,255,0.08) 57%,
        rgba(104,96,232,0.08) 72%,
        rgba(160,96,224,0.08) 86%,
        rgba(232,112,184,0.08) 100%);
  }

  .row-wrap.open[data-d="infinity"]    .drawer { background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); }
  .row-wrap.open[data-d="soul"]        .drawer { background: linear-gradient(90deg, rgba(255,69,69,0.06)   0%, rgba(255,69,69,0.01)   100%); }
  .row-wrap.open[data-d="convergence"] .drawer { background: linear-gradient(90deg, rgba(255,140,40,0.06)  0%, rgba(255,140,40,0.01)  100%); }
  .row-wrap.open[data-d="line"]        .drawer { background: linear-gradient(90deg, rgba(255,216,64,0.06)  0%, rgba(255,216,64,0.01)  100%); }
  .row-wrap.open[data-d="branch"]      .drawer { background: linear-gradient(90deg, rgba(96,221,96,0.06)   0%, rgba(96,221,96,0.01)   100%); }
  .row-wrap.open[data-d="field"]       .drawer { background: linear-gradient(90deg, rgba(72,144,255,0.06)  0%, rgba(72,144,255,0.01)  100%); }
  .row-wrap.open[data-d="emerge"]      .drawer { background: linear-gradient(90deg, rgba(104,96,232,0.07)  0%, rgba(104,96,232,0.01)  100%); }
  .row-wrap.open[data-d="boundary"]    .drawer { background: linear-gradient(90deg, rgba(160,96,224,0.06)  0%, rgba(160,96,224,0.01)  100%); }
  .row-wrap.open[data-d="recurse"]     .drawer { background: linear-gradient(90deg, rgba(232,112,184,0.06) 0%, rgba(232,112,184,0.01) 100%); }
  .row-wrap.open[data-d="whole"]       .drawer {
    background:
      linear-gradient(90deg,
        rgba(255,69,69,0.04)   0%,
        rgba(255,140,40,0.04) 14%,
        rgba(255,216,64,0.04) 28%,
        rgba(96,221,96,0.04)  43%,
        rgba(72,144,255,0.04) 57%,
        rgba(104,96,232,0.04) 72%,
        rgba(160,96,224,0.04) 86%,
        rgba(232,112,184,0.04) 100%);
  }

  /* Rainbow circumpunct symbol (matches title) */
  .row-wrap[data-d="whole"] .row-symbol {
    background: linear-gradient(90deg,
      #FF4545 0%,
      #FF8C28 14%,
      #FFD840 28%,
      #60DD60 43%,
      #4890FF 57%,
      #6860E8 72%,
      #A060E0 86%,
      #E870B8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.08));
  }

  .row-wrap[data-d="whole"]:hover .row-symbol {
    filter: drop-shadow(0 0 14px rgba(255,255,255,0.22));
    text-shadow: none;
  }

  /* Rainbow dim number and istroke for ⊙ */
  .row-wrap[data-d="whole"] .row-dim {
    background: linear-gradient(90deg,
      #FF4545 0%, #FF8C28 18%, #FFD840 36%, #60DD60 54%, #4890FF 72%, #A060E0 90%, #E870B8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* === SEPARATOR === */
  .sep {
    width: 40px;
    height: 1px;
    background: var(--faint);
    margin: clamp(1vh, 1.6vh, 2vh) auto;
  }

  /* === FOOTER === */
  .footer { text-align: center; }

  .footer-framework {
    font-size: clamp(0.84rem, 1.28vh, 1.02rem);
    color: #D0C8B8;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.2em;
  }

  .footer-author {
    font-size: clamp(0.9rem, 1.4vh, 1.1rem);
    color: #F0E8D8;
    letter-spacing: 0.08em;
  }

  .footer-site a {
    font-size: clamp(0.8rem, 1.18vh, 0.95rem);
    color: #A89E88;
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.3s;
  }

  .footer-site a:hover { color: var(--whole); }

  /* === MODAL === */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 2rem;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .modal-backdrop.visible {
    display: flex;
    opacity: 1;
  }

  .modal {
    position: relative;
    background: linear-gradient(145deg, #0d0d12 0%, #090910 100%);
    border: 1px solid color-mix(in srgb, var(--mc, var(--faint)) 50%, transparent);
    border-radius: 4px;
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: clamp(1.4rem, 3vh, 2.2rem);
    box-shadow: 0 0 50px color-mix(in srgb, var(--mc, #000) 20%, rgba(0,0,0,0.6));
    transform: translateY(10px);
    transition: transform 0.3s ease;
  }

  .modal-backdrop.visible .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    padding-bottom: 0.9rem;
    border-bottom: 1px solid color-mix(in srgb, var(--mc, var(--faint)) 35%, transparent);
  }

  .modal-symbol {
    font-size: 2.8rem;
    color: var(--mc, var(--text));
    line-height: 1;
    text-shadow: 0 0 18px color-mix(in srgb, var(--mc, #000) 45%, transparent);
  }

  .modal-head-text { display: flex; flex-direction: column; gap: 0.2rem; }

  .modal-dim-label {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--mc, var(--dim)) 65%, white);
    opacity: 0.85;
  }

  .modal-key {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--mc, var(--text));
    letter-spacing: 0.04em;
  }

  .modal-body {
    font-size: 0.98rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.82);
    font-family: 'EB Garamond', Georgia, serif;
  }

  .modal-body p { margin-bottom: 0.85em; }
  .modal-body p:last-child { margin-bottom: 0; }

  .modal-body .hl {
    color: color-mix(in srgb, var(--mc, white) 80%, white);
    font-weight: 500;
  }

  .modal-body .mono {
    font-family: 'Courier New', monospace;
    font-size: 0.9em;
    background: rgba(255,255,255,0.04);
    padding: 0.1em 0.35em;
    border-radius: 2px;
  }

  .modal-close {
    position: absolute;
    top: 0.6rem;
    right: 0.9rem;
    background: transparent;
    border: none;
    color: var(--dim);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem 0.5rem;
    transition: color 0.2s ease;
    font-family: inherit;
  }

  .modal-close:hover { color: var(--mc, var(--text)); }

  /* === ANIMATION === */
  .row-wrap:nth-child(1)  { animation-delay: 0.0s; }
  .row-wrap:nth-child(2)  { animation-delay: 0.05s; }
  .row-wrap:nth-child(3)  { animation-delay: 0.10s; }
  .row-wrap:nth-child(4)  { animation-delay: 0.15s; }
  .row-wrap:nth-child(5)  { animation-delay: 0.20s; }
  .row-wrap:nth-child(6)  { animation-delay: 0.25s; }
  .row-wrap:nth-child(7)  { animation-delay: 0.30s; }
  .row-wrap:nth-child(8)  { animation-delay: 0.35s; }
  .row-wrap:nth-child(9)  { animation-delay: 0.40s; }
  .row-wrap:nth-child(10) { animation-delay: 0.45s; }

  @keyframes row-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="poster">

  <div class="title">The 10 Dimensions of Reality</div>

  <div class="col-head">
    <div class="col-head-cell"></div>
    <div class="col-head-cell"></div>
    <div class="col-head-cell center">Physics</div>
    <div class="col-head-cell center">Chemistry</div>
    <div class="col-head-cell center">Biology</div>
    <div class="col-head-cell center">Ethics</div>
    <div class="col-head-cell"></div>
  </div>

  <div class="rows" id="rows"></div>

  <div class="sep"></div>

  <div class="footer">
    <div class="footer-framework">The Circumpunct Framework</div>
    <div class="footer-author">Ashman Roonz</div>
    <div class="footer-site"><a href="https://FractalReality.ca">FractalReality.ca</a></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div class="modal-header">
      <div class="modal-symbol" id="modal-symbol"></div>
      <div class="modal-head-text">
        <div class="modal-dim-label" id="modal-dim-label"></div>
        <div class="modal-key" id="modal-key"></div>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const dims = [
    {
      key: 'infinity', symbol: '\u221E', number: '\u221ED', istroke: '', name: 'undifferentiated energy',
      axiomId: 'A0', axiomText: 'There is one energy. It is everything. All else is constraints. (1 \u2260 0)', axiomFrom: '',
      physics: {
        key: 'E = 1', teaser: 'the one energy',
        body: `<p><span class="hl">E = 1</span> is axiom A0: there is one energy; all else is constraint. At the cosmological limit <span class="mono">&Phi;&infin; = &#x2299;&infin; = E</span>; at any finite scale <span class="mono">&#x2299;&lambda; = E</span> constrained to position &lambda;.</p>
        <p>Mass, charge, fields, forces: not <em>kinds of thing</em> added to the 1, but the 1 at different degrees of self-limitation. Dark energy (&Lambda;) is the 2D aspect (&Phi;) of the scale above ours, reading 69% because we are inside a finite &#x2299;.</p>
        <p>Apophatic closure: the same &infin; that opens the unified expression closes it; the end is the beginning.</p>`
      },
      chemistry: {
        key: 'pre-atomic', teaser: 'the field before elements',
        body: `<p>Before stoichiometry, before orbitals: the undivided energy that becomes every atom when A1 forces self-limitation. The quantum vacuum is <span class="hl">&Phi; at scales below measurement threshold</span>, not emptiness.</p>
        <p>Zero-point energy is the residual hum of nested apertures pumping below instrument resolution. Every chemical reaction redistributes constraints on the 1; nothing is created or destroyed because there was never more than one thing.</p>`
      },
      biology: {
        key: 'life-potential', teaser: 'constrained \u221E',
        body: `<p>A living cell is not <em>more</em> than non-life; it is <span class="hl">&infin; held in a particular configuration of constraints</span>. Metabolism is the organism continuously re-applying the four beats (&bull; &rarr; &mdash; &rarr; &Phi; &rarr; &#x25CB;) to keep wholeness stable against relaxation back toward &infin;.</p>
        <p>Death is not transition to nothing; it is release of constraints, returning the local 1 to the surrounding 1, which was always the same 1.</p>`
      },
      ethics: {
        key: 'Truth (substrate)', teaser: 'before any virtue',
        body: `<p>In <span class="mono">Reality = Truth = 1 = E = &infin; = &#x2299;</span>, <span class="hl">Truth is the substrate</span>, distinct from TRUE (the 0D virtue). Truth is a noun; TRUE is a verb. Truth is what passes through &bull; when TRUE is held.</p>
        <p>You are a flow-being, not a possession-being: truth flows through you; you are not its source. The ego hijack is collapsing these into "what I think is divine."</p>`
      }
    },
    {
      key: 'soul', symbol: '\u2022', number: '0D', istroke: 'do', name: 'point, singularity, soul, localization',
      axiomId: 'A1', axiomText: 'The 1 must self-limit; an undifferentiated 1 is indistinguishable from 0, which is impossible', axiomFrom: 'from A0',
      physics: {
        key: '\u03B1 \u2248 1/137', teaser: 'fine-structure coupling',

  }

  const rowsEl = document.getElementById('rows');
  rowsEl.innerHTML = dims.map(d => {
    const dimText = d.istroke
      ? `${d.number}<span class="istroke">${d.istroke}</span>`
      : `${d.number}`;
    const axiomFrom = d.axiomFrom ? `<span class="drawer-from">${d.axiomFrom}</span>` : '';
    return `
    <div class="row-wrap" data-d="${d.key}" style="--c: ${colorVar[d.key]};">
      <div class="row">
        <span class="row-symbol" data-toggle="1">${d.symbol}</span>
        <span class="row-dim" data-toggle="1">${dimText}</span>
        ${cellHtml('physics', d)}
        ${cellHtml('chemistry', d)}
        ${cellHtml('biology', d)}
        ${cellHtml('ethics', d)}
        <span class="row-chevron" data-toggle="1">&#x25B8;</span>
      </div>
      <div class="drawer">
        <div class="drawer-inner">
          <span class="drawer-id">${d.axiomId}</span>
          <span class="drawer-text">${d.axiomText}</span>
          ${axiomFrom}
        </div>
      </div>
    </div>`;
  }).join('');

  // Toggle drawer on symbol/dim/chevron clicks
  document.querySelectorAll('[data-toggle="1"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const wrap = el.closest('.row-wrap');
      wrap.classList.toggle('open');
    });
  });

  // Modal handling for domain cells
  const backdrop = document.getElementById('modal-backdrop');
  const modal = document.getElementById('modal');
  const modalSymbol = document.getElementById('modal-symbol');
  const modalDimLabel = document.getElementById('modal-dim-label');
  const modalKey = document.getElementById('modal-key');
  const modalBody = document.getElementById('modal-body');
  const modalClose = document.getElementById('modal-close');

  function openModal(dimKey, domain) {
    const d = dims.find(x => x.key === dimKey);
    if (!d) return;
    const data = d[domain];
    modal.style.setProperty('--mc', colorVar[dimKey]);
    modalSymbol.innerHTML = d.symbol;
    modalDimLabel.textContent = `${d.number} \u00B7 ${d.name} \u00B7 ${domainLabel[domain]}`;
    modalKey.innerHTML = data.key;
    modalBody.innerHTML = data.body;
    backdrop.classList.add('visible');
  }

  function closeModal() { backdrop.classList.remove('visible'); }

  document.querySelectorAll('.row-cell').forEach(cell => {
    cell.addEventListener('click', (e) => {
      e.stopPropagation();
      openModal(cell.dataset.key, cell.dataset.which);
    });
  });

  modalClose.addEventListener('click', closeModal);
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
