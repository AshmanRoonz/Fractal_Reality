<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Microverse Megabattle — v1.0</title>
<!--
  Project: Microverse Megabattle
  File:    v1.html (single ringing particle, substrate demo)
  Created: 2026-04-24
  Last updated: 2026-04-24
  Version: 1.0

  First build of the framework-native engine. Scope is deliberately
  single-particle; the point is to prove that ONE oscillator state drives
  three outputs (physics, video, audio) simultaneously from one source of
  truth. If this does not run, nothing upstream will.

  Framework provides the element's natural frequency from the hybridization
  station (sp3 = 1.5D) and the base-octave formula f = f0 * 2^(d/T). No
  arbitrary frequency choices; the number comes from T=3 and the chosen
  base note (A3 = 220 Hz).

  What's in:
    - ONE particle of element C (sp3, 1.5D); frequency = 220 * 2^(1.5/3)
      = 220 * sqrt(2) ≈ 311.13 Hz (D#4 / Eb4).
    - Three.js sphere that pulses with amplitude and cycles hue with phase.
    - WebAudio OscillatorNode driven from the SAME state.
    - Mouse force: cursor pushes the particle away.
    - Click: spikes amplitude (brighter + louder), decays with damping.

  What's out (v1.1+):
    - Bond physics, multiple elements, multiple particles, recipe-based
      species assembly, damage/shed, game state. Scope discipline.
-->
<style>
  html, body { margin: 0; padding: 0; background: #05080c; color: #cfd8e3; font-family: "Courier New", monospace; overflow: hidden; }
  #info {
    position: absolute; top: 12px; left: 14px; z-index: 10;
    font-size: 12px; line-height: 1.55; pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.85);
  }
  #info .title { color: #d18a2e; font-weight: bold; letter-spacing: 0.1em; }
  #info .k { color: #7ab8c4; }
  #info .dim { color: #556; }
  #state {
    position: absolute; top: 12px; right: 14px; z-index: 10;
    font-size: 11px; line-height: 1.45; pointer-events: none;
    text-align: right; text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    color: #8fa0ac;
  }
  #state .v { color: #cfd8e3; }
  #audioPrompt {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #d18a2e; z-index: 10; pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    padding: 6px 14px; border: 1px solid rgba(209,138,46,0.4);
    background: rgba(20,30,40,0.55); border-radius: 2px;
  }
  #audioPrompt.hidden { display: none; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="info">
  <div class="title">MICROVERSE MEGABATTLE v1.0</div>
  <div class="dim">substrate demo: one particle, one state, three outputs</div>
  <div>&nbsp;</div>
  <div>element: <span class="k">C</span> (sp³, 1.5D)</div>
  <div>freq: <span class="k" id="freqLabel">—</span> Hz (A3 × 2<sup>1.5/T</sup>, T=3)</div>
  <div>&nbsp;</div>
  <div><span class="k">move mouse</span> — push the particle</div>
  <div><span class="k">click</span> — spike amplitude</div>
  <div><span class="k">R</span> — reset position</div>
</div>
<div id="state">
  phase&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="v" id="sPhase">—</span><br>
  amp&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="v" id="sAmp">—</span><br>
  pos&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="v" id="sPos">—</span><br>
  audio&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="v" id="sAudio">off</span>
</div>
<div id="audioPrompt">click anywhere to enable audio</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
"use strict";

// ===========================================================================
// LAYER 0: FRAMEWORK CONSTANTS
// Pool-native integers + derived ratios. Nothing here is free-chosen; every
// value is from the framework's chemistry/dimensional math. The game-native
// choices (base frequency f0, overall scales) sit elsewhere.
// ===========================================================================
const FW = {
  T: 3,                // observer-triad count
  P: 4,                // pump phases (T+1)
  R: 7,                // rungs (T^2 - 2)
  V: 13,               // generators + whole (F(7))
  G: 12,               // generators (T(T+1))
  SU3: 8,              // T^2 - 1, SU(3) gauge generators
  PHI_n: 2,            // channel count (Lucas L(0))
  // Screening constants (Slater's, as framework ratios over P(P+1)=20).
  // Unused at v1.0 (only one element) but present so later elements derive
  // Z_eff from them instead of arbitrary numbers.
  screening: { s1s: 6/20, same: 7/20, inner: 17/20, deep: 1.0 },
  // Tetrahedral / trigonal / octahedral / linear: bond angles from T=3.
  bondAngles: {
    tetrahedral: Math.acos(-1/3),   // 109.47°, sp³
    trigonal: 2*Math.PI/3,          // 120°, sp²
    octahedral: Math.PI/2,          // 90°
    linear: Math.PI,                // 180°, sp
  },
  // Hybridization → dimensional station (from §16.4b).
  hybDim: { sp: 1.0, sp2: 2.0, sp3: 1.5, sp3d: 2.5, sp3d2: 3.0 },
  // Musical base: A3 = 220 Hz. Everything else is f0 * 2^(d/T), so each
  // step of T in the dimensional axis is one full octave.
  f0: 220,
};
FW.freqForStation = (d) => FW.f0 * Math.pow(2, d / FW.T);

// ===========================================================================
// LAYER 1: ELEMENT TABLE
// At v1.0 we have one element. Full spec for each: (Z_eff, valence, hyb, LP).
// From these, natural frequency, electronegativity, and bond properties
// follow by framework formulas. Stubs left for later elements.
// ===========================================================================
const ELEMENTS = {
  C: {
    name: "C",
    Zeff: 4,              // core element, 4 effective charges
    valence: 4,           // can form 4 bonds (sp³)
    hyb: "sp3",           // tetrahedral
    LP: 0,                // no lone pairs
    palette: {
      base: 0x3aa8b5,     // teal body
      emissive: 0x7fe8f6, // cyan glow
    },
  },
  // C2, C3, ... added at v1.1+
};
// Derive per-element natural frequency and electronegativity once at load.
for (const key in ELEMENTS) {
  const e = ELEMENTS[key];
  e.station = FW.hybDim[e.hyb];                 // dimensional home
  e.freq = FW.freqForStation(e.station);        // natural oscillator freq
  // Electronegativity (primitive; n=period-row, hardcoded to 2 for now since
  // the formula needs shell info that v1.0 doesn't model).
  e.EN = Math.pow(e.Zeff, FW.R / (FW.R + 3)) / 2; // Z_eff^(7/10)/n, n=2
}
document.getElementById("freqLabel").textContent = ELEMENTS.C.freq.toFixed(2);

// ===========================================================================
// LAYER 2-3: PARTICLE STATE
// Single particle carrying position (physics) + phase/amp/freq (oscillator).
// Everything else (visual, audio) reads from THIS object each frame.
// ===========================================================================
const particle = {
  element: ELEMENTS.C,
  // Physics
  pos: new THREE.Vector3(0, 0, 0),
  vel: new THREE.Vector3(0, 0, 0),
  // Oscillator
  phase: 0,                                 // 0..2π
  amplitude: 0.30,                          // 0..1+, gently rings at rest
  amplitudeTarget: 0.30,
  // Mass for force integration; game-native scale.
  mass: 1.0,
};

// ===========================================================================
// LAYER 5: VISUAL RENDERING
// Three.js sphere driven by particle.{phase, amplitude, pos}.
// ===========================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1620);
scene.fog = new THREE.FogExp2(0x0a1620, 0.006);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 90);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x334049, 0.5));
const keyLight = new THREE.DirectionalLight(0xffe8c8, 0.8);
keyLight.position.set(60, 80, 40);
scene.add(keyLight);

// Sphere geometry sized for visibility on a 90-unit camera. Shared material
// so v1.1's extra elements can reuse it; for now a single instance.
const sphereGeo = new THREE.SphereGeometry(12, 36, 28);
const sphereMat = new THREE.MeshStandardMaterial({
  color: ELEMENTS.C.palette.base,
  emissive: ELEMENTS.C.palette.emissive,
  emissiveIntensity: 0.5,
  roughness: 0.5,
  metalness: 0.0,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphere);

// Convert a phase in [0, 2π) to a hue offset in [0, 1). Used to cycle the
// emissive color through the spectrum as the oscillator advances. The
// particle's element base-color is the center of the cycle; phase rotates
// hue around it.
function hueFromPhase(phase) { return (phase / (2 * Math.PI)) % 1; }

// Reusable Color scratches to avoid per-frame allocation.
const _emissiveColor = new THREE.Color();
const _baseEmissive = new THREE.Color(ELEMENTS.C.palette.emissive);
const _baseHSL = {};
_baseEmissive.getHSL(_baseHSL);

function updateVisual(dt) {
  // Position
  sphere.position.copy(particle.pos);

  // Pulse scale from amplitude: base 1.0, up to +30% at amp=1.
  const scale = 1.0 + particle.amplitude * 0.30;
  sphere.scale.setScalar(scale);

  // Emissive: base hue shifted by phase, intensity scaled by amplitude.
  const hueShift = (hueFromPhase(particle.phase) - 0.5) * 0.18; // ±0.09 of hue
  _emissiveColor.setHSL((_baseHSL.h + hueShift + 1) % 1, _baseHSL.s, _baseHSL.l);
  sphereMat.emissive.copy(_emissiveColor);
  sphereMat.emissiveIntensity = 0.4 + particle.amplitude * 1.1;
}

// ===========================================================================
// LAYER 4: AUDIO SYNTHESIS
// WebAudio: OscillatorNode + GainNode. Driven every frame by particle state.
// Must be started on a user gesture (browser policy); click-to-enable is
// handled in the input section. One oscillator suffices for v1.0; v1.3+ will
// migrate to an AudioWorklet to scale to many particles cheaply.
// ===========================================================================
let audioCtx = null;
let osc = null;
let oscGain = null;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  audioCtx = new Ctx();
  osc = audioCtx.createOscillator();
  oscGain = audioCtx.createGain();
  masterGain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.value = particle.element.freq;
  oscGain.gain.value = 0.0;
  masterGain.gain.value = 0.35;  // global headroom; prevents clipping later
  osc.connect(oscGain);
  oscGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);
  osc.start();
  document.getElementById("audioPrompt").classList.add("hidden");
  document.getElementById("sAudio").textContent = "on (" + audioCtx.sampleRate + " Hz)";
}

function updateAudio() {
  if (!audioCtx) return;
  // Amplitude: smoothed at audio side (ramp to target over ~30ms) so the
  // click-spike doesn't produce a pop. setTargetAtTime uses exponential
  // approach; time constant ~0.03 reads as "near-instant but click-safe".
  const t = audioCtx.currentTime;
  oscGain.gain.setTargetAtTime(particle.amplitude * 0.6, t, 0.03);
  // Frequency: set directly (pitch can jump; ramp would add latency that
  // decouples audio from visual). For v1.0 the frequency is constant, but
  // the hook is in place for later when bonded oscillators detune.
  osc.frequency.setTargetAtTime(particle.element.freq, t, 0.02);
}

// ===========================================================================
// LAYER 6: INPUT / INTERACTION
// Mouse position in world space (projected onto the z=0 plane) becomes an
// attractor/repulsor for the particle. Click spikes amplitude. R resets.
// ===========================================================================
const input = {
  mouseWorld: new THREE.Vector3(),
  mouseActive: false,
};

// Convert window-pixel mouse to world-space point at z=0. camera is looking
// down -Z; mouseWorld stays on the z=0 plane for a clean cursor target.
const _ndc = new THREE.Vector2();
const _ray = new THREE.Raycaster();
const _planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const _hit = new THREE.Vector3();
function mouseToWorld(ev) {
  _ndc.x = (ev.clientX / window.innerWidth) * 2 - 1;
  _ndc.y = -(ev.clientY / window.innerHeight) * 2 + 1;
  _ray.setFromCamera(_ndc, camera);
  _ray.ray.intersectPlane(_planeZ, _hit);
  input.mouseWorld.copy(_hit);
  input.mouseActive = true;
}

window.addEventListener("mousemove", mouseToWorld);
window.addEventListener("mouseleave", () => { input.mouseActive = false; });
window.addEventListener("mousedown", (ev) => {
  if (!audioCtx) initAudio();
  mouseToWorld(ev);
  // Amplitude spike: add 0.6, cap at 1.5 so a rapid click doesn't runaway.
  particle.amplitudeTarget = Math.min(1.5, particle.amplitudeTarget + 0.6);
});
window.addEventListener("keydown", (ev) => {
  if (ev.code === "KeyR") {
    particle.pos.set(0, 0, 0);
    particle.vel.set(0, 0, 0);
    particle.amplitudeTarget = 0.30;
  }
});

// ===========================================================================
// LAYER 2 (PHYSICS): force integration
// Single-particle physics: mouse applies a repulsive force when within
// interaction radius; viscous damping holds the system steady; no bonds
// yet (v1.2 adds bonds). Amplitude has its own relaxation toward rest.
// ===========================================================================
const PHYS = {
  mouseRepulseRadius: 40,
  mouseRepulseStrength: 1800,
  viscosity: 0.92,            // velocity retained per frame at 60fps
  ampRestRate: 1.6,           // 1/s: rate amp-target relaxes back to 0.30
  ampRestValue: 0.30,
  ampSmoothing: 8.0,          // 1/s: rate amplitude chases amplitudeTarget
};

const _force = new THREE.Vector3();
const _toParticle = new THREE.Vector3();
function updatePhysics(dt) {
  _force.set(0, 0, 0);

  if (input.mouseActive) {
    _toParticle.subVectors(particle.pos, input.mouseWorld);
    const dist = _toParticle.length();
    if (dist > 0.0001 && dist < PHYS.mouseRepulseRadius) {
      const falloff = 1.0 - dist / PHYS.mouseRepulseRadius;
      const mag = PHYS.mouseRepulseStrength * falloff * falloff;
      _toParticle.multiplyScalar(mag / dist);
      _force.add(_toParticle);
    }
  }

  // Semi-implicit Euler: update velocity, then position.
  particle.vel.x += (_force.x / particle.mass) * dt;
  particle.vel.y += (_force.y / particle.mass) * dt;
  particle.vel.z += (_force.z / particle.mass) * dt;
  // Velocity damping (discrete-time: v *= damp^dt via Math.pow for correctness
  // at any dt; at dt=1/60, 0.92^(1/60) ≈ 0.9986 per frame, same as the v0
  // hand-rolled "v *= 0.9986" constant, but framerate-independent).
  const damp = Math.pow(PHYS.viscosity, dt);
  particle.vel.multiplyScalar(damp);
  // Position integration.
  particle.pos.x += particle.vel.x * dt;
  particle.pos.y += particle.vel.y * dt;
  particle.pos.z += particle.vel.z * dt;

  // Amplitude dynamics: target relaxes back to rest; amplitude chases target.
  particle.amplitudeTarget += (PHYS.ampRestValue - particle.amplitudeTarget) * PHYS.ampRestRate * dt;
  particle.amplitude += (particle.amplitudeTarget - particle.amplitude) * PHYS.ampSmoothing * dt;

  // Oscillator phase advance: d(phase)/dt = 2π * frequency. Wrap to [0, 2π).
  particle.phase = (particle.phase + 2 * Math.PI * particle.element.freq * dt) % (2 * Math.PI);
}

// ===========================================================================
// HUD STATE READOUT (for visual debugging of the substrate)
// ===========================================================================
const _hudEls = {
  phase: document.getElementById("sPhase"),
  amp:   document.getElementById("sAmp"),
  pos:   document.getElementById("sPos"),
};
let _hudTick = 0;
function updateHud(dt) {
  _hudTick += dt;
  if (_hudTick < 0.08) return;  // ~12 Hz; readable, cheap
  _hudTick = 0;
  _hudEls.phase.textContent = (particle.phase / Math.PI).toFixed(3) + " π";
  _hudEls.amp.textContent = particle.amplitude.toFixed(3);
  _hudEls.pos.textContent =
    particle.pos.x.toFixed(1) + ", " + particle.pos.y.toFixed(1);
}

// ===========================================================================
// MAIN LOOP
// Each frame: physics, visual, audio, HUD. All five reads from the one
// `particle` object; that is the whole architectural point of v1.0.
// ===========================================================================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  updatePhysics(dt);
  updateVisual(dt);
  updateAudio();
  updateHud(dt);

  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===========================================================================
// GO
// ===========================================================================
animate();

})();
</script>
</body>
</html>
