<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞ → •∞ → ⊙∞</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #sub {
    position: fixed;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(0.85rem, 2vw, 1.3rem);
    font-style: italic;
    color: rgba(255,255,255,0);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.8;
    pointer-events: none;
    transition: color 4s ease;
    width: 90%;
  }
  #sub.visible { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="sub">Reality flows through an infinite array of souls, creating an infinite number of finite beings</div>
<script>
// ===== SETUP =====
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H, cx, cy;

// ===== SOULS (grid) — declared early so resize() can call initSouls() =====
const COLS = 9, ROWS = 7;
var souls = [];

function getVP() { return { x: cx, y: cy }; }

function initSouls() {
  souls = [];
  const sx = W / (COLS + 1);
  const sy = H / (ROWS + 1);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = sx * (c + 1);
      const y = sy * (r + 1);
      const dx = x - cx, dy = y - cy;
      const distFromCenter = Math.sqrt(dx*dx + dy*dy);
      const maxDist = Math.sqrt(cx*cx + cy*cy);

      // Harmonograph parameters (unique per soul)
      const n = 2 + (Math.random() * 4 | 0);   // 2-5
      const m = 1 + (Math.random() * 3 | 0);   // 1-3
      const phaseA = Math.random() * Math.PI * 2;
      const phaseB = Math.random() * Math.PI * 2;
      const rot = Math.random() * Math.PI * 2;
      const colOff = Math.random() * 6.28;

      // Pre-compute the harmonograph trail (300 points)
      // This is the pendulum line accumulating into the field pattern
      const TRAIL_LEN = 300;
      const trail = [];
      const maxR = 32;  // max radius of the pattern
      for (let i = 0; i < TRAIL_LEN; i++) {
        const t = (i / TRAIL_LEN) * Math.PI * 2 * 4; // 4 full cycles
        // Harmonograph: superposition of two oscillations
        const r1 = maxR * (0.3 + 0.7 * Math.sin(t * 0.25 + phaseA));
        const px = r1 * Math.sin(n * t + phaseA) * Math.cos(rot) - r1 * Math.cos(m * t + phaseB) * Math.sin(rot);
        const py = r1 * Math.sin(n * t + phaseA) * Math.sin(rot) + r1 * Math.cos(m * t + phaseB) * Math.cos(rot);
        trail.push({ x: px, y: py });
      }

      // Find the outer edge points of the trail for branching
      // Group trail by angle sector, find the farthest point in each sector
      const SECTORS = 24;
      const edgePoints = [];
      const sectorMax = new Array(SECTORS).fill(0);
      const sectorPt = new Array(SECTORS).fill(null);
      for (let i = 0; i < trail.length; i++) {
        const p = trail[i];
        const dist = Math.sqrt(p.x * p.x + p.y * p.y);
        const angle = Math.atan2(p.y, p.x);
        const sector = ((angle / (Math.PI * 2) + 1) % 1 * SECTORS) | 0;
        if (dist > sectorMax[sector]) {
          sectorMax[sector] = dist;
          sectorPt[sector] = { x: p.x, y: p.y, angle, dist };
        }
      }
      for (let i = 0; i < SECTORS; i++) {
        if (sectorPt[i]) edgePoints.push(sectorPt[i]);
      }

      // Boundary particles: start scattered, attracted to edge branch points
      const BPARTS = 36;
      const bparts = [];
      for (let p = 0; p < BPARTS; p++) {
        // Target: near an edge point, pushed outward to form the boundary
        const edgePt = edgePoints[p % edgePoints.length];
        const targetAngle = edgePt ? edgePt.angle + (Math.random() - 0.5) * 0.4 : (p / BPARTS) * Math.PI * 2;
        const targetR = 38 + Math.random() * 5;

        const startR = 70 + Math.random() * 90;
        const startA = Math.random() * Math.PI * 2;
        bparts.push({
          targetAngle,
          targetR,
          startX: Math.cos(startA) * startR,
          startY: Math.sin(startA) * startR,
          size: 0.8 + Math.random() * 1.5,
          drift: Math.random() * Math.PI * 2,
          arrivalDelay: Math.random() * 0.6,
          arrivalSpeed: 0.3 + Math.random() * 1.4,
        });
      }

      souls.push({
        x, y,
        delay: (distFromCenter / maxDist) * 2.5,
        colOff,
        n, m, phaseA, phaseB, rot,
        trail,
        edgePoints,
        bparts,
      });
    }
  }
}

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  initSouls();
}
window.addEventListener('resize', resize);
resize();

// ===== TIMING =====
// Phase:  0-2   static TV
//         2-5   ∞ fades in, glowing white on static
//         5-7   ∞ collapses to iridescent •, static fading
//         7-10  static gone, • array blooms across screen
//        10-16  pendulum string emerges from each •, sweeping out a harmonograph pattern
//        13-18  accumulated trail solidifies into the field (Φ)
//        16-19  branches extend from field edges
//        17-22  boundary particles attracted by branch resonance, aggregating into ○
//        25+    settled; subtitle fades in

let t0 = null;

function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function clamp(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }
function lerp(a,b,t) { return a + (b-a)*t; }

// ===== STATIC NOISE (offscreen buffer for speed) =====
const noiseCanvas = document.createElement('canvas');
const noiseCtx = noiseCanvas.getContext('2d');
const NOISE_W = 256, NOISE_H = 256;
noiseCanvas.width = NOISE_W;
noiseCanvas.height = NOISE_H;

function makeNoise() {
  const img = noiseCtx.createImageData(NOISE_W, NOISE_H);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  noiseCtx.putImageData(img, 0, 0);
}

function drawStatic(opacity) {
  if (opacity <= 0.01) return;
  makeNoise();
  X.save();
  X.globalAlpha = opacity;
  // Tile the small noise texture across the screen with slight offset for variety
  const ox = (Math.random() * NOISE_W) | 0;
  const oy = (Math.random() * NOISE_H) | 0;
  for (let yy = -NOISE_H; yy < H + NOISE_H; yy += NOISE_H) {
    for (let xx = -NOISE_W; xx < W + NOISE_W; xx += NOISE_W) {
      X.drawImage(noiseCanvas, xx + ox, yy + oy);
    }
  }
  // CRT scanlines
  X.globalAlpha = opacity * 0.12;
  X.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) X.fillRect(0, y, W, 1);
  // Slight vignette
  const vg = X.createRadialGradient(cx, cy, H*0.2, cx, cy, H*0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  X.globalAlpha = opacity;
  X.fillStyle = vg;
  X.fillRect(0, 0, W, H);
  X.restore();
}

// ===== INFINITY SYMBOL =====
function drawInfinity(size, opacity, glow, color) {
  if (opacity <= 0 || size < 1) return;
  X.save();
  X.translate(cx, cy);
  X.globalAlpha = opacity;
  X.strokeStyle = color;
  X.lineWidth = 2.5;
  X.shadowColor = color;
  X.shadowBlur = glow;
  X.beginPath();
  for (let a = 0; a <= Math.PI * 2 + 0.01; a += 0.02) {
    const denom = 1 + Math.sin(a) * Math.sin(a);
    const px = size * Math.cos(a) / denom;
    const py = size * 0.5 * Math.sin(2 * a) / (2 * denom);
    a === 0 ? X.moveTo(px, py) : X.lineTo(px, py);
  }
  X.stroke();
  X.restore();
}

// ===== IRIDESCENT COLOR =====
function iri(t, off) {
  const r = Math.sin(t * 0.6 + off) * 127 + 128;
  const g = Math.sin(t * 0.6 + off + 2.094) * 127 + 128;
  const b = Math.sin(t * 0.6 + off + 4.189) * 127 + 128;
  return `rgb(${r|0},${g|0},${b|0})`;
}
function iriRGB(t, off) {
  return [
    Math.sin(t * 0.6 + off) * 127 + 128,
    Math.sin(t * 0.6 + off + 2.094) * 127 + 128,
    Math.sin(t * 0.6 + off + 4.189) * 127 + 128
  ];
}

// ===== DRAW: DOT (• the aperture) =====
function drawDot(x, y, radius, color, glow) {
  if (radius < 0.3) return;
  X.save();
  X.shadowColor = color;
  X.shadowBlur = glow;
  X.fillStyle = color;
  X.beginPath();
  X.arc(x, y, radius, 0, Math.PI * 2);
  X.fill();
  X.shadowBlur = 0;
  X.fillStyle = 'rgba(255,255,255,0.85)';
  X.beginPath();
  X.arc(x, y, radius * 0.35, 0, Math.PI * 2);
  X.fill();
  X.restore();
}

// ===== DRAW: TRAIL (the worldline traces out the field pattern like a harmonograph) =====
// pendulumP: 0-1 how much of the trail has been drawn so far
// trailP: 0-1 how solid the accumulated trail becomes
function drawPendulumTrail(soul, pendulumP, trailP, frame) {
  if (pendulumP <= 0.01 && trailP <= 0.01) return;
  X.save();
  const col = iriRGB(frame * 0.015, soul.colOff);
  const trail = soul.trail;
  const total = trail.length;

  const drawn = Math.floor(pendulumP * total);
  if (drawn < 2) { X.restore(); return; }

  // The accumulated trail: each segment drawn individually for fading
  // Recent segments are brighter and thicker; older ones dim and thin
  const trailAlpha = Math.max(trailP, 0.45);
  X.shadowBlur = 0;
  for (let i = 0; i < drawn - 1; i++) {
    const p0 = trail[i];
    const p1 = trail[i + 1];
    const recency = i / Math.max(1, drawn - 1);
    // Brighter overall; newest segments pop, oldest still visible
    const a = (0.2 + recency * 0.45) * trailAlpha;
    if (a < 0.01) continue;
    X.strokeStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${a})`;
    X.lineWidth = 0.4 + recency * 0.7;
    X.beginPath();
    X.moveTo(soul.x + p0.x, soul.y + p0.y);
    X.lineTo(soul.x + p1.x, soul.y + p1.y);
    X.stroke();
  }

  X.restore();
}

// ===== DRAW: BRANCHES (field edges reaching outward, attracting boundary) =====
function drawBranches(soul, progress, frame) {
  if (progress <= 0.01) return;
  X.save();
  const col = iriRGB(frame * 0.012, soul.colOff + 0.5);
  const ep = ease(progress);

  for (let i = 0; i < soul.edgePoints.length; i++) {
    const e = soul.edgePoints[i];
    // Branch extends from edge point outward
    const branchLen = lerp(0, 14, ep);
    const endX = e.x + Math.cos(e.angle) * branchLen;
    const endY = e.y + Math.sin(e.angle) * branchLen;
    // Slight wavering
    const waver = Math.sin(frame * 0.03 + i * 1.7) * 2 * ep;

    const a = 0.3 * ep;
    X.strokeStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${a})`;
    X.lineWidth = 0.6;
    X.shadowColor = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${a * 0.5})`;
    X.shadowBlur = 4;
    X.beginPath();
    X.moveTo(soul.x + e.x, soul.y + e.y);
    X.lineTo(soul.x + endX + waver, soul.y + endY);
    X.stroke();

    // Tiny glow at the branch tip (the "attractor")
    if (ep > 0.3) {
      const tipA = (ep - 0.3) * 1.4 * 0.5;
      X.fillStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${tipA})`;
      X.shadowBlur = 6;
      X.beginPath();
      X.arc(soul.x + endX + waver, soul.y + endY, 1, 0, Math.PI * 2);
      X.fill();
    }
  }
  X.restore();
}

// ===== DRAW: BOUNDARY (○ particles attracted by branch resonance) =====
function drawBoundary(soul, progress, frame) {
  if (progress <= 0.01) return;
  X.save();
  const col = iriRGB(frame * 0.01, soul.colOff + 1.5);

  let settledCount = 0;
  const positions = [];

  for (let i = 0; i < soul.bparts.length; i++) {
    const bp = soul.bparts[i];
    const pp = clamp((progress - bp.arrivalDelay) * bp.arrivalSpeed / Math.max(0.01, 1 - bp.arrivalDelay));
    if (pp <= 0) { positions.push(null); continue; }
    const ep = ease(pp);

    const wobble = Math.sin(frame * 0.02 + bp.drift) * (1 - ep) * 12;
    const targetX = Math.cos(bp.targetAngle + frame * 0.002) * bp.targetR;
    const targetY = Math.sin(bp.targetAngle + frame * 0.002) * bp.targetR;

    const px = soul.x + lerp(bp.startX, targetX, ep) + wobble * (1 - ep);
    const py = soul.y + lerp(bp.startY, targetY, ep) + Math.cos(frame * 0.025 + bp.drift) * (1 - ep) * 8;

    positions.push({ x: px, y: py, ep });

    const alpha = lerp(0.06, 0.6, ep) * pp;
    const sz = bp.size * lerp(1.5, 1, ep);

    X.fillStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${alpha})`;
    X.shadowColor = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${alpha * 0.5})`;
    X.shadowBlur = lerp(1, 7, ep);
    X.beginPath();
    X.arc(px, py, sz, 0, Math.PI * 2);
    X.fill();

    if (ep > 0.7) settledCount++;
  }

  // Faint connecting lines between adjacent settled particles
  if (settledCount > soul.bparts.length * 0.3) {
    X.shadowBlur = 3;
    X.lineWidth = 0.4;
    for (let i = 0; i < positions.length; i++) {
      const a = positions[i];
      const b = positions[(i + 1) % positions.length];
      if (!a || !b) continue;
      const pairSettle = Math.min(a.ep, b.ep);
      if (pairSettle < 0.6) continue;
      const lineAlpha = (pairSettle - 0.6) * 2.5 * 0.18;
      X.strokeStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${lineAlpha})`;
      X.beginPath();
      X.moveTo(a.x, a.y);
      X.lineTo(b.x, b.y);
      X.stroke();
    }
  }

  X.restore();
}

// ===== MAIN LOOP =====
function animate(ts) {
  if (!t0) t0 = ts;
  const el = (ts - t0) / 1000;  // elapsed seconds
  const fr = el * 60;            // frame count (60fps equivalent)

  // Clear
  X.fillStyle = '#000';
  X.fillRect(0, 0, W, H);

  // --- Phase calculations ---
  const staticAlpha = el < 2 ? 1
    : el < 5 ? lerp(1, 0.6, clamp((el-2)/3))
    : el < 7 ? lerp(0.6, 0.15, clamp((el-5)/2))
    : el < 10 ? lerp(0.15, 0, clamp((el-7)/2.5))
    : 0;

  // 1. STATIC
  drawStatic(staticAlpha);

  // 2. INFINITY SYMBOL (2s - 7s)
  if (el >= 2 && el < 7) {
    const fadeIn = ease(clamp((el - 2) / 2));       // 2-4s: fade in
    const hold = el >= 4 && el < 5 ? 1 : 0;
    const collapse = ease(clamp((el - 5) / 1.8));   // 5-6.8s: collapse
    const opacity = el < 5 ? fadeIn : (1 - collapse);
    const size = el < 5 ? 70 : lerp(70, 0, collapse);
    const glow = el < 5 ? lerp(15, 35, fadeIn) : lerp(35, 60, collapse);
    // White infinity, then iridescent burst during collapse
    drawInfinity(size, opacity, glow, '#fff');
    if (el >= 4.5) {
      const burstP = clamp((el - 4.5) / 2);
      drawInfinity(size, opacity * 0.6, glow * 1.5, iri(el * 3, 0));
    }
  }

  // 3. CENTRAL IRIDESCENT DOT (appears as ∞ collapses, 5.5s - 10s)
  if (el >= 5.5) {
    const dotIn = ease(clamp((el - 5.5) / 1.5));
    const dotFade = el > 9 ? ease(clamp((el - 9) / 1.5)) : 0;
    const dotAlpha = dotIn * (1 - dotFade);
    if (dotAlpha > 0.01) {
      const dc = iri(el * 2.5, 0);
      const r = lerp(2, 5, dotIn) * (1 - dotFade * 0.5);
      X.save();
      X.globalAlpha = dotAlpha;
      drawDot(cx, cy, r, dc, 30);
      X.restore();
    }
  }

  // 4-7. SOUL ARRAY (from 7s onward)
  if (el >= 7) {
    for (let i = 0; i < souls.length; i++) {
      const s = souls[i];
      const dotP = ease(clamp((el - 7 - s.delay) / 0.7));
      if (dotP <= 0) continue;

      // Pendulum: string emerges and starts sweeping, accumulating the trail
      // pendulumP = how far the pendulum tip has traveled through its trail
      // trailP = how bright/solid the accumulated trail is (field visibility)
      const pendulumP = clamp((el - 10 - s.delay * 0.4) / 6); // 10s-16s: tip sweeps
      const trailP = clamp((el - 13 - s.delay * 0.3) / 5);    // 13s-18s: trail solidifies

      // Branches emerge from field edges
      const branchP = clamp((el - 16 - s.delay * 0.2) / 3);   // 16s-19s

      // Boundary particles attracted by branches
      const boundP = clamp((el - 17 - s.delay * 0.2) / 5);    // 17s-22s

      // Draw in order: trail behind, branches, boundary, dot on top
      drawPendulumTrail(s, pendulumP, trailP, fr);
      drawBranches(s, branchP, fr);
      drawBoundary(s, boundP, fr);

      const dc = iri(el * 1.2, s.colOff);
      drawDot(s.x, s.y, lerp(0, 3.2, dotP), dc, 18 * dotP);
    }
  }

  // 8. SUBTITLE
  if (el >= 25) {
    document.getElementById('sub').classList.add('visible');
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
