            top: 50%;

            top: 50%;
            transform: translateY(-50%);

            align-items: center;
            gap: 0.5rem;

            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.15rem 0.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            display: none;
            transition: color 0.15s;
        }

        .search-clear:hover {
            color: var(--text);
        }

        .search-clear.visible {
            display: block;
        }

            .filter-pills { overflow-x: auto; width: 100%; flex-wrap: nowrap; padding-bottom: 0.25rem; }
            .results-container { padding: 0.75rem 1rem 3rem; }
            .page-row { padding-left: 1.5rem; gap: 0.6rem; flex-wrap: wrap; }
            .page-desc { white-space: normal; }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(8px); }
                to   { opacity: 1; transform: translateY(0); }

    // Domain short labels for pills & tags
    const domainLabels = {
        you: "You", cell: "Cell", relationship: "Relationship", atom: "Atom",
        conversation: "Conversation", breath: "Breath", physics: "Physics",
        story: "Story", ethics: "Ethics", cosmos: "Cosmos", tools: "Tools"
    };

    // ===== Build flat index =====
    const allPages = [];
    for (const [domainKey, domain] of Object.entries(domains)) {
        for (const page of domain.pages) {
            allPages.push({
                ...page,
                domain: domainKey,
                domainTitle: domain.title,
                searchText: `${page.name} ${page.desc} ${domainLabels[domainKey]} ${domain.title}`.toLowerCase()
            });
        }
    }

    // ===== State =====
    let activeFilter = null;
    let currentQuery = '';

    // ===== Render filter pills =====
    function renderFilterPills() {
        const container = document.getElementById('filterPills');
        container.innerHTML = Object.entries(domainLabels).map(([key, label]) =>
            `<span class="filter-pill${activeFilter === key ? ' active' : ''}" data-domain="${key}">${label}</span>`
        ).join('');

        container.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const d = pill.dataset.domain;
                activeFilter = activeFilter === d ? null : d;
                renderFilterPills();
                renderResults();
            });
        });
    }

    // ===== Search & Filter =====
    function getFilteredPages() {
        let pages = allPages;

        if (activeFilter) {
            pages = pages.filter(p => p.domain === activeFilter);
        }

        if (currentQuery) {
            const terms = currentQuery.toLowerCase().split(/\s+/).filter(Boolean);
            pages = pages.filter(p => terms.every(t => p.searchText.includes(t)));
        }

        return pages;
    }

    // ===== Highlight matches =====
    function highlight(text, query) {
        if (!query) return text;
        const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
        let result = text;
        for (const term of terms) {
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            result = result.replace(regex, '<mark>$1</mark>');
        }
        return result;
    }

    // ===== Render results =====
    function renderResults() {
        const container = document.getElementById('results');
        const filtered = getFilteredPages();
        const statsEl = document.getElementById('statsText');

        // Group by domain
        const grouped = {};
        for (const page of filtered) {
            if (!grouped[page.domain]) grouped[page.domain] = [];
            grouped[page.domain].push(page);
        }

        const totalPages = allPages.length;
        const shownPages = filtered.length;

        if (currentQuery || activeFilter) {
            statsEl.innerHTML = `Showing <strong>${shownPages}</strong> of ${totalPages} pages`;
        } else {
            statsEl.innerHTML = `<strong>${totalPages}</strong> pages across ${Object.keys(domains).length} domains`;
        }

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">⊙</div>
                    <h3>No pages found</h3>
                    <p>Try different search terms or clear the filter.</p>
                </div>`;
            return;
        }

        // Preserve domain order
        const domainOrder = Object.keys(domains);
        let html = '';

        for (const domainKey of domainOrder) {
            if (!grouped[domainKey]) continue;
            const pages = grouped[domainKey];
            const domain = domains[domainKey];

            html += `<div class="domain-section" data-domain="${domainKey}">`;
            html += `<div class="domain-header" onclick="toggleSection(this)">`;
            html += `<span class="domain-chevron">▼</span>`;
            html += `<span class="domain-title">${highlight(domain.title, currentQuery)}</span>`;
            html += `<span class="domain-count">${pages.length} page${pages.length !== 1 ? 's' : ''}</span>`;
            html += `</div>`;
            html += `<div class="domain-pages">`;

            for (const page of pages) {
                html += `<a href="${page.href}" class="page-row">`;
                html += `<span class="page-icon">⊙</span>`;
                html += `<div class="page-info">`;
                html += `<div class="page-name">${highlight(page.name, currentQuery)}</div>`;
                html += `<div class="page-desc">${highlight(page.desc, currentQuery)}</div>`;
                html += `</div>`;
                html += `<span class="domain-tag" data-domain="${page.domain}">${domainLabels[page.domain]}</span>`;
                html += `</a>`;
            }

            html += `</div></div>`;
        }

        container.innerHTML = html;

        // Set max-heights for animation
        container.querySelectorAll('.domain-pages').forEach(el => {
            el.style.maxHeight = el.scrollHeight + 'px';
            el.style.opacity = '1';
        });

        // Apply staggered animation
        container.querySelectorAll('.domain-section').forEach((el, i) => {
            el.style.animationDelay = `${i * 0.04}s`;
        });
    }

    // ===== Toggle section =====
    function toggleSection(header) {
        const section = header.closest('.domain-section');
        const pages = section.querySelector('.domain-pages');

        if (section.classList.contains('collapsed')) {
            section.classList.remove('collapsed');
            pages.style.maxHeight = pages.scrollHeight + 'px';
            pages.style.opacity = '1';
        } else {
            section.classList.add('collapsed');
        }
    }

    // ===== Search input =====
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    searchInput.addEventListener('input', () => {
        currentQuery = searchInput.value.trim();
        searchClear.classList.toggle('visible', currentQuery.length > 0);
        renderResults();
    });

    searchClear.addEventListener('click', () => {
        searchInput.value = '';
        currentQuery = '';
        searchClear.classList.remove('visible');
        searchInput.focus();
        renderResults();
    });

    // Keyboard shortcut: / to focus search
    document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== searchInput) {
            e.preventDefault();
            searchInput.focus();
            searchInput.select();
        }
        if (e.key === 'Escape' && document.activeElement === searchInput) {
            searchInput.blur();
            if (currentQuery) {
                searchInput.value = '';
                currentQuery = '';
                searchClear.classList.remove('visible');
                renderResults();
            }
        }
    });

    // ===== Init =====
    renderFilterPills();
    renderResults();
    </script>
