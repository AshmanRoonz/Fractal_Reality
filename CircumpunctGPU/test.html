<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CircumpunctGPU: Minimal Pipeline Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050404; color: #e0d8c8; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#log {
  position: fixed; bottom: 12px; left: 12px; z-index: 100;
  background: rgba(10,8,6,0.95); border: 1px solid rgba(200,180,140,0.15);
  border-radius: 6px; padding: 10px 14px; font-size: 9px; line-height: 1.6;
  max-height: 300px; overflow-y: auto; min-width: 400px;
}
.ok { color: #4DB8A0; }
.err { color: #E88AAF; }
.info { color: #c8b478; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="log"></div>

<script>
// Minimal self-contained test: no external dependencies.
// Proves: WebGPU init, compute pass, render pass, instanced billboards.

const log = (msg, cls='info') => {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span><br>`;
  el.scrollTop = el.scrollHeight;
  console.log(msg);
};

(async () => {
  // ============ INIT ============
  if (!navigator.gpu) { log('WebGPU not available', 'err'); return; }
  log('WebGPU: available', 'ok');

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) { log('No adapter', 'err'); return; }
  log('Adapter: ' + (adapter.info?.device || 'ok'), 'ok');

  const device = await adapter.requestDevice();
  log('Device: created', 'ok');

  const canvas = document.getElementById('c');
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;

  const ctx = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format, alphaMode: 'premultiplied' });
  log('Canvas: configured (' + canvas.width + 'x' + canvas.height + ', ' + format + ')', 'ok');

  // ============ SIMPLE INSTANCE DATA (CPU-side, no compute) ============
  // Skip compute passes for this test. Just write instances directly.
  // 7 instances: one for each rung of the dimensional ladder.
  const NUM = 7;
  // DrawInstance: pos_scale(vec4f) + state(vec4f) + color(vec4f) = 48 bytes
  const instanceData = new Float32Array(NUM * 12);

  const colors = [
    [0.91, 0.54, 0.69], // 0D aperture pink
    [0.80, 0.50, 0.65], // 0.5D
    [0.60, 0.63, 0.66], // 1D
    [0.40, 0.70, 0.60], // 1.5D field green
    [0.30, 0.72, 0.63], // 2D
    [0.30, 0.63, 0.78], // 2.5D
    [0.30, 0.55, 0.80], // 3D boundary blue
  ];
  const dimDepths = [0, 0.5, 1, 1.5, 2, 2.5, 3];

  for (let i = 0; i < NUM; i++) {
    const off = i * 12;
    const x = (i - 3) * 2.5; // spread along x axis
    instanceData[off + 0] = x;     // pos x
    instanceData[off + 1] = 0;     // pos y
    instanceData[off + 2] = 0;     // pos z
    instanceData[off + 3] = 1.0;   // scale
    instanceData[off + 4] = 0.5;   // balance
    instanceData[off + 5] = 0;     // phase (will animate)
    instanceData[off + 6] = dimDepths[i]; // dim depth
    instanceData[off + 7] = Math.min(3, Math.floor(dimDepths[i])); // repr mode
    instanceData[off + 8] = colors[i][0]; // r
    instanceData[off + 9] = colors[i][1]; // g
    instanceData[off + 10] = colors[i][2]; // b
    instanceData[off + 11] = 1.0; // alpha
  }

  const instanceBuf = device.createBuffer({
    size: instanceData.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
  });
  device.queue.writeBuffer(instanceBuf, 0, instanceData);
  log('Instances: ' + NUM + ' created', 'ok');

  // ============ FRAME UNIFORMS ============
  // Matches the FrameUniforms struct from circumpunct-gpu.js
  const uniformBuf = device.createBuffer({
    size: 256,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  // ============ DEPTH TEXTURE ============
  let depthTex = device.createTexture({
    size: [canvas.width, canvas.height],
    format: 'depth24plus',
    usage: GPUTextureUsage.RENDER_ATTACHMENT,
  });

  // ============ SHADERS ============
  const shaderCode = /* wgsl */`

    struct FrameUniforms {
      time: f32,
      dt: f32,
      pump_speed: f32,
      node_count: u32,
      cam_pos: vec4f,
      cam_fwd: vec4f,
      cam_up: vec4f,
      cam_right: vec4f,
      proj: mat4x4f,
      view: mat4x4f,
    };

    struct DrawInstance {
      pos_scale: vec4f,
      state: vec4f,
      color: vec4f,
    };

    struct VSOut {
      @builtin(position) pos: vec4f,
      @location(0) uv: vec2f,
      @location(1) @interpolate(flat) color: vec4f,
      @location(2) @interpolate(flat) state: vec4f,
    };

    @group(0) @binding(0) var<uniform> frame: FrameUniforms;
    @group(0) @binding(1) var<storage, read> instances: array<DrawInstance>;

    // Quad: 6 vertices, 2 triangles
    const QP = array<vec2f, 6>(
      vec2f(-1, -1), vec2f(1, -1), vec2f(-1, 1),
      vec2f(-1, 1),  vec2f(1, -1), vec2f(1, 1),
    );

    @vertex
    fn vs(
      @builtin(vertex_index) vid: u32,
      @builtin(instance_index) iid: u32,
    ) -> VSOut {
      let inst = instances[iid];
      let qp = QP[vid];

      let worldPos = inst.pos_scale.xyz;
      let scale = inst.pos_scale.w;
      let repr = u32(inst.state.w);

      // Billboard size by repr mode
      var bs: f32;
      switch repr {
        case 0u: { bs = scale * 0.2; }
        case 1u: { bs = scale * 0.5; }
        case 2u: { bs = scale * 0.8; }
        default: { bs = scale * 1.2; }
      }

      // Billboard: camera-facing quad
      let right = frame.cam_right.xyz;
      let up = frame.cam_up.xyz;
      let offset = (right * qp.x + up * qp.y) * bs;
      let finalPos = worldPos + offset;

      let viewPos = frame.view * vec4f(finalPos, 1.0);
      let clipPos = frame.proj * viewPos;

      var out: VSOut;
      out.pos = clipPos;
      out.uv = qp * 0.5 + 0.5;
      out.color = inst.color;
      out.state = inst.state;
      return out;
    }

    @fragment
    fn fs(
      @location(0) uv: vec2f,
      @location(1) @interpolate(flat) color: vec4f,
      @location(2) @interpolate(flat) state: vec4f,
    ) -> @location(0) vec4f {
      let p = uv * 2.0 - 1.0;
      let r = length(p);
      let repr = u32(state.w + 0.5);
      let phase = state.y;
      let balance = state.x;

      var col = color.rgb;
      var alpha = color.a;

      switch repr {
        // 0D: glowing point
        case 0u: {
          let glow = exp(-r * r * 8.0);
          col *= glow * 1.5;
          alpha *= glow;
        }
        // 1D: worldline
        case 1u: {
          let lineW = 0.08;
          let lineDist = abs(p.x);
          let lineA = smoothstep(lineW, lineW * 0.3, lineDist);
          let ptGlow = exp(-r * r * 12.0) * 0.6;
          col *= lineA + ptGlow;
          alpha *= max(lineA, ptGlow);
        }
        // 2D: field disk
        case 2u: {
          let diskR = 0.7;
          let diskA = smoothstep(diskR, diskR - 0.15, r);
          let density = 1.0 - r * 0.5;
          let rings = 0.8 + 0.2 * sin(r * 12.0 - phase * 6.28 * 2.0);
          let apGlow = exp(-r * r * 16.0) * 0.5;
          col *= (density * rings * diskA + apGlow);
          alpha *= max(diskA * density * 0.7, apGlow);
        }
        // 3D: full circumpunct
        default: {
          let apGlow = exp(-r * r * 20.0);
          let fieldR = 0.5 + balance * 0.2;
          let fieldA = smoothstep(fieldR, fieldR - 0.12, r);
          let fieldD = 1.0 - r * 0.7;
          let fieldRings = 0.85 + 0.15 * sin(r * 16.0 - phase * 6.28 * 3.0);
          let boundR = 0.82;
          let boundW = 0.06;
          let boundA = smoothstep(boundW, boundW * 0.2, abs(r - boundR));
          let centerCol = col * 1.3;
          let edgeCol = col * 0.8;
          var fc = edgeCol * boundA * 0.7;
          fc += col * fieldA * fieldD * fieldRings * 0.5;
          fc += centerCol * apGlow * 1.5;
          col = fc;
          alpha *= max(max(apGlow * 0.8, fieldA * fieldD * 0.5), boundA * 0.6);
        }
      }

      // Soft edge
      alpha *= smoothstep(1.0, 0.85, r);

      // Discard fully transparent
      if (alpha < 0.01) { discard; }

      return vec4f(col, alpha);
    }
  `;

  let shaderModule;
  try {
    shaderModule = device.createShaderModule({ code: shaderCode });
    // Check for compilation errors
    const info = await shaderModule.getCompilationInfo();
    let hasError = false;
    for (const msg of info.messages) {
      if (msg.type === 'error') {
        log('Shader error L' + msg.lineNum + ': ' + msg.message, 'err');
        hasError = true;
      } else if (msg.type === 'warning') {
        log('Shader warning: ' + msg.message, 'info');
      }
    }
    if (hasError) return;
    log('Shaders: compiled', 'ok');
  } catch (e) {
    log('Shader compile failed: ' + e.message, 'err');
    return;
  }

  // ============ PIPELINE ============
  const bgl = device.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
      { binding: 1, visibility: GPUShaderStage.VERTEX, buffer: { type: 'read-only-storage' } },
    ]
  });

  const pipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
    vertex: { module: shaderModule, entryPoint: 'vs' },
    fragment: {
      module: shaderModule, entryPoint: 'fs',
      targets: [{
        format,
        blend: {
          color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
          alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' },
        },
      }],
    },
    primitive: { topology: 'triangle-list' },
    depthStencil: { format: 'depth24plus', depthWriteEnabled: false, depthCompare: 'less' },
  });

  const bindGroup = device.createBindGroup({
    layout: bgl,
    entries: [
      { binding: 0, resource: { buffer: uniformBuf } },
      { binding: 1, resource: { buffer: instanceBuf } },
    ],
  });
  log('Pipeline: created', 'ok');

  // ============ MATH ============
  function normalize(v) {
    const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
    return l > 0 ? [v[0]/l,v[1]/l,v[2]/l] : [0,0,0];
  }
  function sub(a,b) { return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]; }
  function cross(a,b) { return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]]; }
  function dot(a,b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }

  function lookAt(eye, target, up) {
    const z = normalize(sub(eye, target));
    const x = normalize(cross(up, z));
    const y = cross(z, x);
    return new Float32Array([
      x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0,
      -dot(x,eye),-dot(y,eye),-dot(z,eye),1
    ]);
  }
  function perspective(fov, aspect, near, far) {
    const f = 1/Math.tan(fov/2), nf = 1/(near-far);
    return new Float32Array([
      f/aspect,0,0,0, 0,f,0,0, 0,0,far*nf,-1, 0,0,far*near*nf,0
    ]);
  }

  // ============ CAMERA STATE ============
  let camTheta = 0.5, camPhi = 0.3, camDist = 12;
  let targetTheta = 0.5, targetPhi = 0.3;
  let mouseDown = false, lastMX = 0, lastMY = 0;

  canvas.addEventListener('mousedown', e => { mouseDown=true; lastMX=e.clientX; lastMY=e.clientY; });
  window.addEventListener('mouseup', () => { mouseDown=false; });
  window.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    targetTheta -= (e.clientX-lastMX)*0.005;
    targetPhi = Math.max(-1.2, Math.min(1.2, targetPhi+(e.clientY-lastMY)*0.005));
    lastMX=e.clientX; lastMY=e.clientY;
  });
  canvas.addEventListener('wheel', e => {
    camDist = Math.max(3, Math.min(30, camDist+e.deltaY*0.01));
    e.preventDefault();
  }, {passive:false});

  // ============ RESIZE ============
  window.addEventListener('resize', () => {
    const dpr = Math.min(window.devicePixelRatio, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    depthTex.destroy();
    depthTex = device.createTexture({
      size: [canvas.width, canvas.height],
      format: 'depth24plus',
      usage: GPUTextureUsage.RENDER_ATTACHMENT,
    });
  });

  // ============ RENDER LOOP ============
  let time = 0;
  log('Starting render loop...', 'ok');

  function frame(ts) {
    requestAnimationFrame(frame);
    const dt = 0.016;
    time += dt;

    // Auto-rotate + smooth orbit
    if (!mouseDown) targetTheta += dt * 0.2;
    camTheta += (targetTheta - camTheta) * 0.06;
    camPhi += (targetPhi - camPhi) * 0.06;

    const cx = camDist * Math.cos(camPhi) * Math.sin(camTheta);
    const cy = camDist * Math.sin(camPhi);
    const cz = camDist * Math.cos(camPhi) * Math.cos(camTheta);
    const eye = [cx, cy, cz];
    const target = [0, 0, 0];
    const up = [0, 1, 0];

    const fwd = normalize(sub(target, eye));
    const right = normalize(cross(fwd, up));
    const camUp = cross(right, fwd);

    const aspect = canvas.width / canvas.height;
    const fov = 2 * Math.atan(12/13); // framework FOV
    const viewMat = lookAt(eye, target, up);
    const projMat = perspective(fov, aspect, 0.05, 50);

    // Animate phase in instance data
    for (let i = 0; i < NUM; i++) {
      instanceData[i * 12 + 5] = (time * 0.3 + i * 0.15) % 1.0; // phase
    }
    device.queue.writeBuffer(instanceBuf, 0, instanceData);

    // Write uniforms
    const ubuf = new ArrayBuffer(256);
    const uf = new Float32Array(ubuf);
    const uu = new Uint32Array(ubuf);
    uf[0] = time; uf[1] = dt; uf[2] = 1.0; uu[3] = NUM;
    uf[4]=cx; uf[5]=cy; uf[6]=cz; uf[7]=0;
    uf[8]=fwd[0]; uf[9]=fwd[1]; uf[10]=fwd[2]; uf[11]=0;
    uf[12]=camUp[0]; uf[13]=camUp[1]; uf[14]=camUp[2]; uf[15]=0;
    uf[16]=right[0]; uf[17]=right[1]; uf[18]=right[2]; uf[19]=0;
    for (let i=0;i<16;i++) uf[20+i] = projMat[i];
    for (let i=0;i<16;i++) uf[36+i] = viewMat[i];
    device.queue.writeBuffer(uniformBuf, 0, ubuf);

    // Render
    const encoder = device.createCommandEncoder();
    const pass = encoder.beginRenderPass({
      colorAttachments: [{
        view: ctx.getCurrentTexture().createView(),
        clearValue: { r: 0.02, g: 0.015, b: 0.025, a: 1 },
        loadOp: 'clear', storeOp: 'store',
      }],
      depthStencilAttachment: {
        view: depthTex.createView(),
        depthClearValue: 1.0,
        depthLoadOp: 'clear', depthStoreOp: 'store',
      },
    });
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.draw(6, NUM); // 6 vertices per quad, NUM instances
    pass.end();
    device.queue.submit([encoder.finish()]);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
