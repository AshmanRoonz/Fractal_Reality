<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Ship Sailing - Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="renderer.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        #gameContainer > canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Loadout Selection Screen */
        #loadoutScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding-top: 30px;
            z-index: 1000;
        }

        #loadoutScreen.hidden {
            display: none;
        }

        .loadout-title {
            font-size: 2.2em;
            color: #00ffff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
            flex-shrink: 0;
        }

        .loadout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px 30px 40px;
            max-width: 1600px;
            width: 100%;
        }

        .loadout-card {
            background: rgba(20, 30, 60, 0.8);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.85em;
        }

        .loadout-card:hover {
            background: rgba(30, 50, 80, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .loadout-card.selected {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            border-color: #00ffff;
        }

        .loadout-name {
            font-size: 1.5em;
            color: #00ffff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .loadout-class {
            font-size: 0.9em;
            color: #ffaa00;
            margin-bottom: 15px;
        }

        .loadout-stat {
            font-size: 0.85em;
            color: #aaaaaa;
            margin: 5px 0;
            text-align: left;
        }

        .loadout-button {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease;
        }

        .loadout-button:hover {
            background: #00dddd;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .loadout-button:active {
            transform: scale(0.95);
        }

        /* Game HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #hud.hidden {
            display: none;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
        }

        .crosshair-h, .crosshair-v {
            position: absolute;
            background: #00ff00;
        }

        .crosshair-h {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-v {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Score Display */
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 1.5em;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #roundTimer {
            font-size: 1.2em;
            color: #ffaa00;
            margin-top: 10px;
        }

        /* Health and Shield Bars */
        #healthContainer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
        }

        .bar-label {
            font-size: 0.9em;
            color: #aaaaaa;
            margin-bottom: 5px;
        }

        .bar {
            width: 100%;
            height: 20px;
            background: #333;
            border: 1px solid #666;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        #shieldBar {
            margin-bottom: 10px;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.2s ease;
            position: relative;
        }

        #shieldFill {
            background: linear-gradient(90deg, #0066ff, #00ffff);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #healthFill {
            background: linear-gradient(90deg, #ff0000, #ffaa00);
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        /* Ammo Counter */
        #ammoCounter {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 1.2em;
            color: #ffaa00;
            text-align: right;
        }

        .ammo-label {
            font-size: 0.9em;
            color: #aaaaaa;
        }

        /* Kill Feed */
        #killFeed {
            position: absolute;
            top: 150px;
            right: 20px;
            max-width: 350px;
        }

        .kill-event {
            background: rgba(0, 0, 0, 0.7);
            border-left: 3px solid #00ffff;
            padding: 10px;
            margin-bottom: 5px;
            font-size: 0.95em;
            color: #aaaaaa;
            animation: fadeOut 5s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Minimap */
        #minimap {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            border: 2px solid #00ffff;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Ability HUD */
        #abilityBar {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .ability-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #00ffff;
            border-radius: 4px;
            background: rgba(0, 50, 100, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            color: #00ffff;
            position: relative;
        }

        .ability-cooldown {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2px;
        }

        /* Scoreboard Overlay */
        #scoreboardOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ffff;
            padding: 30px;
            border-radius: 8px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 999;
            display: none;
            min-width: 400px;
        }

        #scoreboardOverlay.visible {
            display: block;
        }

        .scoreboard-title {
            font-size: 1.5em;
            color: #00ffff;
            margin-bottom: 20px;
            text-align: center;
        }

        .team-section {
            margin-bottom: 30px;
        }

        .team-name {
            font-size: 1.2em;
            color: #ffaa00;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ffff;
            padding-bottom: 10px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 1fr 50px 50px 50px;
            gap: 15px;
            padding: 8px 0;
            color: #aaaaaa;
            font-size: 0.9em;
            border-bottom: 1px solid #333;
        }

        .player-name {
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="loadoutScreen">
            <div class="loadout-title">SELECT YOUR SHIP</div>
            <div class="loadout-grid" id="loadoutGrid"></div>
            <button id="deployButton" onclick="deployShip()" style="
                margin: 20px auto 40px;
                display: block;
                padding: 16px 60px;
                font-size: 1.4em;
                font-family: 'Courier New', monospace;
                background: rgba(0, 255, 255, 0.15);
                border: 2px solid #00ffff;
                color: #00ffff;
                cursor: pointer;
                letter-spacing: 4px;
                text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
                transition: all 0.3s;
            ">DEPLOY</button>
        </div>

        <div id="hud" class="hidden">
            <div id="scoreBoard">
                <div id="scoreText">Fleet A: 0 | Fleet B: 0</div>
                <div id="roundTimer">Time: 00:00</div>
            </div>

            <div id="crosshair">
                <div class="crosshair-h"></div>
                <div class="crosshair-v"></div>
            </div>

            <div id="minimapContainer">
                <canvas id="minimapCanvas"></canvas>
            </div>

            <div id="healthContainer">
                <div class="bar-label">Shield</div>
                <div class="bar" id="shieldBar">
                    <div class="bar-fill" id="shieldFill"></div>
                </div>
                <div class="bar-label">Health</div>
                <div class="bar" id="healthBar">
                    <div class="bar-fill" id="healthFill"></div>
                </div>
            </div>

            <div id="ammoCounter">
                <div class="ammo-label">Ammo</div>
                <div id="ammoValue">---</div>
            </div>

            <div id="killFeed"></div>

            <div id="abilityBar">
                <div class="ability-slot">Q<div class="ability-cooldown"></div></div>
                <div class="ability-slot">E<div class="ability-cooldown"></div></div>
                <div class="ability-slot">F<div class="ability-cooldown"></div></div>
                <div class="ability-slot">X<div class="ability-cooldown"></div></div>
            </div>

            <div id="scoreboardOverlay">
                <div class="scoreboard-title">SCOREBOARD</div>
                <div id="scoreboardContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // CONSTANTS AND DATA
        // ============================================================================

        const CHASSIS = {
          FRIGATE: { name: 'Frigate', maxHealth: 7500, maxShield: 2500, flightSpeed: 450, collRadius: 50 },
          CORVETTE: { name: 'Corvette', maxHealth: 10000, maxShield: 3500, flightSpeed: 350, collRadius: 65 },
          DREADNOUGHT: { name: 'Dreadnought', maxHealth: 12500, maxShield: 5000, flightSpeed: 250, collRadius: 90 },
        };

        const LOADOUTS = {
          ION: {
            name: 'ION', className: 'Corvette MkII', chassis: 'CORVETTE',
            weapon: { name: 'Splitter Rifle', mode: 'hitscan', damage: 380, fireRate: 0.25, clipSize: 30, range: 3000 },
            abilities: [
              { name: 'Laser Shot', cooldown: 10, desc: 'Massive beam: 2400 damage' },
              { name: 'Vortex Shield', cooldown: 0, desc: 'Hold to absorb and return projectiles' },
              { name: 'Trip Wire', cooldown: 12, desc: 'Proximity mines on contact' },
            ],
            core: { name: 'Laser Core', desc: 'Continuous high-power laser', duration: 4 },
          },
          SCORCH: {
            name: 'SCORCH', className: 'Dreadnought Incinerator', chassis: 'DREADNOUGHT',
            weapon: { name: 'T-203 Thermite', mode: 'projectile', damage: 900, fireRate: 1.2, clipSize: 12, range: 2500 },
            abilities: [
              { name: 'Firewall', cooldown: 10, desc: 'Fire line: 400 DPS' },
              { name: 'Thermal Shield', cooldown: 0, desc: 'Hold to burn close enemies' },
              { name: 'Incendiary Trap', cooldown: 15, desc: 'Area denial fire' },
            ],
            core: { name: 'Flame Core', desc: 'Massive AoE incendiary', duration: 2 },
          },
          NORTHSTAR: {
            name: 'NORTHSTAR', className: 'Frigate Starcaster', chassis: 'FRIGATE',
            weapon: { name: 'Plasma Railgun', mode: 'hitscan', damage: 1000, fireRate: 1.5, clipSize: 6, range: 4500 },
            abilities: [
              { name: 'Cluster Missile', cooldown: 8, desc: 'Impact 800 + 500 DPS for 5s' },
              { name: 'Afterburner', cooldown: 10, desc: 'Speed boost to 600' },
              { name: 'Tether Trap', cooldown: 12, desc: 'Slow and root enemies' },
            ],
            core: { name: 'Afterburner Core', desc: 'Speed boost + rocket barrage', duration: 5 },
          },
          RONIN: {
            name: 'RONIN', className: 'Frigate Blade', chassis: 'FRIGATE',
            weapon: { name: 'Leadwall', mode: 'spread', damage: 200, fireRate: 0.85, clipSize: 4, range: 900 },
            abilities: [
              { name: 'Arc Wave', cooldown: 8, desc: 'Electric proj: 2000 damage' },
              { name: 'Sword Block', cooldown: 0, desc: 'Block 70% incoming' },
              { name: 'Phase Dash', cooldown: 6, desc: 'Teleport dash' },
            ],
            core: { name: 'Sword Core', desc: 'Empowered melee + arc waves', duration: 5 },
          },
          TONE: {
            name: 'TONE', className: 'Corvette Tracker', chassis: 'CORVETTE',
            weapon: { name: '40mm Tracker', mode: 'projectile', damage: 660, fireRate: 0.6, clipSize: 20, range: 3500 },
            abilities: [
              { name: 'Tracker Rockets', cooldown: 6, desc: 'Lock-on: 5 rockets (3 locks)' },
              { name: 'Particle Wall', cooldown: 14, desc: 'One-way shield (5000 HP, 10s)' },
              { name: 'Sonar Lock', cooldown: 12, desc: 'Reveal + partial lock' },
            ],
            core: { name: 'Salvo Core', desc: 'Massive missile barrage', duration: 3 },
          },
          LEGION: {
            name: 'LEGION', className: 'Dreadnought Siege', chassis: 'DREADNOUGHT',
            weapon: { name: 'Predator Cannon', mode: 'hitscan', damage: 85, fireRate: 0.05, clipSize: 150, range: 1500 },
            abilities: [
              { name: 'Power Shot', cooldown: 8, desc: 'High-power: 3200 damage' },
              { name: 'Gun Shield', cooldown: 0, desc: 'Frontal shield (5000 HP, 10s)' },
              { name: 'Mode Switch', cooldown: 2, desc: 'Close/long range modes' },
            ],
            core: { name: 'Smart Core', desc: 'Auto-aim + unlimited ammo', duration: 10 },
          },
          MONARCH: {
            name: 'MONARCH', className: 'Corvette Sovereign', chassis: 'CORVETTE',
            weapon: { name: 'XO-16 Chaingun', mode: 'hitscan', damage: 240, fireRate: 0.09, clipSize: 40, range: 3000 },
            abilities: [
              { name: 'Rocket Salvo', cooldown: 6, desc: '5 rockets (10 with Missile Racks)' },
              { name: 'Energy Siphon', cooldown: 8, desc: 'Drain shields: 800 heal' },
              { name: 'Rearm', cooldown: 12, desc: 'Reset ability cooldowns' },
            ],
            core: { name: 'Upgrade Core', desc: '3 tiers of permanent upgrades', duration: 12 },
          },
        };

        // ============================================================================
        // APPLICATION STATE
        // ============================================================================

        let gameState = {
            connected: false,
            playerId: null,
            matchId: null,
            playerName: 'Player' + Math.floor(Math.random() * 10000),
            selectedLoadout: 'ION',
            matchState: 'lobby',

            // Game state from server
            allPlayers: {},
            projectiles: [],
            killFeed: [],
            scores: { teamA: 0, teamB: 0 },
            roundTime: 0,
            maxRoundTime: 600,

            // Local player state
            localPlayer: {
                position: { x: 0, y: 0, z: 0 },
                rotation: { x: 0, y: 0, z: 0, w: 1 },
                health: 200,
                shield: 100,
                ammo: 120,
                team: 'A'
            },

            // Input state
            input: {
                forward: 0,
                strafe: 0,
                vertical: 0,
                pitchDelta: 0,
                yawDelta: 0,
                fire: false,
                ability: null,
                dash: false
            },

            // Tracking
            lastServerUpdate: 0,
            clientTick: 0,
            interpolationBuffer: {}
        };

        let ws = null;
        let scene, camera, renderer;
        let postFX = null;
        let levelMesh = null;
        let playerMeshes = {};
        let audioContext = null;
        let currentMapData = null;
        let hasReceivedServerPosition = false;
        let gameTime = 0;
        let damageAmount = 0;

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        function init() {
            const params = new URLSearchParams(window.location.search);
            gameState.matchId = params.get('matchId') || params.get('code');
            gameState.playerName = params.get('name') || gameState.playerName;

            setupWebSocket();
            setupLoadoutScreen();
        }

        function setupWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            ws = new WebSocket(`${protocol}//${host}/ws`);

            ws.onopen = () => {
                console.log('Connected to server');
                gameState.connected = true;
                // Wait for connect_ack before sending join_match
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleServerMessage(msg);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                gameState.connected = false;
            };

            ws.onclose = () => {
                console.log('Disconnected from server');
                gameState.connected = false;
            };
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'connect_ack':
                    console.log('[Connected] Player ID:', msg.playerId, 'Match:', gameState.matchId);
                    gameState.playerId = msg.playerId;
                    // Send join_match after receiving connect_ack
                    if (gameState.connected && gameState.matchId) {
                        ws.send(JSON.stringify({
                            type: 'join_match',
                            matchId: gameState.matchId,
                            playerName: gameState.playerName
                        }));
                    }
                    break;

                case 'match_join_ok':
                    console.log('[Joined Match]', msg.matchId, 'Team:', msg.team, 'State:', msg.currentState);
                    gameState.playerId = msg.playerId;
                    gameState.matchId = msg.matchId;
                    gameState.localPlayer.team = msg.team;
                    gameState.matchState = msg.currentState || 'lobby';
                    // Store map data from server
                    if (msg.mapData) {
                        currentMapData = msg.mapData;
                        console.log('[Map Data] Received:', currentMapData.name, 'Rooms:', currentMapData.rooms?.length, 'Tunnels:', currentMapData.tunnels?.length);
                    }
                    if (gameState.matchState === 'lobby' || gameState.matchState === 'loadout') {
                        showLoadoutScreen();
                        // If we already have a loadout selected, auto-send it
                        if (gameState.selectedLoadout) {
                            ws.send(JSON.stringify({
                                type: 'loadout_select',
                                loadoutKey: gameState.selectedLoadout
                            }));
                        }
                    }
                    break;

                case 'match_start':
                    gameState.matchState = 'playing';
                    if (msg.team) gameState.localPlayer.team = msg.team;
                    hideLoadoutScreen();
                    if (!scene) initializeGame();
                    break;

                case 'state_change':
                    console.log('[State Change]', msg.newState);
                    gameState.matchState = msg.newState;
                    if (msg.newState === 'warmup' || msg.newState === 'playing') {
                        try {
                            if (!scene) initializeGame();
                        } catch(e) {
                            console.error('initializeGame error:', e);
                        }
                        hideLoadoutScreen();
                    }
                    break;

                case 'game_state':
                    // If we receive game_state, the match is active
                    if (msg.matchState === 'warmup' || msg.matchState === 'playing') {
                        if (!scene) {
                            try { initializeGame(); } catch(e) { console.error('initializeGame error:', e); }
                            hideLoadoutScreen();
                        }
                    }
                    updateGameState(msg);
                    break;

                case 'player_killed':
                    addKillFeedEvent(msg.killer, msg.victim, msg.weapon);
                    break;

                case 'damage':
                    onPlayerDamage(msg.damage, msg.source);
                    break;

                case 'error':
                    console.error('[Server Error]', msg.message);
                    // If match not found, auto-create one and join it
                    if (msg.message === 'Match not found') {
                        console.log('[Auto-creating match...]');
                        fetch('/api/matches', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: gameState.playerName + "'s Match",
                                map: 'circumpunct',
                                maxPlayers: 10,
                                botFill: true
                            })
                        })
                        .then(r => r.json())
                        .then(data => {
                            console.log('[Match created]', data.id);
                            gameState.matchId = data.id;
                            ws.send(JSON.stringify({
                                type: 'join_match',
                                matchId: data.id,
                                playerName: gameState.playerName
                            }));
                        })
                        .catch(e => console.error('Failed to create match:', e));
                    }
                    break;

                case 'loadout_selected':
                case 'player_ready':
                case 'player_joined':
                case 'player_left':
                    // Informational; log for debugging
                    console.log('[Server]', msg.type, msg);
                    break;

                default:
                    console.log('[Server] Unhandled message:', msg.type, msg);
            }
        }

        // ============================================================================
        // LOADOUT SCREEN
        // ============================================================================

        function setupLoadoutScreen() {
            const grid = document.getElementById('loadoutGrid');
            grid.innerHTML = '';

            for (const [key, loadout] of Object.entries(LOADOUTS)) {
                const card = document.createElement('div');
                card.className = 'loadout-card' + (key === gameState.selectedLoadout ? ' selected' : '');
                card.onclick = () => selectLoadout(key, card);

                const chassis = CHASSIS[loadout.chassis];
                const stats = loadout.abilities.map(a => a.name).join(', ');

                card.innerHTML = `
                    <div class="loadout-name">${loadout.name}</div>
                    <div class="loadout-class">${loadout.className}</div>
                    <div class="loadout-stat">Chassis: ${chassis.name}</div>
                    <div class="loadout-stat">Health: ${chassis.maxHealth}</div>
                    <div class="loadout-stat">Shield: ${chassis.maxShield}</div>
                    <div class="loadout-stat">Speed: ${chassis.flightSpeed}</div>
                    <div class="loadout-stat">Weapon: ${loadout.weapon.name}</div>
                    <div class="loadout-stat">Damage: ${loadout.weapon.damage}</div>
                    <div class="loadout-stat">Fire Rate: ${loadout.weapon.fireRate}/s</div>
                    <div class="loadout-stat">Range: ${loadout.weapon.range}</div>
                    <div class="loadout-stat">Core: ${loadout.core.name}</div>
                    <button class="loadout-button">SELECT</button>
                `;

                grid.appendChild(card);
            }
        }

        function selectLoadout(key, element) {
            console.log('[Loadout Selected]', key);
            gameState.selectedLoadout = key;
            document.querySelectorAll('.loadout-card').forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');

            // Send loadout selection to server
            if (gameState.connected && gameState.matchId) {
                ws.send(JSON.stringify({
                    type: 'loadout_select',
                    loadoutKey: key
                }));
            }
        }

        function deployShip() {
            console.log('[Deploy] Sending loadout + ready for:', gameState.selectedLoadout);
            if (!gameState.connected) {
                console.error('Not connected to server');
                return;
            }
            // Send loadout selection, then ready
            ws.send(JSON.stringify({
                type: 'loadout_select',
                loadoutKey: gameState.selectedLoadout
            }));
            setTimeout(() => {
                ws.send(JSON.stringify({ type: 'ready' }));
            }, 200);
        }

        function showLoadoutScreen() {
            document.getElementById('loadoutScreen').classList.remove('hidden');
        }

        function hideLoadoutScreen() {
            document.getElementById('loadoutScreen').classList.add('hidden');
        }

        // ============================================================================
        // THREE.JS SETUP
        // ============================================================================

        function initializeGame() {
            const R = window.LSS_RENDERER;
            const container = document.getElementById('gameContainer');

            // Initialize scene, camera, renderer from the ported single-player systems
            const sceneKit = R.initScene(container);
            scene = sceneKit.scene;
            camera = sceneKit.camera;
            renderer = sceneKit.renderer;

            // Position camera at spawn room, facing center
            if (currentMapData && currentMapData.rooms) {
                const team = gameState.localPlayer.team || 'A';
                const spawnRoom = currentMapData.rooms.find(r => r.type === 'spawn' && r.team === team);
                if (spawnRoom) {
                    camera.position.set(spawnRoom.x, spawnRoom.y, spawnRoom.z);
                    camera.lookAt(0, 0, 0);
                    console.log('[Camera] Positioned at spawn:', spawnRoom.name, spawnRoom.x, spawnRoom.y, spawnRoom.z);
                } else {
                    camera.position.set(0, 0, 0);
                }
            }

            // Post-processing pipeline (bloom, vignette, chromatic aberration)
            try {
                postFX = R.initPostFX(renderer);
                console.log('[PostFX] Initialized successfully');
            } catch(e) {
                console.error('[PostFX] FAILED:', e);
                postFX = null;
            }

            // Starfield (4000 colored stars, same as single-player)
            R.createStarfield(scene);
            console.log('[Stars] Starfield added');

            // Build level geometry from map data (SDF marching cubes)
            if (currentMapData && currentMapData.rooms) {
                console.log('[Level] Building SDF level from map data:', currentMapData.name || currentMapData.key);
                console.log('[Level] Rooms:', currentMapData.rooms.length, 'Tunnels:', (currentMapData.tunnels || []).length);
                try {
                    levelMesh = R.buildLevel(scene, currentMapData);
                    if (levelMesh && levelMesh.geometry) {
                        const posAttr = levelMesh.geometry.getAttribute('position');
                        console.log('[Level] SDF level built: vertices=' + (posAttr ? posAttr.count : 'NONE'));
                    } else {
                        console.warn('[Level] buildLevel returned no geometry!');
                    }
                } catch(e) {
                    console.error('[Level] Failed to build SDF level:', e);
                }
            } else {
                console.warn('[Level] No map data available for level building');
            }

            // DEBUG: add bright test objects so we can see if rendering works at all
            const debugCube = new THREE.Mesh(
                new THREE.BoxGeometry(100, 100, 100),
                new THREE.MeshBasicMaterial({ color: 0xff00ff })
            );
            debugCube.position.set(0, 0, 0); // center of map
            scene.add(debugCube);
            console.log('[DEBUG] Added magenta test cube at origin');

            // DEBUG: add a cube right in front of camera
            const debugCube2 = new THREE.Mesh(
                new THREE.BoxGeometry(50, 50, 50),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            debugCube2.position.copy(camera.position);
            debugCube2.position.z += 200; // slightly in front
            scene.add(debugCube2);
            console.log('[DEBUG] Added green test cube near camera at', debugCube2.position.x, debugCube2.position.y, debugCube2.position.z);

            // Log total scene children
            console.log('[Scene] Total children:', scene.children.length);
            scene.children.forEach((c, i) => {
                console.log('[Scene] child', i, ':', c.type, c.constructor.name, c.visible);
            });

            // Input handling
            setupInput();

            // Audio context
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            // HUD
            document.getElementById('hud').classList.remove('hidden');

            // Start game loop
            gameTime = 0;
            gameLoop();
        }

        // Old wireframe rendering functions (createLevelWireframes, createFallbackGeometry) removed.
        // All rendering now handled by renderer.js (window.LSS_RENDERER)


        // ============================================================================
        // INPUT HANDLING
        // ============================================================================

        function setupInput() {
            const keys = {};
            let isPointerLocked = false;

            document.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;

                if (e.key === 'Escape') {
                    document.exitPointerLock?.();
                }

                if (e.key === 'Tab') {
                    e.preventDefault();
                    toggleScoreboard();
                }

                if (['q', 'e', 'f'].includes(e.key.toLowerCase())) {
                    gameState.input.ability = e.key.toLowerCase();
                }

                if (e.key === 'x') {
                    gameState.input.ability = 'core';
                }
            });

            document.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
                if (e.key === 'Tab') {
                    toggleScoreboard();
                }
            });

            document.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    gameState.input.fire = true;
                    document.getElementById('gameContainer').requestPointerLock?.();
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (e.button === 0) {
                    gameState.input.fire = false;
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.getElementById('gameContainer')) {
                    gameState.input.yawDelta = e.movementX * 0.003;
                    gameState.input.pitchDelta = e.movementY * 0.003;
                }
            });

            document.addEventListener('pointerlockchange', () => {
                isPointerLocked = !!document.pointerLockElement;
            });

            // Update input state each frame
            const updateInput = () => {
                gameState.input.forward = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
                gameState.input.strafe = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
                gameState.input.vertical = (keys[' '] ? 1 : 0) - (keys['c'] || keys['ctrl'] ? 1 : 0);
                gameState.input.dash = keys['shift'];

                requestAnimationFrame(updateInput);
            };

            updateInput();
        }

        function toggleScoreboard() {
            const overlay = document.getElementById('scoreboardOverlay');
            overlay.classList.toggle('visible');
        }

        // ============================================================================
        // GAME STATE UPDATES
        // ============================================================================

        function updateGameState(msg) {
            // Update players with server data
            gameState.allPlayers = {};
            if (msg.players) {
                for (const [playerId, playerData] of Object.entries(msg.players)) {
                    const ent = playerData.entity;
                    if (!ent) continue; // skip players without entity data

                    // Normalize player data to consistent format
                    gameState.allPlayers[playerId] = {
                        id: playerData.id,
                        team: playerData.team,
                        loadout: playerData.loadout,
                        connected: playerData.connected,
                        // Flatten entity data to top level for easier access
                        position: ent.pos || { x: 0, y: 0, z: 0 },
                        rotation: ent.quat || { x: 0, y: 0, z: 0, w: 1 },
                        velocity: ent.vel || { x: 0, y: 0, z: 0 },
                        health: ent.health || 0,
                        shield: ent.shield || 0,
                        dead: ent.dead || false,
                        isDoomed: ent.isDoomed || false,
                        ammo: ent.clipAmmo || 0,
                        reloading: ent.reloading || false,
                        kills: ent.kills || 0,
                    };

                    // Update local player data if this is us
                    if (playerId === gameState.playerId) {
                        gameState.localPlayer.position = ent.pos || { x: 0, y: 0, z: 0 };
                        gameState.localPlayer.rotation = ent.quat || { x: 0, y: 0, z: 0, w: 1 };
                        hasReceivedServerPosition = true;
                        gameState.localPlayer.health = ent.health || 0;
                        gameState.localPlayer.shield = ent.shield || 0;
                        gameState.localPlayer.ammo = ent.clipAmmo || 0;
                        gameState.localPlayer.team = playerData.team;
                    }
                }
            }

            gameState.projectiles = msg.projectiles || [];
            gameState.scores = { teamA: msg.scoreA || 0, teamB: msg.scoreB || 0 };
            gameState.roundTime = msg.gameTime || gameState.roundTime;
            gameState.matchState = msg.matchState || gameState.matchState;
            gameState.lastServerUpdate = Date.now();

            // Update HUD
            updateHUD();
        }

        function updateHUD() {
            // Score
            document.getElementById('scoreText').textContent =
                `Fleet A: ${gameState.scores.teamA} | Fleet B: ${gameState.scores.teamB}`;

            // Timer
            const mins = Math.floor(gameState.roundTime / 60);
            const secs = Math.floor(gameState.roundTime % 60);
            document.getElementById('roundTimer').textContent =
                `Time: ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            // Health and Shield
            const loadout = LOADOUTS[gameState.selectedLoadout];
            const chassis = CHASSIS[loadout.chassis];
            const maxHealth = chassis.maxHealth;
            const maxShield = chassis.maxShield;
            const healthPercent = (gameState.localPlayer.health / maxHealth) * 100;
            const shieldPercent = (gameState.localPlayer.shield / maxShield) * 100;

            document.getElementById('healthFill').style.width = healthPercent + '%';
            document.getElementById('shieldFill').style.width = shieldPercent + '%';

            // Ammo
            document.getElementById('ammoValue').textContent = gameState.localPlayer.ammo;

            // Scoreboard content
            updateScoreboard();

            // Minimap
            updateMinimap();
        }

        function updateScoreboard() {
            const overlay = document.getElementById('scoreboardOverlay');
            if (!overlay.classList.contains('visible')) return;

            let html = '';

            // Team A
            html += '<div class="team-section"><div class="team-name">FLEET A (Cyan)</div>';
            for (const [playerId, player] of Object.entries(gameState.allPlayers)) {
                if (player.team === 'A') {
                    html += `
                        <div class="player-row">
                            <span class="player-name">${player.loadout || playerId.slice(0, 8)}</span>
                            <span>${player.kills || 0}</span>
                            <span>${player.dead ? 'DEAD' : 'ALIVE'}</span>
                            <span>${player.health || 0}</span>
                        </div>
                    `;
                }
            }
            html += '</div>';

            // Team B
            html += '<div class="team-section"><div class="team-name">FLEET B (Orange)</div>';
            for (const [playerId, player] of Object.entries(gameState.allPlayers)) {
                if (player.team === 'B') {
                    html += `
                        <div class="player-row">
                            <span class="player-name">${player.loadout || playerId.slice(0, 8)}</span>
                            <span>${player.kills || 0}</span>
                            <span>${player.dead ? 'DEAD' : 'ALIVE'}</span>
                            <span>${player.health || 0}</span>
                        </div>
                    `;
                }
            }
            html += '</div>';

            document.getElementById('scoreboardContent').innerHTML = html;
        }

        function updateMinimap() {
            const canvas = document.getElementById('minimapCanvas');
            if (!canvas) return;

            // Guard against undefined position
            if (!gameState.localPlayer || !gameState.localPlayer.position) return;

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = 0.3;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Draw self
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(centerX - 3, centerY - 3, 6, 6);

            // Draw other players
            for (const [playerId, player] of Object.entries(gameState.allPlayers)) {
                if (playerId === gameState.playerId) continue;
                if (!player.position) continue;

                const x = centerX + (player.position.x - gameState.localPlayer.position.x) * scale;
                const y = centerY + (player.position.z - gameState.localPlayer.position.z) * scale;

                if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                    ctx.fillStyle = player.team === 'A' ? '#00ffff' : '#ffaa00';
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function addKillFeedEvent(killer, victim, weapon) {
            const feed = document.getElementById('killFeed');
            const event = document.createElement('div');
            event.className = 'kill-event';
            event.textContent = `${killer} killed ${victim}`;
            feed.appendChild(event);

            // Keep only last 5
            while (feed.children.length > 5) {
                feed.removeChild(feed.firstChild);
            }
        }

        function onPlayerDamage(damage, source) {
            gameState.localPlayer.health = Math.max(0, gameState.localPlayer.health - damage);

            // Screen shake (offset from current position, game loop will re-lerp to correct pos)
            if (camera) {
                const shake = 3;
                camera.position.x += (Math.random() - 0.5) * shake;
                camera.position.y += (Math.random() - 0.5) * shake;
            }
        }

        // ============================================================================
        // RENDERING
        // ============================================================================

        function updatePlayerMeshes() {
            // Remove meshes for players no longer in game
            for (const playerId in playerMeshes) {
                if (!gameState.allPlayers[playerId]) {
                    scene.remove(playerMeshes[playerId].mesh);
                    if (playerMeshes[playerId].label) {
                        playerMeshes[playerId].label.remove();
                    }
                    delete playerMeshes[playerId];
                }
            }

            // Update or create meshes
            for (const [playerId, player] of Object.entries(gameState.allPlayers)) {
                if (playerId === gameState.playerId) continue;

                if (!playerMeshes[playerId]) {
                    // Create ship mesh using the ported renderer
                    const R = window.LSS_RENDERER;
                    const teamColor = player.team === 'A' ? 0x00ffff : 0xffaa00;
                    const loadoutKey = player.loadout || 'ION';
                    const chassisName = LOADOUTS[loadoutKey] ? LOADOUTS[loadoutKey].chassis : 'CORVETTE';
                    const chassisData = CHASSIS[chassisName] || CHASSIS.CORVETTE;
                    let mesh;
                    try {
                        mesh = R.createShipMesh(chassisData, teamColor);
                    } catch(e) {
                        console.warn('[Ship] Failed to create ship mesh, using fallback:', e);
                        const geometry = new THREE.BoxGeometry(15, 15, 30);
                        const material = new THREE.MeshPhongMaterial({ color: teamColor, emissive: teamColor, emissiveIntensity: 0.3 });
                        mesh = new THREE.Mesh(geometry, material);
                    }
                    scene.add(mesh);

                    // Create label
                    const label = document.createElement('div');
                    label.style.position = 'absolute';
                    label.style.color = teamColor === 0x00ffff ? '#00ffff' : '#ffaa00';
                    label.style.fontSize = '12px';
                    label.style.fontFamily = 'monospace';
                    label.style.pointerEvents = 'none';
                    label.textContent = player.loadout || playerId;
                    document.getElementById('gameContainer').appendChild(label);

                    playerMeshes[playerId] = { mesh, label, lastPos: null };
                }

                // Update position and rotation
                const meshData = playerMeshes[playerId];
                if (!player.position) continue;

                const pos = player.position;
                const rot = player.rotation || { x: 0, y: 0, z: 0, w: 1 };

                meshData.mesh.position.set(pos.x, pos.y, pos.z);
                meshData.mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);

                // Update label position (project to screen)
                const screenPos = new THREE.Vector3(pos.x, pos.y + 20, pos.z);
                screenPos.project(camera);
                const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
                const y = (screenPos.y * -0.5 + 0.5) * window.innerHeight;
                meshData.label.style.left = x + 'px';
                meshData.label.style.top = y + 'px';
                meshData.label.style.transform = 'translate(-50%, -50%)';
            }
        }

        function updateProjectiles() {
            // Guard against missing projectile data
            if (!gameState.projectiles || gameState.projectiles.length === 0) {
                // Clear old projectiles from scene
                scene.children = scene.children.filter(obj => {
                    if (obj.userData.isProjectile) {
                        scene.remove(obj);
                        return false;
                    }
                    return true;
                });
                return;
            }

            // Clear old projectiles from scene
            scene.children = scene.children.filter(obj => {
                if (obj.userData.isProjectile) {
                    scene.remove(obj);
                    return false;
                }
                return true;
            });

            // Draw projectiles
            for (const proj of gameState.projectiles) {
                if (!proj.position) continue;

                const geometry = new THREE.SphereGeometry(2, 8, 8);
                const color = proj.team === 'A' ? 0x00ffff : 0xffaa00;
                const material = new THREE.MeshBasicMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.8
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(proj.position.x, proj.position.y, proj.position.z);
                mesh.userData.isProjectile = true;
                scene.add(mesh);
            }
        }

        // ============================================================================
        // INPUT SENDING
        // ============================================================================

        function sendInput() {
            if (!gameState.connected) return;

            const msg = {
                type: 'input',
                tick: gameState.clientTick++,
                movement: {
                    x: gameState.input.strafe,
                    y: gameState.input.vertical,
                    z: gameState.input.forward
                },
                rotation: {
                    pitch: gameState.input.pitchDelta,
                    yaw: gameState.input.yawDelta
                },
                fire: gameState.input.fire,
                ability: gameState.input.ability,
                dash: gameState.input.dash
            };

            ws.send(JSON.stringify(msg));

            // Reset deltas
            gameState.input.pitchDelta = 0;
            gameState.input.yawDelta = 0;
            gameState.input.ability = null;
        }

        // ============================================================================
        // GAME LOOP
        // ============================================================================

        let lastInputSend = 0;

        function gameLoop() {
            requestAnimationFrame(gameLoop);

            const now = Date.now();
            const dt = Math.min(0.05, (now - (gameLoop._lastTime || now)) / 1000);
            gameLoop._lastTime = now;
            gameTime += dt;

            // Send input at 60 Hz
            if (now - lastInputSend > 16.67) {
                sendInput();
                lastInputSend = now;
            }

            // Update camera to follow local player position and rotation
            if (hasReceivedServerPosition && gameState.localPlayer && gameState.localPlayer.position) {
                const pos = gameState.localPlayer.position;
                const rot = gameState.localPlayer.rotation;

                const lerp = 0.3;
                camera.position.x += (pos.x - camera.position.x) * lerp;
                camera.position.y += (pos.y - camera.position.y) * lerp;
                camera.position.z += (pos.z - camera.position.z) * lerp;

                if (rot && rot.w !== undefined) {
                    camera.quaternion.slerp(
                        new THREE.Quaternion(rot.x, rot.y, rot.z, rot.w),
                        lerp
                    );
                }
            }

            // Update scene (render players and projectiles in warmup and playing states)
            if (gameState.matchState === 'playing' || gameState.matchState === 'warmup') {
                updatePlayerMeshes();
                updateProjectiles();

                // Animate ship meshes
                const R = window.LSS_RENDERER;
                for (const [playerId, meshData] of Object.entries(playerMeshes)) {
                    const player = gameState.allPlayers[playerId];
                    if (player && meshData.mesh && R.animateShipMesh) {
                        const loadoutKey = player.loadout || 'ION';
                        const chassisName = LOADOUTS[loadoutKey] ? LOADOUTS[loadoutKey].chassis : 'CORVETTE';
                        const maxSpeed = CHASSIS[chassisName] ? CHASSIS[chassisName].flightSpeed : 350;
                        const vel = player.velocity || { x: 0, y: 0, z: 0 };
                        const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
                        R.animateShipMesh(meshData.mesh, speed, maxSpeed, false, dt, gameTime);
                    }
                }
            }

            // Update level shader time (for wall vein animation)
            if (levelMesh && levelMesh.material && levelMesh.material.uniforms && levelMesh.material.uniforms.time) {
                levelMesh.material.uniforms.time.value = gameTime;
            }

            // Decay damage indicator
            damageAmount = Math.max(0, damageAmount - dt * 2.0);

            // Render with post-processing if available, otherwise direct
            // DEBUG: temporarily disabled post-FX to test raw rendering
            if (false && postFX && postFX.enabled) {
                window.LSS_RENDERER.renderPostFX(postFX, renderer, scene, camera, gameTime, damageAmount);
            } else {
                renderer.render(scene, camera);
            }

            // DEBUG: log once per second
            if (!gameLoop._lastDebug || now - gameLoop._lastDebug > 2000) {
                gameLoop._lastDebug = now;
                console.log('[Frame] cam:',
                    camera.position.x.toFixed(0), camera.position.y.toFixed(0), camera.position.z.toFixed(0),
                    'quat:', camera.quaternion.x.toFixed(2), camera.quaternion.y.toFixed(2), camera.quaternion.z.toFixed(2), camera.quaternion.w.toFixed(2),
                    'scene children:', scene.children.length,
                    'renderer size:', renderer.domElement.width, 'x', renderer.domElement.height
                );
            }
        }

        // ============================================================================
        // WINDOW EVENTS
        // ============================================================================

        window.addEventListener('resize', () => {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            const pr = Math.min(window.devicePixelRatio, 2);
            if (postFX) {
                const w = window.innerWidth * pr, h = window.innerHeight * pr;
                postFX.rtScene.setSize(w, h);
                postFX.rtBright.setSize(Math.floor(w/2), Math.floor(h/2));
                postFX.rtBlurH.setSize(Math.floor(w/2), Math.floor(h/2));
                postFX.rtBlurV.setSize(Math.floor(w/2), Math.floor(h/2));
                postFX.blurMat.uniforms.resolution.value.set(Math.floor(w/2), Math.floor(h/2));
            }
        });

        // ============================================================================
        // START
        // ============================================================================

        init();
    </script>
